function exportCSV(filename, rows, headers) {
  var lines = [headers.join(",")].concat(rows.map(function(row){
    return row.map(function(cell){
      var s = String(cell===null||cell===undefined?"":cell);
      return s.indexOf(",")>=0||s.indexOf('"')>=0||s.indexOf("\n")>=0
        ? '"'+s.replace(/"/g,'""')+'"' : s;
    }).join(",");
  }));
  var blob = new Blob([lines.join("\n")],{type:"text/csv"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href=url; a.download=filename+".csv";
  document.body.appendChild(a); a.click();
  setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},100);
}

  var sb = getSB();
  if(!sb) return Promise.resolve([]);

    .then(function(r){

function getGaTaxRate(zip) {
  if(!zip) return null;
  var clean = (zip||"").replace(/\D/g,"").slice(0,5);
  var entry = GA_ZIP_TAX[clean];
  if(entry) return entry;
  // Georgia ZIPs: 30001-31999
  var num = parseInt(clean,10);
  if(num>=30001&&num<=31999) return {rate:0.07,county:"Georgia",breakdown:"4%+3% (default)"};
  return null; // not in Georgia
}



/* ─── Credit Agreement Generator ─────────────────────────────── */
function fillTemplate(template, vars) {
  // Replace {{var}} placeholders with actual values
  return (template||"").replace(/\{\{([^}]+)\}\}/g, function(match, key) {
    var k = key.trim().toLowerCase();
    if(vars[k] !== undefined && vars[k] !== null && vars[k] !== "") return vars[k];
    return match; // leave unreplaced if no value
  });
}

function getTemplateVars(customer, req, company) {
  return {
    customer_name: customer.name || "",
    company_name:  customer.company || "",
    rep_name:      req.repName || req.repId || "",
    order_id:      req.id || "",
    date:          new Date().toLocaleDateString("en-US", {month:"long", day:"numeric", year:"numeric"}),
    company:       company || "PreVasive USA",
    approved_terms: req.approvedTerms ? req.approvedTerms.replace(/_/g," ").toUpperCase() : "NET 30",
    credit_limit:  req.approvedLimit ? "$"+Number(req.approvedLimit).toLocaleString() : "$5,000",
    address:       [customer.address,customer.city,customer.state,customer.zip].filter(Boolean).join(", ") || "",
  };
}

function generateCreditAgreement(customer, req, template, company) {
  var defaultTemplate = [
    "CREDIT ACCOUNT AGREEMENT",
    "",
    "This Credit Account Agreement (\"Agreement\") is entered into on {{date}} between {{company}} (\"Seller\") and {{customer_name}}, {{company_name}} (\"Buyer\").",
    "",
    "1. CREDIT TERMS",
    "Seller agrees to extend credit to Buyer under the following terms:",
    "  - Payment Terms: {{approved_terms}}",
    "  - Credit Limit: {{credit_limit}}",
    "  - Buyer address: {{address}}",
    "",
    "2. PAYMENT OBLIGATIONS",
    "Buyer agrees to pay all invoices in full within the agreed payment terms. Late payments may result in suspension of credit privileges.",
    "",
    "3. PERSONAL GUARANTEE",
    "By signing below, the authorized representative of Buyer personally guarantees payment of all amounts due under this Agreement.",
    "",
    "4. GOVERNING LAW",
    "This Agreement shall be governed by the laws of the State of Georgia.",
    "",
    "5. ACKNOWLEDGMENT",
    "Buyer acknowledges that they have read, understood, and agree to all terms and conditions of this Agreement.",
    "",
    "Account Representative: {{rep_name}}",
    "Agreement Date: {{date}}",
    "Reference: {{order_id}}",
  ].join("\n");
  var tpl = template||defaultTemplate;
  return fillTemplate(tpl, getTemplateVars(customer, req, company));
}

function generateCreditAgreementHtml(customer, req, template, company) {
  var text = generateCreditAgreement(customer, req, template, company);
  return text
    .split("\n")
    .map(function(line) {
      if(line===line.toUpperCase()&&line.trim().length>3) return "<h3 style='font-size:13px;font-weight:800;color:#1a1a2e;margin:16px 0 6px'>"+line+"</h3>";
      if(line.trim()==="") return "<br/>";
      return "<p style='font-size:13px;color:#374151;line-height:1.8;margin:3px 0'>"+line+"</p>";
    }).join("");
}


/* ─── Google Places Autocomplete ────────────────────────────────── */
var __placesLib = null;
var __placesLoading = false;
var __placesCallbacks = [];

function loadPlacesLib(apiKey, cb) {
  if(__placesLib){cb(__placesLib);return;}
  __placesCallbacks.push(cb);
  if(__placesLoading) return;
  __placesLoading = true;
  // Use new loading=async + importLibrary pattern
  window.__mapsReady = function(){
    window.google.maps.importLibrary("places").then(function(lib){
      __placesLib = lib;
      __placesLoading = false;
      __placesCallbacks.forEach(function(fn){fn(lib);});
      __placesCallbacks = [];
    });
  };
  var s = document.createElement("script");
  s.src = "https://maps.googleapis.com/maps/api/js?key="+encodeURIComponent(apiKey)+"&loading=async&libraries=places&callback=__mapsReady";
  s.async = true;
  s.onerror = function(){ __placesLoading=false; __placesCallbacks=[]; };
  document.head.appendChild(s);
}

function getPlacesKey(){
  try{return JSON.parse(localStorage.getItem("__pv__googleCfg")||"{}").apiKey||"";}catch(e){return "";}
}

function PlacesAutocomplete({value,onChange,onSelect,placeholder,label,hint}) {
  const [suggestions, setSuggestions] = useState([]);
  const [open,        setOpen]        = useState(false);
  const [loading,     setLoading]     = useState(false);
  const [lib,         setLib]         = useState(__placesLib);
  var debounceT = {v:null};

  // Load ONCE on mount only
  useEffect(function(){
    var key = getPlacesKey();
    if(!key || __placesLib) return;
    loadPlacesLib(key, function(l){ setLib(l); });
  }, []); // ← empty array = run once

  function search(text){
    clearTimeout(debounceT.v);
    if(!text||text.length<3){setSuggestions([]);setOpen(false);return;}
    if(!lib){return;}
    debounceT.v = setTimeout(function(){
      setLoading(true);
      lib.AutocompleteSuggestion.fetchAutocompleteSuggestions({
        input: text,
        includedRegionCodes: ["us"],
      }).then(function(result){
        setLoading(false);
        var preds = result.suggestions||[];
        setSuggestions(preds);
        if(preds.length>0) setOpen(true);
      }).catch(function(e){
        setLoading(false);
        console.warn("Places error:", e);
      });
    }, 300);
  }

  function pickSuggestion(sug){
    setOpen(false); setSuggestions([]);
    var pred = sug.placePrediction;
    var mainText = pred.mainText ? pred.mainText.toString() : pred.text;
    onChange(mainText||"");
    if(!onSelect) return;
    var place = pred.toPlace();
    place.fetchFields({fields:["addressComponents"]}).then(function(){
      var comps = place.addressComponents||[];
      function g(type){
        var match = comps.find(function(a){return a.types&&a.types.indexOf(type)>=0;});
        return match ? (match.shortText||match.longText||"") : "";
      }
      onSelect({
        street: (g("street_number")+" "+g("route")).trim(),
        city:   g("locality")||g("sublocality_level_1")||g("neighborhood"),
        state:  g("administrative_area_level_1"),
        zip:    g("postal_code"),
      });
    }).catch(function(e){console.warn("Place details error:",e);});
  }

  var hasKey = !!getPlacesKey();
  return (
    <div style={{position:"relative",marginBottom:12}}>
      {label&&<div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:5}}>{label}</div>}
      <div style={{position:"relative"}}>
        <input value={value}
          placeholder={lib?(placeholder||"Start typing address…"):loading?"Loading Maps…":(placeholder||"Street address")}
          onChange={function(e){onChange(e.target.value);if(lib)search(e.target.value);}}
          onFocus={function(){if(suggestions.length>0)setOpen(true);}}
          onBlur={function(){setTimeout(function(){setOpen(false);},160);}}
          style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:7,
                  padding:"8px 30px 8px 12px",color:C.text,fontSize:13,fontFamily:"inherit",
                  boxSizing:"border-box",outline:"none"}}/>
        <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
                      fontSize:12,pointerEvents:"none",color:lib?C.success:C.dim}}>
          {loading?"⏳":lib?"📍":"✏️"}
        </span>
      </div>
      {!hasKey&&<div style={{fontSize:10,color:C.warning,marginTop:3}}>
        ⚠ No Google API key — type manually or add key in <strong>Settings → Address</strong>
      </div>}
      {hint&&lib&&<div style={{fontSize:10,color:C.dim,marginTop:3}}>{hint}</div>}
      {open&&suggestions.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:C.bg,
                     border:"1px solid "+C.border,borderRadius:8,
                     boxShadow:"0 8px 24px rgba(0,0,0,.18)",
                     zIndex:9999,maxHeight:220,overflowY:"auto",marginTop:2}}>
          {suggestions.map(function(sug,i){
            var pred = sug.placePrediction;
            var main = pred.mainText?pred.mainText.toString():"";
            var sec  = pred.secondaryText?pred.secondaryText.toString():"";
            return (
              <div key={i} onMouseDown={function(){pickSuggestion(sug);}}
                style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid "+C.border}}
                onMouseEnter={function(e){e.currentTarget.style.background=C.surface2;}}
                onMouseLeave={function(e){e.currentTarget.style.background="";}}>
                <div style={{fontWeight:600,fontSize:12,color:C.text}}>📍 {main}</div>
                {sec&&<div style={{fontSize:10,color:C.muted,marginTop:1}}>{sec}</div>}
              </div>
            );
          })}
          <div style={{padding:"4px 14px",fontSize:10,color:C.dim,textAlign:"right",borderTop:"1px solid "+C.border}}>
            Powered by Google
          </div>
        </div>
      )}
    </div>
  );
}


/* ─── Order Status Flow ───────────────────────────────────────────────── */
var CARRIER_URLS = {
  UPS:   "https://www.ups.com/track?tracknum=",
  FedEx: "https://www.fedex.com/fedextrack/?trknbr=",
  USPS:  "https://tools.usps.com/go/TrackConfirmAction?tLabels=",
  DHL:   "https://www.dhl.com/en/express/tracking.html?AWB=",
};

function isPayFirstMethod(payMethod) {
  return payMethod==="due_receipt"||payMethod==="credit_card";
}

function getOrderFlow(payMethod) {
  if(isPayFirstMethod(payMethod))
    return ["Submitted","Paid","Waiting Shipping","Shipped","Delivered"];
  return ["Submitted","Waiting Shipping","Shipped","Delivered","Paid"];
}

function getNextOrderStatus(order) {
  var flow = getOrderFlow(order.payMethod);
  var idx  = flow.indexOf(order.status);
  return (idx>=0 && idx<flow.length-1) ? flow[idx+1] : null;
}

function getTrackingUrl(carrier, trackingNum) {
  if(!trackingNum) return null;
  var base = CARRIER_URLS[carrier];
  if(!base) return null;
  return base + encodeURIComponent(trackingNum.trim());
}

  var lines = ["=== ShipStation Order Import ===",
    "Order #: "+order.id,
    "Date: "+fmtDate(order.createdAt),
    "Customer: "+(cust.name||order.custName||""),
    "Email: "+(cust.email||""),
    "Phone: "+(cust.phone||""),
    "Address: "+(cust.address||""),
    cust.city&&cust.state&&cust.zip?(cust.city+", "+cust.state+" "+cust.zip):"",
    "",
    "--- Items ---"];
  (order.items||[]).forEach(function(it){
    var p=products.find(function(x){return x.id===it.prodId;})||{name:"Product",sku:""};
    lines.push(it.qty+"x "+p.name+(p.sku?" (SKU: "+p.sku+")":"")+" @ "+fmtMoney(p.price||0));
  });
  lines.push("");
  lines.push("Subtotal: "+fmtMoney(order.totals&&order.totals.subtotal||0));
  if(order.totals&&order.totals.shipping>0) lines.push("Shipping: "+fmtMoney(order.totals.shipping));
  lines.push("Total: "+fmtMoney(order.totals&&order.totals.grand||0));
  lines.push("Payment: "+(order.payMethod||"").replace(/_/g," "));
  return lines.filter(function(l){return l!==undefined;}).join("\n");
}

function useLS(key, def) {
  var raw = localStorage.getItem("__pv__"+key);
  var init = raw ? JSON.parse(raw) : def;
  var result = useState(init);
  var v = result[0]; var setVRaw = result[1];
  var setV = useCallback(function(x){
    var val = typeof x === "function" ? x(v) : x;
    localStorage.setItem("__pv__"+key, JSON.stringify(val));
    setVRaw(val);
  }, [v, key]);
  return [v, setV];
}

function genId(prefix) {
  return (prefix||"id")+"_"+Math.random().toString(36).slice(2,9);
}

function fmtMoney(n) {
  return "$"+(parseFloat(n)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");
}

function fmtTerms(code) {
  var map = {"due_receipt":"Due on Receipt","net_15":"Net 15","net_30":"Net 30","net_45":"Net 45","net_60":"Net 60","net_90":"Net 90"};
  if(!code) return "—";
  return map[code] || code.replace(/_/g," ").replace(/^[a-z]/,function(l){return l.toUpperCase();});
}

function fmtDate(d) {
  if(!d) return "—";
  return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}

function InviteRegistration({token,onComplete}) {
  const [name,    setName]    = useState("");
  const [email,   setEmail]   = useState("");
  const [pass,    setPass]    = useState("");
  const [pass2,   setPass2]   = useState("");
  const [err,     setErr]     = useState("");
  const [busy,    setBusy]    = useState(false);
  const [done,    setDone]    = useState(false);

  function register() {
    if(!name.trim()||!email.trim()||!pass){setErr("All fields are required.");return;}
    if(pass.length<8){setErr("Password must be at least 8 characters.");return;}
    if(pass!==pass2){setErr("Passwords do not match.");return;}
    var sb = getSB();
    if(!sb){setErr("Service unavailable.");return;}
    setBusy(true); setErr("");
    sb.auth.signUp({email:email.trim(),password:pass})
      .then(function(r){
        if(r.error){setBusy(false);setErr(r.error.message);return;}
        var uid = r.data&&r.data.user&&r.data.user.id;
        if(!uid){setBusy(false);setErr("Registration failed.");return;}
        return Promise.all([
          sb.from("crm_users").upsert({id:uid,email:email.trim(),name:name.trim(),role:"rep",updated_at:new Date().toISOString()}),
          sb.from("crm_reps").upsert({id:genId("rep"),data:Object.assign({},{
            name:name.trim(),email:email.trim(),status:"active",
            subscriptionStatus:"trial",trialStartedAt:new Date().toISOString(),
            planId:"starter",inviteToken:token,createdAt:new Date().toISOString()
          }),updated_at:new Date().toISOString()})
        ]).then(function(){setBusy(false);setDone(true);});
      })
      .catch(function(e){setBusy(false);setErr(e.message||"Error");});
  }

  var inp = {width:"100%",background:C.surface2,border:"1px solid "+C.border,borderRadius:7,
             padding:"9px 12px",color:C.text,fontSize:13,fontFamily:"inherit",
             boxSizing:"border-box",outline:"none"};

  if(done) return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:16,fontFamily:"'Inter',system-ui,sans-serif"}}>
      <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:14,padding:"40px 36px",maxWidth:400,width:"100%",textAlign:"center"}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:C.success+"15",border:"2px solid "+C.success+"30",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,margin:"0 auto 18px"}}>✓</div>
        <div style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:8}}>Account Created!</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:24,lineHeight:1.6}}>Your rep account is ready. Sign in with your email and password to get started.</div>
        <Btn onClick={onComplete} fullWidth={true}>Go to Sign In →</Btn>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:16,fontFamily:"'Inter',system-ui,sans-serif"}}>
      <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:14,padding:"40px 36px",maxWidth:420,width:"100%",boxShadow:"0 16px 48px rgba(0,0,0,.2)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:24}}>
          <div style={{width:26,height:26,borderRadius:6,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,color:"#fff"}}>P</div>
          <span style={{fontWeight:700,fontSize:15,color:C.text}}>PreVasive Rep Sales</span>
        </div>
        <div style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:6,letterSpacing:"-.02em"}}>Create your account</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:22}}>You have been invited to join as a sales rep.</div>
        {err&&<div style={{padding:"9px 12px",background:C.danger+"12",border:"1px solid "+C.danger+"30",borderRadius:6,color:C.danger,fontSize:12,marginBottom:14}}>{err}</div>}
        {[["Full Name",name,setName,"text","Jane Smith"],["Email",email,setEmail,"email","you@company.com"],["Password",pass,setPass,"password","Min 8 characters"],["Confirm Password",pass2,setPass2,"password","Re-enter password"]].map(function(f){return (
          <div key={f[0]} style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:500,color:C.muted,marginBottom:4}}>{f[0]}</div>
            <input value={f[1]} onChange={function(e){f[2](e.target.value);}} type={f[3]} placeholder={f[4]}
              onKeyDown={f[0]==="Confirm Password"?function(e){if(e.key==="Enter")register();}:undefined}
              style={inp}/>
          </div>
        );})}
        <div style={{marginTop:18}}>
          <button onClick={register} disabled={busy}
            style={{width:"100%",padding:"11px",borderRadius:6,border:"none",
                    background:busy?C.dim:C.accent,color:"#fff",cursor:busy?"not-allowed":"pointer",
                    fontFamily:"inherit",fontWeight:700,fontSize:14,letterSpacing:"-.01em",marginBottom:10}}>
            {busy?"Creating account…":"Create Account →"}
          </button>
        </div>
      </div>
    </div>
  );
}


function AppLanding({onLogin}) {
  const [showSignIn,  setShowSignIn]  = useState(false);
  const [showReg,     setShowReg]     = useState(false);
  const [siEmail,     setSiEmail]     = useState("");
  const [siPass,      setSiPass]      = useState("");
  const [siErr,       setSiErr]       = useState("");
  const [regDone,     setRegDone]     = useState(false);
  const [resetMode,   setResetMode]   = useState(false);
  const [newPass,     setNewPass]     = useState("");
  const [newPass2,    setNewPass2]    = useState("");
  const [resetErr,    setResetErr]    = useState("");
  const [resetDone,   setResetDone]   = useState(false);
  const [resetBusy,   setResetBusy]   = useState(false);
  const [signingIn,   setSigningIn]   = useState(false);

  useEffect(function() {
    var hash = window.location.hash||"";
    if(hash.indexOf("type=recovery")>=0 && hash.indexOf("access_token")>=0) {
      var sb = getSB();
      if(sb) {
        sb.auth.getSession().then(function(r){
          if(r.data&&r.data.session) setResetMode(true);
        });
      }
    }
  }, []);

  function handleSignIn() {
    if(!siEmail||!siPass){setSiErr("Email and password are required.");return;}
    var sb = getSB();
    if(!sb){setSiErr("Connection error — check your internet connection and try again.");return;}
    setSigningIn(true); setSiErr("");
    sb.auth.signInWithPassword({email:siEmail,password:siPass})
      .then(function(r){
        setSigningIn(false);
        if(r.error){setSiErr(r.error.message);return;}
        var uid = r.data&&r.data.user&&r.data.user.id;
        if(!uid){setSiErr("Login failed.");return;}
        return sb.from("crm_users").select("*").eq("id",uid).single()
          .then(function(ur){
            if(!ur.data){setSiErr("Account not configured. Ask admin to add your user profile.");return;}
            onLogin(Object.assign({},ur.data,{email:r.data.user.email}));
          });
      })
      .catch(function(err){
        setSigningIn(false);
        if(err.message&&err.message.indexOf("fetch")>=0) {
          setSiErr("Cannot connect to server. Make sure you are accessing this app from its hosted URL (not a local file).");
        } else {
          setSiErr(err.message||"Sign in error");
        }
      });
  }

  function handleReset() {
    if(!newPass.trim()){setResetErr("Enter a new password.");return;}
    if(newPass.length<8){setResetErr("Password must be at least 8 characters.");return;}
    if(newPass!==newPass2){setResetErr("Passwords do not match.");return;}
    var sb = getSB();
    if(!sb){setResetErr("Service unavailable.");return;}
    setResetBusy(true); setResetErr("");
    sb.auth.updateUser({password:newPass})
      .then(function(r){
        setResetBusy(false);
        if(r.error){setResetErr(r.error.message);return;}
        setResetDone(true);
        if(window.history) window.history.replaceState(null,"",window.location.pathname);
      })
      .catch(function(err){setResetBusy(false);setResetErr(err.message||"Error");});
  }

  var navStyle = {
    position:"fixed",top:0,left:0,right:0,zIndex:100,
    borderBottom:"1px solid rgba(255,255,255,.06)",
    background:C.surface+"f5",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"
  };

  if(resetMode) return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",
                 justifyContent:"center",padding:16,fontFamily:"'Inter',system-ui,sans-serif"}}>
      <div style={{background:"#0d1826",border:"1px solid rgba(255,255,255,.08)",borderRadius:14,
                   padding:"40px 36px",width:"100%",maxWidth:400,boxShadow:"0 24px 60px rgba(0,0,0,.3)"}}>
        {resetDone ? (
          <div style={{textAlign:"center"}}>
            <div style={{width:52,height:52,borderRadius:"50%",background:"rgba(30,166,114,.15)",
                         display:"flex",alignItems:"center",justifyContent:"center",
                         fontSize:22,margin:"0 auto 18px"}}>✓</div>
            <div style={{fontSize:20,fontWeight:700,marginBottom:8,color:C.text,letterSpacing:"-.02em"}}>Password Updated</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:24,lineHeight:1.6}}>You can now sign in with your new password.</div>
            <button onClick={function(){setResetMode(false);setResetDone(false);setNewPass("");setNewPass2("");setShowSignIn(true);}}
              style={{padding:"10px 28px",borderRadius:6,border:"none",background:"#635bff",color:"#fff",
                      cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:14,letterSpacing:"-.01em"}}>
              Sign In
            </button>
          </div>
        ) : (
          <div>
            <div style={{fontSize:20,fontWeight:700,marginBottom:6,color:C.text,letterSpacing:"-.02em"}}>Set new password</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:22}}>Minimum 8 characters.</div>
            {resetErr&&<div style={{padding:"9px 12px",background:"rgba(223,27,65,.12)",border:"1px solid rgba(223,27,65,.3)",borderRadius:6,color:"#df1b41",fontSize:12,marginBottom:14}}>{resetErr}</div>}
            {["New Password","Confirm Password"].map(function(label,i){
              var val = i===0?newPass:newPass2;
              var set = i===0?setNewPass:setNewPass2;
              var invalid = i===1&&newPass2&&newPass!==newPass2;
              return (
                <div key={label} style={{marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:500,color:C.muted,marginBottom:4}}>{label}</div>
                  <input value={val} onChange={function(e){set(e.target.value);}}
                    type="password" placeholder="••••••••"
                    onKeyDown={i===1?function(e){if(e.key==="Enter")handleReset();}:undefined}
                    style={{width:"100%",background:C.surface2,
                            border:"1px solid "+(invalid?C.danger:C.border),
                            borderRadius:6,padding:"9px 12px",color:C.text,fontSize:13,
                            fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
                  {invalid&&<div style={{fontSize:10,color:"#df1b41",marginTop:3}}>Passwords do not match</div>}
                </div>
              );
            })}
            <div style={{marginTop:18}}>
              <button onClick={handleReset} disabled={resetBusy}
                style={{width:"100%",padding:"10px",borderRadius:6,border:"none",
                        background:resetBusy?"#4a4485":"#635bff",color:"#fff",
                        cursor:resetBusy?"not-allowed":"pointer",fontFamily:"inherit",
                        fontWeight:600,fontSize:14,letterSpacing:"-.01em",marginBottom:10}}>
                {resetBusy?"Updating…":"Update Password"}
              </button>
              <button onClick={function(){setResetMode(false);window.history.replaceState(null,"",window.location.pathname);}}
                style={{width:"100%",padding:"9px",borderRadius:6,border:"1px solid rgba(255,255,255,.08)",
                        background:"transparent",color:"rgba(240,244,255,.4)",cursor:"pointer",
                        fontFamily:"inherit",fontWeight:500,fontSize:12}}>

function SendInvoiceModal({order,customers,products,currentUser,onClose,addToast,showResult}) {
  var cust     = (customers||[]).find(function(x){return x.id===order.custId;})||{name:order.custName||"Customer"};
  var company  = JSON.parse(localStorage.getItem("__pv__invoiceCfg")||"{}").company||"PreVasive USA";
  var totals   = order.totals||{};
  var custName = cust.name||order.custName||"Customer";
  const [toEmail,setToEmail] = useState(cust.email||"");
  const [subject,setSubject] = useState("Invoice from "+company+" — Order "+order.id);
  const [body,   setBody]    = useState("Hi "+custName+",\n\nPlease find your invoice attached.\n\nOrder: "+order.id+"\nTotal Due: "+fmtMoney(totals.grand||0)+"\n\nPay online: [PAYMENT_LINK]\n\nThank you,\n"+(currentUser&&currentUser.name||company));
  const [link,   setLink]    = useState("");
  const [copied, setCopied]  = useState(false);

  function genLink() {
    if(link) return link;
    var tok=order.id+"_"+Math.random().toString(36).slice(2,9);
    var pd={token:tok,status:"pending",order:order,customer:cust,company:company,products:products||[],createdAt:new Date().toISOString()};
    localStorage.setItem("__pv__pay_"+tok,JSON.stringify(pd));
    var l=window.location.origin+window.location.pathname+"#pay="+tok;
    setLink(l);
    setBody(function(prev){return prev.replace("[PAYMENT_LINK]",l);});
    return l;
  }
  function copyLink(){var l=genLink();navigator.clipboard.writeText(l).then(function(){setCopied(true);setTimeout(function(){setCopied(false);},2500);addToast("Payment link copied!","success");});}
  function openMail(){
    if(!toEmail.trim()){addToast("Enter a customer email address first","warning");return;}
    var l=genLink();
    var txt=body.replace("[PAYMENT_LINK]",l);
    var cfg=null;
    try{cfg=JSON.parse(localStorage.getItem("__pv__emailCfg")||"null");}catch(e){}
    if(cfg&&cfg.edgeFnUrl&&cfg.fromEmail&&cfg.pass){
      // Send via Edge Function
      var repEmail = currentUser&&currentUser.email ? currentUser.email : null;
      var htmlBody = txt.split("\n").join("<br/>");
      fetch(cfg.edgeFnUrl,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          to:toEmail.trim(), cc:repEmail||undefined,
          subject:subject, html:htmlBody,
          fromName:cfg.fromName||"PreVasive USA",
          fromEmail:cfg.fromEmail,
          user:cfg.user, pass:cfg.pass,
        }),
      }).then(function(r){return r.json();}).then(function(d){
        if(d.ok){addToast("✓ Invoice sent to "+toEmail.trim()+(repEmail?" (CC: "+repEmail+")":""),"success");onClose();}
        else{addToast("Email error: "+(d.error||"Unknown — check Edge Function logs"),"danger");}
      }).catch(function(){addToast("Could not reach email server — check Edge Function URL","danger");});
    } else {
      // Fallback to mailto:
      window.open("mailto:"+encodeURIComponent(toEmail)+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(txt),"_blank");
      addToast("Opening email client… (configure Email in Settings for direct send)","info");
    }
  }

  return (
    <Modal title="Send Invoice" wide={true} onClose={onClose}
      footer={<div style={{display:"flex",gap:8,justifyContent:"space-between",alignItems:"center",flexWrap:"wrap"}}>
        <Btn variant="ghost" onClick={function(){generateInvoice(order,customers||[],products||[],currentUser);}}>⬇ Download</Btn>
        <div style={{display:"flex",gap:8}}>
          <Btn variant="ghost" onClick={onClose}>Close</Btn>
          <Btn variant="ghost" onClick={copyLink}>{copied?"✓ Copied!":"📋 Copy Link"}</Btn>
          <Btn onClick={openMail}>{(function(){try{var cfg=JSON.parse(localStorage.getItem("__pv__emailCfg")||"{}");return cfg&&cfg.edgeFnUrl&&cfg.pass?"✉ Send Email →":"✉ Open in Mail →";}catch(e){return "✉ Open in Mail →";}})()}</Btn>
        </div>
      </div>}>

      {/* Customer banner */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:C.surface2,border:"1px solid "+C.border,borderRadius:10,marginBottom:14}}>
        <Avatar name={custName} size={38}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:14,color:C.text}}>{custName}</div>
          {cust.company&&<div style={{fontSize:11,color:C.muted}}>{cust.company}</div>}
          {cust.email&&<div style={{fontSize:11,color:C.accent}}>{cust.email}</div>}
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:10,color:C.muted,marginBottom:1}}>Total Due</div>
          <div style={{fontSize:20,fontWeight:900,fontFamily:"monospace",color:C.accent}}>{fmtMoney(totals.grand||0)}</div>
        </div>
      </div>

      {!cust.email&&<div style={{padding:"8px 12px",background:C.warning+"10",border:"1px solid "+C.warning+"25",borderRadius:8,marginBottom:12,fontSize:12,color:C.warning,fontWeight:600}}>⚠ No email on file — enter one below to send.</div>}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <div>
          <Field label="To (Email)" value={toEmail} onChange={setToEmail} type="email" placeholder="customer@example.com"/>
          <Field label="Subject" value={subject} onChange={setSubject}/>

function FileUpload({files,onChange,label,maxFiles}) {
  function pick(){
    var inp=document.createElement("input");inp.type="file";inp.multiple=true;
    inp.onchange=function(){
      var arr=Array.prototype.slice.call(inp.files||[]);
      arr.forEach(function(f){
        var rd=new FileReader();
        rd.onload=function(e){onChange(function(prev){var next=(prev||[]).concat([{name:f.name,size:f.size,type:f.type,dataUrl:e.target.result}]);return next.slice(0,maxFiles||5);});};
        rd.readAsDataURL(f);
      });
    };
    inp.click();
  }
  return (
    <div style={{marginBottom:12}}>
      {label&&<div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:6}}>{label}</div>}
      <div style={{border:"1px dashed "+C.border,borderRadius:8,padding:"12px",cursor:"pointer",textAlign:"center"}} onClick={pick}>
        <div style={{fontSize:12,color:C.muted}}>📎 Click to attach files {maxFiles?"(max "+maxFiles+")":""}</div>
      </div>
      {(files||[]).map(function(f,i){return (
        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:C.surface2,borderRadius:6,marginTop:4,fontSize:11}}>
          <span style={{color:C.text}}>{f.name}</span>
          <Btn small variant="danger" onClick={function(){onChange(function(prev){return prev.filter(function(_,j){return j!==i;});});}}>×</Btn>
        </div>
      );})}
    </div>
  );
}

function TermsRequestModal({customer,repId,repName,onSubmit,onClose,addToast}) {
  const [reqLimit, setReqLimit] = useState("5000");

      requestedLimit:parseFloat(reqLimit)||0,requestedTerms:reqTerms,

function CustomerEditModal({customer,onSave,onClose,addToast}) {
  var approved=customer.termsStatus==="active"||customer.termsStatus==="awaiting_signature"||customer.termsStatus==="approved";
  const [email,     setEmail]     = useState(customer.email||"");
  const [phone,     setPhone]     = useState(customer.phone||"");
  const [company,   setCompany]   = useState(customer.company||"");
  const [name,      setName]      = useState(customer.name||"");
  const [addresses, setAddresses] = useState((function(){
    if(customer.addresses&&customer.addresses.length>0) return customer.addresses;
    if(customer.address) return [{id:genId("adr"),label:"Primary",address:customer.address||"",city:customer.city||"",state:customer.state||"",zip:customer.zip||"",isPrimary:true}];
    return [];
  })());
  function save(){
    if(!name.trim()) return;
    var primary=addresses.find(function(a){return a.isPrimary;})||addresses[0]||{};
    var updated=Object.assign({},customer,{
      name:approved?customer.name:name.trim(),email:email.trim(),phone:phone.trim(),company:company.trim(),
      addresses:addresses,address:primary.address||"",city:primary.city||"",state:primary.state||"",zip:primary.zip||"",
      updatedAt:new Date().toISOString(),
    });
    onSave(updated);addToast("Customer updated","success");onClose();
  }
  return (
    <Modal title={"Edit Customer — "+customer.name} onClose={onClose}
      footer={<div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={onClose}>Cancel</Btn><Btn onClick={save}>Save Changes</Btn></div>}>
      {approved&&<div style={{padding:"10px 14px",background:C.warning+"10",border:"1px solid "+C.warning+"25",borderRadius:8,marginBottom:14,fontSize:12,color:C.warning,fontWeight:600}}>⚠ Credit account approved — name cannot be changed.</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div style={{gridColumn:"1/-1"}}>
          <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:5}}>Full Name {approved&&<span style={{color:C.warning,fontSize:10}}>🔒 Locked</span>}</div>
          <input value={approved?customer.name:name} onChange={function(e){if(!approved)setName(e.target.value);}} disabled={approved}
            style={{width:"100%",background:approved?C.surface2:C.bg,border:"1px solid "+C.border,borderRadius:7,padding:"8px 12px",color:approved?C.dim:C.text,fontSize:13,fontFamily:"inherit",boxSizing:"border-box",outline:"none",opacity:approved?0.7:1,cursor:approved?"not-allowed":"text"}}/>

function generateReceiptToken(order, customer, paymentRef, company) {
  var token = order.id+"_rcpt_"+Math.random().toString(36).slice(2,8);
  var rData = {token:token,order:order,customer:customer,paymentRef:paymentRef,
    company:company||"PreVasive USA",paidAt:new Date().toISOString()};
  localStorage.setItem("__pv__rcpt_"+token,JSON.stringify(rData));
  return token;
}

function MultiAddressManager({addresses,onChange}) {
  const [adding,  setAdding]  = useState(false);
  const [editIdx, setEditIdx] = useState(null);
  const [label,   setLabel]   = useState("");
  const [addr,    setAddr]    = useState("");
  const [city,    setCity]    = useState("");
  const [state2,  setState2]  = useState("");
  const [zip,     setZip]     = useState("");
  function resetForm(){setLabel("");setAddr("");setCity("");setState2("");setZip("");}
  function openAdd(){resetForm();setEditIdx(null);setAdding(true);}
  function openEdit(i){var a=addresses[i];setLabel(a.label||"");setAddr(a.address||"");setCity(a.city||"");setState2(a.state||"");setZip(a.zip||"");setEditIdx(i);setAdding(true);}
  function save(){
    if(!addr.trim()) return;
    var entry={id:editIdx!==null?addresses[editIdx].id:genId("adr"),label:label.trim()||"Address "+(addresses.length+1),address:addr.trim(),city:city.trim(),state:state2.trim(),zip:zip.trim(),isPrimary:editIdx!==null?addresses[editIdx].isPrimary:addresses.length===0};
    var updated=editIdx!==null?addresses.map(function(a,i){return i===editIdx?entry:a;}):addresses.concat([entry]);
    onChange(updated);setAdding(false);resetForm();setEditIdx(null);
  }
  function remove(i){var updated=addresses.filter(function(_,j){return j!==i;});if(addresses[i].isPrimary&&updated.length>0) updated[0]=Object.assign({},updated[0],{isPrimary:true});onChange(updated);}
  function setPrimary(i){onChange(addresses.map(function(a,j){return Object.assign({},a,{isPrimary:j===i});}));}
  var taxInfo=zip&&getGaTaxRate(zip);
  return (
    <div>
      {addresses.map(function(a,i){return (
        <div key={a.id||i} style={{background:C.surface,border:"1px solid "+(a.isPrimary?C.accent:C.border),borderRadius:10,padding:"12px 14px",marginBottom:8,boxShadow:a.isPrimary?"0 0 0 2px "+C.accent+"20":undefined}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                <span style={{fontWeight:700,fontSize:13,color:C.text}}>{a.label||"Address"}</span>
                {a.isPrimary&&<span style={{padding:"1px 6px",borderRadius:10,fontSize:9,fontWeight:700,background:C.accent+"18",color:C.accent}}>PRIMARY</span>}
              </div>
              <div style={{fontSize:12,color:C.muted,lineHeight:1.7}}>
                {a.address&&<div>{a.address}</div>}
                {[a.city,a.state,a.zip].filter(Boolean).join(", ")&&<div>{[a.city,a.state,a.zip].filter(Boolean).join(", ")}</div>}
              </div>
              {a.zip&&getGaTaxRate(a.zip)&&<div style={{fontSize:10,color:C.accent,marginTop:3}}>📍 {getGaTaxRate(a.zip).county} — {((getGaTaxRate(a.zip).rate||0)*100).toFixed(1)}% tax</div>}
            </div>
            <div style={{display:"flex",gap:6,flexShrink:0}}>
              {!a.isPrimary&&<Btn small variant="ghost" onClick={function(){setPrimary(i);}}>Set Primary</Btn>}
              <Btn small variant="ghost" onClick={function(){openEdit(i);}}>Edit</Btn>
              <Btn small variant="danger" onClick={function(){remove(i);}}>×</Btn>
            </div>
          </div>
        </div>
      );})}
      {adding?(
        <div style={{background:C.surface2,border:"1px solid "+C.border,borderRadius:10,padding:"14px",marginBottom:8}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>{editIdx!==null?"Edit Address":"New Address"}</div>
          <Field label="Label" value={label} onChange={setLabel} placeholder="e.g. Main Office, Warehouse"/>
          <PlacesAutocomplete label="Street Address" value={addr} onChange={setAddr}
            placeholder="123 Medical Dr, Atlanta…"
            onSelect={function(a){setAddr(a.street);setCity(a.city);setState2(a.state);setZip(a.zip);}}/>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:8}}>
            <Field label="City" value={city} onChange={setCity}/>
            <Field label="State" value={state2} onChange={setState2} placeholder="GA"/>
            <Field label="ZIP" value={zip} onChange={setZip} placeholder="30309"/>
          </div>
          {taxInfo&&<div style={{padding:"5px 10px",background:C.accent+"08",borderRadius:6,fontSize:11,color:C.accent,marginBottom:8}}>📍 {taxInfo.county} County — {((taxInfo.rate||0)*100).toFixed(1)}% tax</div>}
          <div style={{display:"flex",gap:8}}>
            <Btn small onClick={save} disabled={!addr.trim()}>{editIdx!==null?"Save Changes":"Add Address"}</Btn>
            <Btn small variant="ghost" onClick={function(){setAdding(false);resetForm();setEditIdx(null);}}>Cancel</Btn>
          </div>
        </div>
      ):(
        <Btn small variant="ghost" onClick={openAdd}>+ Add Address</Btn>
      )}
    </div>
  );
}

function CollectPaymentModal({order,onCollect,onClose,addToast}) {
  var totals=order.totals||{};
  const [method,     setMethod]     = useState("card");
  const [cardHolder, setCardHolder] = useState(order.custName||"");
  const [cardLast4,  setCardLast4]  = useState("");
  const [cardExpiry, setCardExpiry] = useState("");
  const [cardZip,    setCardZip]    = useState("");
  const [ref,        setRef]        = useState("");
  const [collecting, setCollecting] = useState(false);
  var canCollect=method==="card"?cardLast4.length===4&&cardExpiry.length===5:ref.trim().length>0;
  function collect(){
    if(!canCollect) return;
    setCollecting(true);
    var payRef=method==="card"?{type:"card",holder:cardHolder,last4:cardLast4,expiry:cardExpiry,zip:cardZip}:{type:method,ref:ref.trim()};
    setTimeout(function(){setCollecting(false);onCollect(payRef);addToast("Payment collected — receipt ready","success");onClose();},400);
  }
  return (
    <Modal title={"Collect Payment — "+order.id} onClose={onClose}
      footer={<div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
        <Btn onClick={collect} disabled={!canCollect||collecting}>{collecting?"Processing…":"✓ Confirm Payment Collected"}</Btn>
      </div>}>
      <div style={{padding:"10px 14px",background:C.success+"10",border:"1px solid "+C.success+"25",borderRadius:8,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:12,color:C.muted}}>Amount to collect</div>
        <div style={{fontSize:22,fontWeight:900,fontFamily:"monospace",color:C.success}}>{fmtMoney(totals.grand||0)}</div>
      </div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:8}}>Payment Method</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[["card","💳 Credit Card"],["cash","💵 Cash"],["check","📝 Check"]].map(function(opt){
            var sel=method===opt[0];
            return (
              <div key={opt[0]} onClick={function(){setMethod(opt[0]);}}
                style={{padding:"10px",borderRadius:8,border:"2px solid "+(sel?C.accent:C.border),background:sel?C.accent+"08":C.surface2,cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:16,marginBottom:3}}>{opt[1].split(" ")[0]}</div>
                <div style={{fontSize:11,fontWeight:sel?700:400,color:sel?C.accent:C.muted}}>{opt[1].split(" ").slice(1).join(" ")}</div>
              </div>
            );
          })}
        </div>
      </div>
      {method==="card"&&(
        <div style={{background:C.surface2,borderRadius:10,padding:"14px",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:C.text,marginBottom:10}}>Card Reference</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div style={{gridColumn:"1/-1"}}><Field label="Cardholder Name" value={cardHolder} onChange={setCardHolder} placeholder="Jane Smith"/></div>
            <div>
              <div style={{fontSize:10,fontWeight:600,color:C.muted,marginBottom:4}}>Last 4 Digits</div>
              <input value={cardLast4} onChange={function(e){setCardLast4(e.target.value.replace(/\D/g,"").slice(0,4));}} placeholder="4242" maxLength={4}

<script id="c5" type="text/plain">
function AdminTasks({reps,setReps,applications,setApplications,termsRequests,setTermsRequests,customers,setCustomers,orders,setOrders,products,addToast,showResult}) {
  const [tasksTab,      setTasksTab]      = useState("active");
  const [fulfillTarget, setFulfillTarget] = useState(null);
  const [collectTarget, setCollectTarget] = useState(null);
  var pendingW9       = reps.filter(function(r){return r.w9Status==="received"&&r.w9ReviewStatus!=="approved";});
  var submittedOrders = (orders||[]).filter(function(o){return o.status==="Submitted";});
  var historyTerms     = (termsRequests||[]).filter(function(r){return r.status==="approved"||r.status==="denied"||r.status==="approved_awaiting_signature"||r.status==="signed";});
  var pendingTermsAll  = (termsRequests||[]).filter(function(r){return r.status==="pending"||r.status==="approved_awaiting_signature";});
  var pendingApps = applications.filter(function(a){return !a.status||a.status==="pending";});
  var pendingReps = reps.filter(function(r){return r.status==="pending";});
  var total = pendingW9.length+pendingApps.length+pendingReps.length+submittedOrders.length;

  function approveW9(rep) {
    var updated = Object.assign({},rep,{w9ReviewStatus:"approved",w9ApprovedAt:new Date().toISOString()});
    setReps(function(prev){return prev.map(function(r){return r.id===rep.id?updated:r;});});
    dbSave("crm_reps",rep.id,updated);
    addToast("W-9 approved for "+rep.name,"success");
    showResult({type:"success",title:"W-9 Approved",subtitle:rep.name+"'s tax information is now verified.",rows:[["Rep",rep.name],["Status","Verified ✓"],["Date",fmtDate(new Date().toISOString())]],cta:"Done"});
  }

  function approveRep(rep) {
    var updated = Object.assign({},rep,{status:"active",approvedAt:new Date().toISOString()});
    setReps(function(prev){return prev.map(function(r){return r.id===rep.id?updated:r;});});
    dbSave("crm_reps",rep.id,updated);
    addToast(rep.name+" approved","success");
  }

  function approveApp(app) {
    var id = genId("rep");
    var newRep = {id:id,name:app.name,email:app.email,company:app.company||"",
      status:"active",subscriptionStatus:"trial",trialStartedAt:new Date().toISOString(),
      planId:"starter",createdAt:new Date().toISOString()};
    setReps(function(prev){return [newRep].concat(prev);});
    dbSave("crm_reps",id,newRep);
    var updated = Object.assign({},app,{status:"approved"});
    setApplications(function(prev){return prev.map(function(a){return a.id===app.id?updated:a;});});
    dbSave("crm_applications",app.id,updated);
    addToast(app.name+" approved","success");
  }

  function declineApp(app) {
    var updated = Object.assign({},app,{status:"declined"});
    setApplications(function(prev){return prev.map(function(a){return a.id===app.id?updated:a;});});
    dbSave("crm_applications",app.id,updated);
    addToast(app.name+" declined","warning");
  }

  return (

                    <Btn small variant="success" onClick={function(){

                        approvedAt:new Date().toISOString(),

                      dbSave("crm_terms_requests",req.id,updated);
                      if(customers&&setCustomers) {
                        var cust=customers.find(function(x){return x.id===req.custId;});
                        if(cust){
                          var token=cust.id+"_"+Math.random().toString(36).slice(2,9);
                          var co=JSON.parse(localStorage.getItem("__pv__invoiceCfg")||"{}").company||"PreVasive USA";
                          var sigData={
                            token:token,status:"pending",customer:cust,req:updated,
                            company:co,template:localStorage.getItem("__pv__creditAgreementTemplate")||"",
                            agreementHtml:generateCreditAgreementHtml(cust,updated,"",co),
                            createdAt:new Date().toISOString()
                          };
                          localStorage.setItem("__pv__sign_"+token,JSON.stringify(sigData));
                          var updCust=Object.assign({},cust,{termsStatus:"awaiting_signature",
                            termsType:req.requestedTerms,termsLimit:req.requestedLimit,
                            termsApprovedAt:new Date().toISOString(),termsSigningToken:token});
                          setCustomers(function(prev){return prev.map(function(x){return x.id===cust.id?updCust:x;});});

                      }
                      addToast("Approved — send signing link to customer","success");

                    <Btn small variant="ghost" onClick={function(){

                      dbSave("crm_terms_requests",req.id,updated);
                      if(customers&&setCustomers) {
                        var cust=customers.find(function(x){return x.id===req.custId;});
                        if(cust){var updCust=Object.assign({},cust,{termsStatus:"denied"});setCustomers(function(prev){return prev.map(function(x){return x.id===cust.id?updCust:x;});});dbSave("crm_customers",cust.id,updCust);}
                      }
                      addToast("Terms denied for "+req.custName,"warning");
                    }}>Deny</Btn>
                  {req.status==="approved_awaiting_signature"&&(
                      <div style={{marginTop:10,padding:"10px 12px",background:C.accent+"08",border:"1px solid "+C.accent+"25",borderRadius:8}}>
                        <div style={{fontSize:11,fontWeight:700,color:C.accent,marginBottom:8}}>

                        </div>

                              var link=window.location.origin+window.location.pathname+"#sign="+token;
                              navigator.clipboard.writeText(link).then(function(){addToast("Signing link copied!","success");});
                            }
                          }}>📋 Copy Signing Link</Btn>
                          <Btn small variant="ghost" onClick={function(){
                            // MARK AS SIGNED (TEST) — bypass customer signing for testing
                            var cust=customers&&customers.find(function(x){return x.id===req.custId;});
                            if(!cust){addToast("Customer not found","warning");return;}
                            var now=new Date().toISOString();
                            var updatedCust=Object.assign({},cust,{
                              termsStatus:"active",termsSigned:true,
                              termsSignedAt:now,termsSignerName:"[Admin Test Bypass]",
                              termsSignerTitle:"Test",
                            });
                            setCustomers(function(prev){return prev.map(function(x){return x.id===cust.id?updatedCust:x;});});
                            dbSave("crm_customers",cust.id,updatedCust);
                            var upReq=Object.assign({},req,{status:"signed",signedAt:now,signerName:"[Admin Test Bypass]"});
                            setTermsRequests(function(prev){return prev.map(function(r){return r.id===req.id?upReq:r;});});
                            dbSave("crm_terms_requests",req.id,upReq);
                            addToast("✓ Terms marked active (test bypass)","success");
                          }}>✓ Mark as Signed (Test)</Btn>
                          <Btn small variant="ghost" onClick={function(){
                            var sb=getSB();
                            if(!sb){addToast("Supabase not connected","warning");return;}
                            sb.from("crm_customers").select("data").eq("id",req.custId).single()
                              .then(function(res){
                                var d=res&&res.data&&res.data.data;
                                if(d&&d.termsStatus==="active"){
                                  setCustomers(function(prev){return prev.map(function(x){
                                    return x.id===req.custId?Object.assign({},x,d):x;
                                  });});
                                  var upReq=Object.assign({},req,{status:"signed",signedAt:d.termsSignedAt});
                                  setTermsRequests(function(prev){return prev.map(function(r){return r.id===req.id?upReq:r;});});
                                  dbSave("crm_terms_requests",req.id,upReq);
                                  addToast("✓ Agreement signed — terms now active!","success");
                                } else {
                                  addToast("Not signed yet — customer has not completed the agreement.","info");
                                }
                              }).catch(function(){addToast("Could not reach Supabase","danger");});
                          }}>🔄 Check if Signed</Btn>
                        </div>
                        <div style={{fontSize:10,color:C.dim,marginTop:6}}>
                          Send the signing link to your customer. Click "Check if Signed" after they complete it.
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              );})}
            </div>
          </div>
        );
      })()}

      {tasksTab==="active"&&pendingApps.length>0&&(
        <div style={{marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <span style={{fontSize:13,fontWeight:700,color:C.text}}>New Applications</span>
            <span style={{padding:"1px 8px",borderRadius:20,background:C.accent+"18",color:C.accent,fontSize:11,fontWeight:700}}>{pendingApps.length}</span>
          </div>
          <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
            {pendingApps.map(function(app,i){return (
              <div key={app.id} style={{padding:"14px 18px",borderBottom:i<pendingApps.length-1?"1px solid "+C.border:"none",
                                         display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <Avatar name={app.name} size={34}/>
                  <div>
                    <div style={{fontWeight:600,fontSize:13,color:C.text}}>{app.name}</div>
                    <div style={{fontSize:11,color:C.muted}}>
                      {app.email}
                      {app.company&&<span> · {app.company}</span>}
                      <span> · Applied {fmtDate(app.submittedAt)}</span>
                    </div>
                  </div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <Btn small onClick={function(){approveApp(app);}}>✓ Approve</Btn>
                  <Btn small variant="ghost" onClick={function(){declineApp(app);}}>Decline</Btn>
                </div>
              </div>
            );})}
          </div>
        </div>
      )}
    </div>
  );
}

<script id="c6" type="text/plain">

  const [requires, setRequires] = useState(true);
  const [viewDoc,  setViewDoc]  = useState(null);

  var SAMPLE_TEMPLATES = {
    contractor: "INDEPENDENT CONTRACTOR AGREEMENT\n\nThis Independent Contractor Agreement is entered into between PreVasive USA (Company) and the Sales Representative (Contractor).\n\n1. SERVICES\nContractor agrees to sell Company products to medical and healthcare customers within their designated territory.\n\n2. COMPENSATION\nContractor will receive commission as specified in their subscription plan. Commission is subject to a 15-day return window from confirmed delivery.\n\n3. INDEPENDENT CONTRACTOR STATUS\nContractor is an independent contractor. Contractor is responsible for all taxes, insurance, and business expenses.\n\n4. CONFIDENTIALITY\nContractor agrees to keep all Company information, pricing, and customer data strictly confidential.\n\n5. TERM\nThis agreement continues until terminated by either party with 30 days written notice.",
    nda: "NON-DISCLOSURE AGREEMENT\n\nThis Agreement is entered into between PreVasive USA and the Sales Representative.\n\n1. CONFIDENTIAL INFORMATION\nConfidential information includes: product pricing, customer lists, business strategies, technical specifications, and any proprietary information disclosed during the course of the business relationship.\n\n2. OBLIGATIONS\nRecipient agrees to: (a) keep all confidential information strictly secret; (b) not disclose to third parties without written consent; (c) use only for authorized sales activities.\n\n3. TERM\nThis obligation survives termination of the business relationship for a period of 3 years.",
    conduct: "CODE OF CONDUCT\n\nAs a PreVasive Sales Representative, you agree to:\n\n1. PROFESSIONAL STANDARDS\nRepresent PreVasive with integrity and professionalism at all times.\n\n2. COMPLIANCE\nComply with all applicable laws, including FDA regulations, HIPAA, and anti-kickback statutes when applicable.\n\n3. ACCURATE REPRESENTATION\nMake only truthful claims about PreVasive products. Do not make claims not supported by product documentation.\n\n4. CONFLICT OF INTEREST\nDisclose any potential conflicts of interest to your admin immediately.",
  };

  function openNew(tmpl) {
    setEditDoc(null);
    setTitle(tmpl==="contractor"?"Independent Contractor Agreement":tmpl==="nda"?"Non-Disclosure Agreement":tmpl==="conduct"?"Code of Conduct":"");
    setContent(SAMPLE_TEMPLATES[tmpl]||"");
    setDesc(""); setVersion("1.0"); setRequires(true); setShowForm(true);
  }

  function openEdit(doc) {
    setEditDoc(doc); setTitle(doc.title||""); setDesc(doc.description||"");
    setContent(doc.content||""); setVersion(doc.version||"1.0");
    setRequires(doc.requiresResign!==false); setShowForm(true);
  }

  function save() {
    if(!title.trim()) return;
    var id = editDoc?editDoc.id:genId("doc");
    var isNewVersion = editDoc && version !== editDoc.version;
    var data = {id:id,title:title.trim(),description:desc.trim(),content:content.trim(),
                version:version,requiresResign:requires,active:true,
                publishedAt:new Date().toISOString(),
                publishedBy:"Admin"};
    setLegalDocs(function(prev){
      return editDoc ? prev.map(function(d){return d.id===editDoc.id?data:d;}) : [data].concat(prev);
    });
    dbSave("crm_legal_docs",id,data);
    addToast(editDoc?"Document updated"+(isNewVersion?" — reps must re-sign":""):"Document published","success");
    setShowForm(false);
  }

  function toggleDoc(doc) {
    var updated = Object.assign({},doc,{active:!doc.active});
    setLegalDocs(function(prev){return prev.map(function(d){return d.id===doc.id?updated:d;});});
    dbSave("crm_legal_docs",doc.id,updated);

    <div>

          <Btn small variant="ghost" onClick={function(){openNew("nda");}}>+ NDA</Btn>
          <Btn small onClick={function(){openNew("");}}>+ New Doc</Btn>
        </div>}/>

      <div style={{display:"flex",gap:0,borderBottom:"1px solid "+C.border,marginBottom:24}}>
        {TABS.map(function(t){var act=tab===t.id;return (
          <button key={t.id} onClick={function(){setTab(t.id);}}
            style={{padding:"8px 16px",background:"none",border:"none",fontFamily:"inherit",cursor:"pointer",
                    fontSize:13,fontWeight:act?600:400,color:act?C.text:C.dim,
                    borderBottom:"2px solid "+(act?C.accent:"transparent"),marginBottom:-1}}>{t.l}</button>
        );})}
      </div>

      {tab==="docs"&&(

          <EmptyState icon="📄" title="No documents yet"
            subtitle="Publish legal documents that reps must sign before accessing the platform."

              <Btn small onClick={function(){openNew("contractor");}}>+ Contractor Agreement</Btn>

                );})}

              <tbody>

      {tab==="status"&&(

            <table style={{width:"100%",borderCollapse:"collapse"}}>

                {["Rep","Terms","Rep Agreement","W-9","Docs Signed"].map(function(h){return (

              <tbody>
                {reps.filter(function(r){return r.status!=="declined";}).map(function(rep){

                  var activeDocs = legalDocs.filter(function(d){return d.active&&d.requiresResign;});

                  function badge(ok,label) {
                    return <span style={{padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:700,background:(ok?C.success:C.danger)+"18",color:ok?C.success:C.danger}}>{ok?"✓ "+label:"✗ "+label}</span>;
                  }
                  return (
                    <tr key={rep.id} style={{borderTop:"1px solid "+C.border}}>
                      <td style={{padding:"10px 14px"}}>

                      <td style={{padding:"10px 14px"}}>{badge(!!rep.termsAcceptedAt,"Accepted")}</td>
                      <td style={{padding:"10px 14px"}}>{badge(!!rep.agreementSignedAt,"Signed")}</td>
                      <td style={{padding:"10px 14px"}}>{badge(rep.w9ReviewStatus==="approved","Verified")}</td>

            <Btn onClick={save}>{editDoc?"Save Changes":"Publish Document"}</Btn>
          </div>}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div style={{gridColumn:"1/-1"}}><Field label="Document Title *" value={title} onChange={setTitle} placeholder="Independent Contractor Agreement"/></div>
            <Field label="Version" value={version} onChange={setVersion} placeholder="1.0" hint="Increment to force re-signature from all reps"/>
            <Field label="Description (optional)" value={desc} onChange={setDesc} placeholder="Brief description shown to reps"/>

                       background:C.surface2,borderRadius:10,padding:"16px",
                       maxHeight:400,overflowY:"auto"}}>{viewDoc.content}</div>
        </Modal>

    </div>
  );
}

<script id="c7" type="text/plain">
function QuotesModule({quotes,setQuotes,products,customers,reps,orders,setOrders,
                       currentUser,isAdmin,addToast,showResult}) {
  const [showForm,  setShowForm]  = useState(false);
  const [viewQuote, setViewQuote] = useState(null);
  const [filter,    setFilter]    = useState("all");
  const [custId,    setCustId]    = useState("");
  const [items,     setItems]     = useState([{prodId:"",qty:1}]);
  const [notes,     setNotes]     = useState("");
  const [validDays, setValidDays] = useState("30");
  const [commRate,  setCommRate]  = useState(10);

  var myQuotes = isAdmin ? quotes : quotes.filter(function(q){
    return q.repId===(currentUser&&(currentUser.rep_id||currentUser.id));
  });
  var filtered = myQuotes.filter(function(q){return filter==="all"||q.status===filter;});

  var activeProds = products.filter(function(p){return p.active!==false;});
  var selCust = customers.find(function(c2){return c2.id===custId;})||null;

  function calcTotal() {
    return items.reduce(function(s,it){
      var p=products.find(function(x){return x.id===it.prodId;});
      return s+(p?p.price:0)*it.qty;
    },0);
  }

  function saveQuote() {
    if(!custId||!items.some(function(it){return it.prodId;})) return;
    var id = genId("qt");
    var expiry = new Date(Date.now()+(parseInt(validDays)||30)*24*60*60*1000).toISOString();
    var total = calcTotal();
    var q = {id:id,repId:currentUser&&(currentUser.rep_id||currentUser.id),
              repName:currentUser&&currentUser.name,
              custId:custId,custName:selCust?selCust.name:"",
              items:items.filter(function(it){return it.prodId;}).map(function(it){
        var p=products.find(function(x){return x.id===it.prodId;})||{price:0};
        var rate3=parseFloat(commRate)||0;
        return Object.assign({},it,{unitPrice:p.price,customerPrice:Math.round(p.price*(1+rate3/100)*100)/100});
      }),
              total:total,commissionRate:commRate,
              notes:notes,validUntil:expiry,
              status:"draft",createdAt:new Date().toISOString()};
    setQuotes(function(prev){return [q].concat(prev);});
    dbSave("crm_quotes",id,q);
    addToast("Quote "+id+" created","success");
    setShowForm(false); setCustId(""); setItems([{prodId:"",qty:1}]); setNotes("");
  }

  function convertToOrder(quote) {
    var id = "ORD-"+String(Date.now()).slice(-6);
    var commR = quote.commissionRate||0;
    if(!commR&&quote.repId) { var repForComm=reps.find(function(r){return r.id===quote.repId;}); commR=(repForComm&&repForComm.defaultCommissionRate)||10; }
    var order = Object.assign({},quote,{id:id,status:"Submitted",
      createdAt:new Date().toISOString(),commissionRate:commR,
      totals:{baseSubtotal:quote.total,subtotal:Math.round(quote.total*(1+commR/100)*100)/100,shipping:0,tax:0,
              grand:Math.round(quote.total*(1+commR/100)*100)/100,
              commission:Math.round(quote.total*(commR/100)*100)/100,commRate:commR},
      quoteId:quote.id,payMethod:"pay_later"});
    setOrders(function(prev){return [order].concat(prev);});
    dbSave("crm_orders",id,order);
    var updated = Object.assign({},quote,{status:"converted",convertedOrderId:id});
    setQuotes(function(prev){return prev.map(function(q){return q.id===quote.id?updated:q;});});
    dbSave("crm_quotes",quote.id,updated);
    addToast("Quote converted to Order "+id,"success");
    showResult({type:"order",title:"Order Created!",subtitle:"Quote converted to order successfully.",
      rows:[["Order #",id],["Customer",quote.custName],["Total",fmtMoney(quote.total)],["Status","Submitted"]],cta:"Done"});
    setViewQuote(null);
  }

  function sendQuote(quote) {
    var updated = Object.assign({},quote,{status:"sent",sentAt:new Date().toISOString()});
    setQuotes(function(prev){return prev.map(function(q){return q.id===quote.id?updated:q;});});
    dbSave("crm_quotes",quote.id,updated);
    addToast("Quote sent to "+quote.custName,"success");
    setViewQuote(updated);
  }

  var STATUS_COLORS = {draft:{c:C.muted,bg:C.surface2},sent:{c:C.accent,bg:C.accent+"15"},
    converted:{c:C.success,bg:C.success+"15"},expired:{c:C.danger,bg:C.danger+"12"}};

  return (
    <div>
      <PageHeader title={isAdmin?"Quotes":"My Quotes"} subtitle={myQuotes.length+" quotes"}
        action={<Btn onClick={function(){setShowForm(true);}}>+ New Quote</Btn>}/>

      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:18,borderBottom:"1px solid "+C.border,paddingBottom:12}}>
        {["all","draft","sent","converted","expired"].map(function(s){
          var act=filter===s;
          return <button key={s} onClick={function(){setFilter(s);}}
            style={{padding:"6px 12px",borderRadius:6,border:"none",fontFamily:"inherit",cursor:"pointer",
                    fontSize:11,fontWeight:act?600:400,background:act?C.accent+"18":"transparent",
                    color:act?C.accent:C.muted,textTransform:"capitalize"}}>{s==="all"?"All Quotes":s}</button>;
        })}
      </div>

      {filtered.length===0 ? (
        <EmptyState icon="📝" title="No quotes" subtitle="Create a quote for a customer to get started."
          action={<Btn onClick={function(){setShowForm(true);}}>New Quote</Btn>}/>
      ) : (
        <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:C.surface2}}>
              {["Quote","Customer",isAdmin?"Rep":"","Total","Valid Until","Status",""].map(function(h){return h&&(
                <th key={h} style={{padding:"8px 14px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>
              );})}
            </tr></thead>
            <tbody>
              {filtered.map(function(q){
                var sc = STATUS_COLORS[q.status]||STATUS_COLORS.draft;
                var expired = q.status!=="converted"&&q.validUntil&&new Date(q.validUntil)<new Date();
                return (
                  <tr key={q.id} style={{borderTop:"1px solid "+C.border,cursor:"pointer"}}
                    onClick={function(){setViewQuote(q);}}>
                    <td style={{padding:"10px 14px",fontSize:12,fontFamily:"monospace",fontWeight:700,color:C.accent}}>{q.id}</td>
                    <td style={{padding:"10px 14px",fontSize:12,color:C.text}}>{q.custName||"—"}</td>
                    {isAdmin&&<td style={{padding:"10px 14px",fontSize:12,color:C.muted}}>{q.repName||"—"}</td>}
                    <td style={{padding:"10px 14px",fontSize:12,fontFamily:"monospace",fontWeight:700}}>{fmtMoney(q.total||0)}</td>
                    <td style={{padding:"10px 14px",fontSize:11,color:expired?C.danger:C.muted}}>{fmtDate(q.validUntil)}</td>
                    <td style={{padding:"10px 14px"}}>
                      <span style={{padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700,background:expired?C.danger+"12":sc.bg,color:expired?C.danger:sc.c,textTransform:"capitalize"}}>
                        {expired?"expired":q.status}
                      </span>
                    </td>
                    <td style={{padding:"10px 14px"}} onClick={function(e){e.stopPropagation();}}>
                      {q.status==="draft"&&<Btn small onClick={function(){sendQuote(q);}}>Send</Btn>}
                      {(q.status==="sent"||q.status==="draft")&&<Btn small variant="success" onClick={function(){convertToOrder(q);}}>→ Order</Btn>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* New Quote Form */}
      {showForm&&(
        <Modal title="New Quote" wide={true} onClose={function(){setShowForm(false);}}
          footer={<div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn variant="ghost" onClick={function(){setShowForm(false);}}>Cancel</Btn>
            <Btn onClick={saveQuote} disabled={!custId}>Save Quote</Btn>
          </div>}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <div>
              <Drop label="Customer *" value={custId} onChange={setCustId}
                opts={[{v:"",label:"Select customer…"}].concat(customers.filter(function(c2){return !isAdmin?c2.repId===(currentUser&&(currentUser.rep_id||currentUser.id)):true;}).map(function(c2){return {v:c2.id,label:c2.name+(c2.company?" — "+c2.company:"")};}))}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Field label="Valid For (days)" value={validDays} onChange={setValidDays} type="number"/>
                <div>
                  <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:5}}>Commission %</div>
                  <input type="range" min="0" max="25" step="0.5" value={commRate}
                    onChange={function(e){setCommRate(e.target.value);}}
                    style={{width:"100%",accentColor:C.accent,marginTop:8}}/>
                  <div style={{fontSize:12,fontWeight:700,color:C.gold,textAlign:"right"}}>{commRate}% = {fmtMoney(calcTotal()*(commRate/100))}</div>
                </div>
              </div>
              <TextArea label="Notes" value={notes} onChange={setNotes} rows={3} placeholder="Quote terms, delivery timeline…"/>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:8}}>Items</div>
              {items.map(function(it,i){return (
                <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 70px auto",gap:8,marginBottom:8,alignItems:"flex-end"}}>
                  <select value={it.prodId} onChange={function(e){setItems(function(prev){return prev.map(function(x,j){return j===i?Object.assign({},x,{prodId:e.target.value}):x;});});}}
                    style={{background:C.bg,border:"1px solid "+C.border,borderRadius:7,padding:"8px 10px",color:it.prodId?C.text:C.dim,fontSize:12,fontFamily:"inherit",outline:"none"}}>
                    <option value="">Product…</option>
                    {activeProds.map(function(p){return <option key={p.id} value={p.id}>{p.name} — {fmtMoney(p.price)}</option>;})}
                  </select>
                  <input type="number" min="1" value={it.qty}
                    onChange={function(e){setItems(function(prev){return prev.map(function(x,j){return j===i?Object.assign({},x,{qty:parseInt(e.target.value)||1}):x;});});}}
                    style={{background:C.bg,border:"1px solid "+C.border,borderRadius:7,padding:"8px 10px",color:C.text,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
                  {items.length>1&&<button onClick={function(){setItems(function(prev){return prev.filter(function(_,j){return j!==i;});});}} style={{background:"none",border:"none",color:C.danger,cursor:"pointer",fontSize:16}}>×</button>}
                </div>

              <button onClick={function(){setItems(function(prev){return prev.concat([{prodId:"",qty:1}]);});}}
                style={{width:"100%",padding:"8px",borderRadius:7,border:"1px dashed "+C.border,background:"none",color:C.accent,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600}}>+ Add Item</button>
              <div style={{background:C.surface2,borderRadius:10,padding:"14px",marginTop:14}}>
                <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:16,color:C.accent}}>
                  <span>Quote Total</span><span style={{fontFamily:"monospace"}}>{fmtMoney(calcTotal())}</span>
                </div>
