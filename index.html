function RepCustomers({repId,customers,setCustomers,orders,termsRequests,setTermsRequests,addToast}) {
  const [showForm, setShowForm] = useState(false);
  const [editCust, setEditCust] = useState(null);
  const [viewCust2,setViewCust2] = useState(null);
  const [termsReqCust,setTermsReqCust] = useState(null);
  const [editCustModal,setEditCustModal] = useState(null);
  const [name,   setName]   = useState(""); const [email,   setEmail]   = useState("");
  const [company,setCompany] = useState(""); const [phone,   setPhone]   = useState("");
  const [addr,   setAddr]   = useState(""); const [city,    setCity]    = useState("");
  const [state2, setState2] = useState(""); const [zip,     setZip]     = useState("");
  const [payTerms,setPayTerms] = useState(""); const [search, setSearch] = useState("");
  var myCusts = customers.filter(function(c2){return c2.repId===repId;});
  var filtered = myCusts.filter(function(c2){
    if(!search) return true; var s=search.toLowerCase();
    return (c2.name||"").toLowerCase().indexOf(s)>=0||(c2.company||"").toLowerCase().indexOf(s)>=0;
  });
  function openNew(){setEditCust(null);setName("");setEmail("");setCompany("");setPhone("");setAddr("");setCity("");setState2("");setZip("");setPayTerms("");setShowForm(true);}
  function openEdit(c2){setEditCust(c2);setName(c2.name||"");setEmail(c2.email||"");setCompany(c2.company||"");setPhone(c2.phone||"");setAddr(c2.address||"");setCity(c2.city||"");setState2(c2.state||"");setZip(c2.zip||"");setPayTerms(c2.paymentTerms||"");setShowForm(true);}
  function save(){
    if(!name.trim()) return;
    var id=editCust?editCust.id:genId("cust");
    var data={id:id,repId:repId,name:name.trim(),email:email.trim(),company:company.trim(),phone:phone.trim(),address:addr.trim(),city:city.trim(),state:state2.trim(),zip:zip.trim(),updatedAt:new Date().toISOString()};
    if(editCust&&editCust.termsStatus) data.termsStatus=editCust.termsStatus;
    if(editCust&&editCust.termsType) data.termsType=editCust.termsType;
    if(editCust&&editCust.termsLimit) data.termsLimit=editCust.termsLimit;
    if(!editCust) data.createdAt=new Date().toISOString();
    setCustomers(function(prev){return editCust?prev.map(function(c2){return c2.id===editCust.id?data:c2;}):[data].concat(prev);});
    dbSave("crm_customers",id,data); addToast(editCust?"Customer updated":"Customer added","success"); setShowForm(false);
  }
  return (
    <div>
      <PageHeader title="My Customers" subtitle={myCusts.length+" customers"} action={<Btn onClick={openNew}>+ Add Customer</Btn>}/>
      <div style={{marginBottom:14}}>
        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search customers…"
          style={{width:"100%",maxWidth:360,background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:"8px 12px",color:C.text,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
      </div>
      {filtered.length===0?<EmptyState icon="👥" title="No customers" subtitle="Add your first customer." action={<Btn onClick={openNew}>Add Customer</Btn>}/>:(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
          {filtered.map(function(c2){
            var custOrds=orders.filter(function(o){return o.custId===c2.id;});
            var spend=custOrds.reduce(function(s,o){return s+(o.totals&&o.totals.grand||0);},0);
            return (
              <div key={c2.id} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"16px 18px"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <Avatar name={c2.name} size={34}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:14,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c2.name}</div>
                    {c2.company&&<div style={{fontSize:11,color:C.dim}}>{c2.company}</div>}
                  </div>
                </div>
                {c2.email&&<div style={{fontSize:11,color:C.muted,marginBottom:4}}>✉ {c2.email}</div>}
                {c2.phone&&<div style={{fontSize:11,color:C.muted,marginBottom:4}}>📞 {c2.phone}</div>}
                {c2.paymentTerms&&<div style={{fontSize:10,fontWeight:600,padding:"1px 7px",borderRadius:20,background:C.accent+"12",color:C.accent,display:"inline-block",marginBottom:4}}>{fmtTerms(c2.paymentTerms)}</div>}
                {(c2.termsStatus==="approved"||c2.termsStatus==="active")&&(
                  <div style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:C.success+"15",color:C.success,display:"inline-block",marginBottom:4,marginLeft:4}}>
                    ✓ {fmtTerms(c2.termsType||"net_30")} · ${(c2.termsLimit||0).toLocaleString()} limit
                  </div>
                )}
                {c2.termsStatus==="pending"&&(
                  <div style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:20,background:C.warning+"15",color:C.warning,display:"inline-block",marginBottom:4,marginLeft:4}}>
                    ⏳ Terms Pending
                  </div>
                )}
                {c2.termsStatus==="awaiting_signature"&&(
                  <div style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:C.accent+"15",color:C.accent,display:"inline-block",marginBottom:4,marginLeft:4}}>
                    ✍ Awaiting Signature
                  </div>
                )}
                {c2.termsStatus==="active"&&(
                  <div style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:C.success+"15",color:C.success,display:"inline-block",marginBottom:4,marginLeft:4}}>
                    ✓ Active · {fmtTerms(c2.termsType||"net_30")}
                  </div>
                )}
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.dim,padding:"8px 0",borderTop:"1px solid "+C.border,marginBottom:10}}>
                  <span>{custOrds.length} orders</span><span style={{fontWeight:700,color:C.success}}>{fmtMoney(spend)}</span>
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <Btn small variant="outline" onClick={function(){setViewCust2(c2);}} fullWidth={true}>View Profile</Btn>
                  <Btn small variant="ghost" onClick={function(){setEditCustModal(c2);}} fullWidth={true}>Edit</Btn>
                  {c2.termsStatus!=="active"&&c2.termsStatus!=="awaiting_signature"&&(
                    <Btn small variant="ghost"
                      onClick={function(){if(c2.termsStatus!=="pending")setTermsReqCust(c2);}}
                      fullWidth={true}
                      disabled={c2.termsStatus==="pending"}>
                      {c2.termsStatus==="pending"?"⏳ Terms Pending":"+ Request Terms"}
                    </Btn>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {viewCust2&&<CustomerProfile customer={viewCust2} orders={orders} onEdit={openEdit} onClose={function(){setViewCust2(null);}}/>}
      {showForm&&(
        <Modal title={editCust?"Edit Customer":"New Customer"} onClose={function(){setShowForm(false);}}
          footer={<div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={function(){setShowForm(false);}}>Cancel</Btn><Btn onClick={save}>{editCust?"Save":"Add Customer"}</Btn></div>}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{gridColumn:"1/-1"}}><Field label="Full Name *" value={name} onChange={setName} placeholder="Dr. Jane Smith"/></div>
            <Field label="Email" value={email} onChange={setEmail} type="email" placeholder="jane@practice.com"/>
            <Field label="Phone" value={phone} onChange={setPhone} placeholder="555-1234"/>
            <div style={{gridColumn:"1/-1"}}><Field label="Company" value={company} onChange={setCompany} placeholder="Smith Medical Group"/></div>
            <div style={{gridColumn:"1/-1"}}>
              <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:5}}>Payment Terms</div>
              <div style={{padding:"10px 14px",background:C.surface2,border:"1px solid "+C.border,borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  {editCust&&editCust.termsStatus==="active"?(
                    <span style={{fontSize:12,fontWeight:700,color:C.success}}>✓ {fmtTerms(editCust.termsType||"net_30")} · ${(editCust.termsLimit||0).toLocaleString()} limit</span>
                  ):editCust&&editCust.termsStatus==="awaiting_signature"?(
                    <span style={{fontSize:12,fontWeight:600,color:C.accent}}>✍ Awaiting customer signature</span>
                  ):editCust&&editCust.termsStatus==="pending"?(
                    <span style={{fontSize:12,fontWeight:600,color:C.warning}}>⏳ Terms request pending admin review</span>
                  ):(
                    <span style={{fontSize:12,color:C.dim}}>No credit terms — use "Request Terms" from customer card</span>
                  )}
                </div>
                <span style={{fontSize:10,color:C.dim,fontStyle:"italic"}}>Set by admin only</span>
              </div>
            </div>
            <div style={{gridColumn:"1/-1"}}><Field label="Address" value={addr} onChange={setAddr} placeholder="123 Medical Dr"/></div>
            <Field label="City" value={city} onChange={setCity}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <Field label="State" value={state2} onChange={setState2} placeholder="CA"/>
              <Field label="ZIP" value={zip} onChange={setZip}/>
            </div>
          </div>
        </Modal>
      )}
      {termsReqCust&&(
        <TermsRequestModal
          customer={termsReqCust}
          repId={repId}
          repName=""
          onSubmit={function(req){
            var id=genId("tr");
            var newReq=Object.assign({},req,{id:id});
            setTermsRequests(function(prev){return [newReq].concat(prev);});
            dbSave("crm_terms_requests",id,newReq);
            var updated=Object.assign({},termsReqCust,{termsStatus:"pending",termsRequestedAt:new Date().toISOString()});
            setCustomers(function(prev){return prev.map(function(x){return x.id===termsReqCust.id?updated:x;});});
            dbSave("crm_customers",termsReqCust.id,updated);
          }}
          onClose={function(){setTermsReqCust(null);}}
          addToast={addToast}/>
      )}
    </div>
  );
}

          currentUser={currentUser}

          onClose={function(){setShowSendInv(false);}}/>
      )}
    </div>
  );
}

<script id="c14" type="text/plain">
function RepCommissions({repId,orders,commissions,repName,payoutRequests,setPayoutRequests,addToast,repData}) {
  var now6 = Date.now();
  var myOrds = orders.filter(function(o){return o.repId===repId;});
  var myComm = (commissions||[]).filter(function(cp){return cp.repId===repId;});
  var paidIds = myComm.map(function(cp){return cp.orderId;});
  var held = myOrds.filter(function(o){
    if(!o.deliveredAt||o.status==="Cancelled"||o.status==="Refunded"||o.status==="Returned") return false;
    return (now6-new Date(o.deliveredAt).getTime()) < RETURN_WINDOW_DAYS*24*60*60*1000;
  });
  var released = myOrds.filter(function(o){
    if(!o.deliveredAt||o.status==="Cancelled"||o.status==="Refunded"||o.status==="Returned") return false;
    return (now6-new Date(o.deliveredAt).getTime())>=RETURN_WINDOW_DAYS*24*60*60*1000&&paidIds.indexOf(o.id)<0;
  });
  var totalPaid  = myComm.reduce(function(s,cp){return s+(cp.amount||0);},0);
  var totalHeld  = held.reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);
  var totalReady = released.reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);

  return (
    <div>
      <PageHeader title="My Commissions"/>
      <CommissionStatement repId={repId} orders={orders} commissions={commissions} repName={repName}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:24}}>
        <KpiCard label="Total Earned" value={fmtMoney(totalPaid)} sub="Paid out" color={C.success}/>
        <KpiCard label="Ready to Collect" value={fmtMoney(totalReady)} sub={released.length+" orders"} color={C.gold}/>
        <KpiCard label="In Return Window" value={fmtMoney(totalHeld)} sub={"Held · "+RETURN_WINDOW_DAYS+"-day window"} color={C.warning}/>
      </div>
      {released.length>0&&(
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>Ready to Release</div>
          <div style={{background:C.surface,border:"1px solid "+C.gold+"30",borderRadius:12,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:C.surface2}}>{["Order","Customer","Delivered","Commission"].map(function(h){return <th key={h} style={{padding:"8px 14px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>;})}</tr></thead>
              <tbody>{released.map(function(o){return (
                <tr key={o.id} style={{borderTop:"1px solid "+C.border}}>
                  <td style={{padding:"10px 14px",fontSize:12,fontFamily:"monospace",fontWeight:700,color:C.accent}}>{o.id}</td>
                  <td style={{padding:"10px 14px",fontSize:12,color:C.text}}>{o.custName||"—"}</td>
                  <td style={{padding:"10px 14px",fontSize:11,color:C.muted}}>{fmtDate(o.deliveredAt)}</td>
                  <td style={{padding:"10px 14px",fontSize:13,fontFamily:"monospace",fontWeight:700,color:C.gold}}>{fmtMoney(o.totals&&o.totals.commission||0)}</td>
                </tr>
              );})}</tbody>
            </table>
          </div>
          <div style={{fontSize:11,color:C.muted,marginTop:8}}>Contact your admin to process payout.</div>
        </div>
      )}
      {held.length>0&&(
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>In Return Window</div>
          <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:C.surface2}}>{["Order","Customer","Delivered","Releases","Commission"].map(function(h){return <th key={h} style={{padding:"8px 14px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>;})}</tr></thead>
              <tbody>{held.map(function(o){
                var rel=new Date(new Date(o.deliveredAt).getTime()+RETURN_WINDOW_DAYS*24*60*60*1000);
                return (
                  <tr key={o.id} style={{borderTop:"1px solid "+C.border}}>
                    <td style={{padding:"10px 14px",fontSize:12,fontFamily:"monospace",fontWeight:700,color:C.accent}}>{o.id}</td>
                    <td style={{padding:"10px 14px",fontSize:12,color:C.text}}>{o.custName||"—"}</td>
                    <td style={{padding:"10px 14px",fontSize:11,color:C.muted}}>{fmtDate(o.deliveredAt)}</td>
                    <td style={{padding:"10px 14px",fontSize:11,color:C.warning,fontWeight:600}}>{fmtDate(rel.toISOString())}</td>
                    <td style={{padding:"10px 14px",fontSize:13,fontFamily:"monospace",fontWeight:700,color:C.warning}}>🔒 {fmtMoney(o.totals&&o.totals.commission||0)}</td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        </div>
      )}
      {myComm.length>0&&(
        <div>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>Payment History</div>

      setReps(function(prev){return prev.map(function(r){
        if(r.id===repId2) {
          var upd=Object.assign({},r,{stripeConnectId:accountId,stripePayoutsEnabled:false});
          dbSave("crm_reps",r.id,upd);
          return upd;
        }
        return r;
      });});
      addToast("Bank account connected! Payouts will be sent to your Stripe account.","success");
      window.history.replaceState(null,"",window.location.pathname);
    }
  }, []);
  const [creditAgreementTemplate,setCreditAgreementTemplate] = useLS("creditAgreementTemplate","");
  const [stripeAccountA, setStripeAccountA] = useLS("stripeAccountA",{
    publishableKey:"", secretKey:"", webhookSecret:"", edgeFnUrl:"",
  });
  const [stripeLinks, setStripeLinks] = useLS("stripeLinks",{
    starter:"", pro:"", portal:"",
    starterPriceId:"", proPriceId:"",
  });
  const [payoutRequests,setPayoutRequests] = useState([]);

  // Apply theme
  Object.assign(C, THEMES[theme]||THEMES.dark);
  useEffect(function(){
    document.body.style.background = C.bg;
    document.body.style.color = C.text;
  }, [theme]);

  function addToast(msg, type, detail) {
    var id = Date.now();
    setToasts(function(prev){return [{id:id,msg:msg,type:type||"success",detail:detail||""}].concat(prev).slice(0,5);});
    setTimeout(function(){setToasts(function(prev){return prev.filter(function(t){return t.id!==id;});});}, 4500);
  }

  function showResult(data) { setResultModal(data); }

  // Session restore
  useEffect(function() {
    var sb = getSB();
    if(!sb) { setLoading(false); return; }

    function loadUser(session) {
      if(!session) { setCurrentUser(null); setLoading(false); return; }
      sb.from("crm_users").select("*").eq("id",session.user.id).single()
        .then(function(ur){
          if(ur.data) setCurrentUser(Object.assign({},ur.data,{email:session.user.email}));
          else setCurrentUser(null);
          setLoading(false);
        }).catch(function(){ setLoading(false); });
    }

    sb.auth.getSession().then(function(r){
      loadUser(r.data&&r.data.session);
    }).catch(function(){ setLoading(false); });

    var authListener = sb.auth.onAuthStateChange(function(event,session){
      if(event==="SIGNED_IN")  loadUser(session);
      if(event==="SIGNED_OUT") { setCurrentUser(null); setActiveTab("dashboard"); }
      if(event==="TOKEN_REFRESHED") loadUser(session);
    });
    return function(){ authListener&&authListener.data&&authListener.data.subscription&&authListener.data.subscription.unsubscribe(); };
  }, []);

  // Load data when logged in
  useEffect(function() {
    if(!currentUser) return;
    var alive = true;
    setDataLoading(true);
    dbLoad("crm_orders").then(function(d){if(alive) setOrders(d);});
    dbLoad("crm_customers").then(function(d){if(alive) setCustomers(d);});
    dbLoad("crm_products").then(function(d){if(alive) setProducts(d);});
    dbLoad("crm_reps").then(function(d){if(alive) setReps(d);});
    dbLoad("crm_commission_payouts").then(function(d){if(alive) setCommissions(d);});
    dbLoad("crm_applications").then(function(d){if(alive) setApplications(d);});
    dbLoad("crm_legal_docs").then(function(d){if(alive) setLegalDocs(d);});
    dbLoad("crm_legal_signatures").then(function(d){if(alive) setSignatures(d);});
    dbLoad("crm_quotes").then(function(d){if(alive) setQuotes(d);});
    dbLoad("crm_terms_requests").then(function(d){if(alive) setTermsRequests(d);});
    dbLoad("crm_payout_requests").then(function(d){if(alive) setPayoutRequests(d);});
    Promise.all([]).then(function(){if(alive) setDataLoading(false);}); 
    return function(){alive=false;};
  }, [currentUser&&currentUser.id]);

  function handleLogin(user) { setCurrentUser(user); setActiveTab("dashboard"); }
  function handleLogout() {
    var sb = getSB();
    if(sb) sb.auth.signOut();
    setCurrentUser(null); setActiveTab("dashboard");
  }

  // Receipt page — no auth required
  if(receiptToken) {
    var rcptData = null;
    try { rcptData = JSON.parse(localStorage.getItem("__pv__rcpt_"+receiptToken)||"null"); } catch(e){}
    if(rcptData) return React.createElement(ReceiptPage, {receiptData:rcptData});
  }

  // Invoice payment page — no auth required
  if(payToken) {
    var payData2 = null;
    try { payData2 = JSON.parse(localStorage.getItem("__pv__pay_"+payToken)||"null"); } catch(e){}
    if(payData2 && payData2.status!=="paid") {
      return React.createElement(CustomerPaymentPage, {
        payData: payData2,
        onPaid: function(result) {
          var updated = Object.assign({},payData2,{status:"paid",paidAt:result.paidAt,payMethod:result.method,cardRef:result.cardRef});
          localStorage.setItem("__pv__pay_"+payToken, JSON.stringify(updated));
          // Generate receipt token
          var co2 = JSON.parse(localStorage.getItem("__pv__invoiceCfg")||"{}").company||"PreVasive USA";
          var rToken = generateReceiptToken(payData2.order,payData2.customer,{type:result.method},co2);
          var rLink  = window.location.origin+window.location.pathname+"#receipt="+rToken;
          updated.receiptToken = rToken;
          updated.receiptLink  = rLink;
          localStorage.setItem("__pv__pay_"+payToken, JSON.stringify(updated));
          // Update order in Supabase
          var sb = getSB();
          if(sb && payData2.order && payData2.order.id) {
            sb.from("crm_orders").update({data:Object.assign({},payData2.order,{status:"Paid",paidAt:result.paidAt,payMethod:result.method,receiptToken:rToken}),updated_at:new Date().toISOString()}).eq("id",payData2.order.id);
          }
          // Also update in-memory orders if admin is viewing
          setOrders(function(prev){return prev.map(function(o){
            return o.id===payData2.order.id?Object.assign({},o,{status:"Paid",paidAt:result.paidAt,receiptToken:rToken}):o;
          });});
        },
        onDecline: function(){ setPayToken(null); if(window.history) window.history.replaceState(null,"",window.location.pathname); },
      });
    }
  }

  // Credit agreement signing page — no auth required
  if(signingToken) {
    var sigData = null;
    try { sigData = JSON.parse(localStorage.getItem("__pv__sign_"+signingToken)||"null"); } catch(e){}
    if(sigData && sigData.status!=="signed") {
      return React.createElement(CustomerSigningPage, {
        signingData: sigData,
        onSigned: function(sig) {
          var updatedSig = Object.assign({},sigData,{status:"signed",
            signerName:sig.signerName,signerTitle:sig.signerTitle,signedAt:sig.signedAt});
          localStorage.setItem("__pv__sign_"+signingToken, JSON.stringify(updatedSig));
          var sb = getSB();
          if(sb && sigData.customer && sigData.customer.id) {
            // Merge signing data INTO existing customer — do NOT overwrite entire record
            var updatedCust = Object.assign({},sigData.customer,{
              termsStatus:"active",
              termsSigned:true,
              termsSignedAt:sig.signedAt,
              termsSignerName:sig.signerName,
              termsSignerTitle:sig.signerTitle||"",
            });
            sb.from("crm_customers")
              .update({data:updatedCust,updated_at:new Date().toISOString()})
              .eq("id",sigData.customer.id)
              .then(function(){
                // Update in-memory customers state so admin sees change immediately
                setCustomers(function(prev){return prev.map(function(x){
                  return x.id===sigData.customer.id?updatedCust:x;
                });});
              });
            // Also update the terms request record to "signed"
            if(sigData.req&&sigData.req.id) {
              var updatedReq = Object.assign({},sigData.req,{
                status:"signed",
                signedAt:sig.signedAt,
                signerName:sig.signerName,
              });
              sb.from("crm_terms_requests")
                .update({data:updatedReq,updated_at:new Date().toISOString()})
                .eq("id",sigData.req.id)
                .then(function(){
                  setTermsRequests(function(prev){return prev.map(function(x){
                    return x.id===sigData.req.id?updatedReq:x;
                  });});
                });
            }
          }
        },
        onDecline: function() {
          if(window.history) window.history.replaceState(null,"",window.location.pathname);
          setSigningToken(null);
        },
      });
    }
  }

  if(inviteToken) return React.createElement(InviteRegistration,{
    token:inviteToken,
    onComplete:function(){
      setInviteToken(null);
      if(window.history) window.history.replaceState(null,"",window.location.pathname);
    }
  });

  if(loading) return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Inter',system-ui,sans-serif"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:32,height:32,border:"3px solid "+C.border,borderTopColor:C.accent,
                     borderRadius:"50%",animation:"spin .7s linear infinite",margin:"0 auto 16px"}}/>
        <div style={{fontSize:13,color:C.muted}}>Loading…</div>
      </div>
    </div>
  );

  if(!currentUser) return React.createElement(AppLanding, {onLogin:handleLogin});

  // Impersonation override
  var effectiveUser = viewAsRep ? Object.assign({},currentUser,{role:"rep",rep_id:viewAsRep.repId,name:viewAsRep.repName,_isImpersonated:true}) : currentUser;
  var isAdmin = !viewAsRep && currentUser.role==="admin";
  var myRepData = isAdmin ? null : (viewAsRep ? reps.find(function(r){return r.id===viewAsRep.repId;})||viewAsRep.repData : reps.find(function(r){return r.id===currentUser.rep_id||r.email===currentUser.email;})||null);

  // Legal docs signing gate
  var unsignedDocs = !isAdmin && currentUser ? legalDocs.filter(function(doc){
    if(!doc.active) return false;
    var alreadySigned = signatures.some(function(s){
      return s.docId===doc.id && s.repId===(effectiveUser.rep_id||effectiveUser.id) && s.version===doc.version;
    });
    return !alreadySigned;
  }) : [];

  // Rep agreement gate (skip when admin impersonating)
  var needsAgreement = !isAdmin && !viewAsRep && myRepData && !myRepData.agreementSignedAt;
  // Rep subscription gate
  var now2 = Date.now();
  var trialExpired = !isAdmin && !viewAsRep && myRepData && myRepData.trialStartedAt &&
    (now2-new Date(myRepData.trialStartedAt).getTime()) >= TRIAL_DAYS*24*60*60*1000 &&
    myRepData.subscriptionStatus!=="active";

  // Terms of service gate — first login only for reps (skip when admin impersonating)
  var needsTerms = !isAdmin && !viewAsRep && myRepData && !myRepData.termsAcceptedAt;

  if(needsTerms) return React.createElement(TermsModal, {
    onAccept: function() {
      var updated = Object.assign({},myRepData,{termsAcceptedAt:new Date().toISOString()});
      setReps(function(prev){return prev.map(function(r){return r.id===myRepData.id?updated:r;});});
      dbSave("crm_reps",myRepData.id,updated);
    },
    onDecline: handleLogout,
  });

  if(!isAdmin && !viewAsRep && unsignedDocs.length>0 && myRepData && myRepData.agreementSignedAt) {
    var doc = unsignedDocs[0];
    return React.createElement(LegalDocSignModal, {
      doc: doc,
      repId: effectiveUser.rep_id||effectiveUser.id,
      repName: effectiveUser.name,
      onSign: function() {
        var sig = {id:genId("sig"),docId:doc.id,version:doc.version,
                   repId:effectiveUser.rep_id||effectiveUser.id,
                   repName:effectiveUser.name,signedAt:new Date().toISOString()};
        setSignatures(function(prev){return prev.concat([sig]);});
        dbSave("crm_legal_signatures",sig.id,sig);
      },
      onDecline: handleLogout,
    });
  }

  if(needsAgreement) return React.createElement(RepAgreementModal, {
    repName: currentUser.name,
    onAgree: function() {
      var updated = Object.assign({},myRepData,{
        agreementSignedAt: new Date().toISOString(),
        agreementVersion: REP_AGREEMENT_VERSION,
      });
      setReps(function(prev){return prev.map(function(r){return r.id===myRepData.id?updated:r;});});
      dbSave("crm_reps",myRepData.id,updated);
    },
    onDecline: handleLogout,
  });

  if(trialExpired) return React.createElement(RepSubscriptionWall, {
    rep: myRepData,
    onActivate: function(planId) {
      var updated = Object.assign({},myRepData,{planId:planId,subscriptionStatus:"active",planActivatedAt:new Date().toISOString()});
      setReps(function(prev){return prev.map(function(r){return r.id===myRepData.id?updated:r;});});
      dbSave("crm_reps",myRepData.id,updated);
    },
    onLogout: handleLogout,
  });

  var adminModules = [
    {label:"General"},
    {id:"dashboard",  name:"Dashboard",   icon:"◉"},
    {id:"email",      name:"Email",       icon:"✉️"},
    {id:"orders",     name:"Orders",      icon:"📦"},
    {id:"quotes",      name:"Quotes",      icon:"📝"},
    {id:"customers",  name:"Customers",   icon:"👥"},
    {id:"products",   name:"Products",    icon:"📋"},
    {divider:true},
    {label:"Management"},
    {id:"reps",       name:"Sales Reps",  icon:"🤝"},
    {id:"pricing",     name:"Pricing",     icon:"🏷️"},
    {id:"tasks",       name:"Tasks",       icon:"✅", badge:true},
    {id:"legal",       name:"Legal & Compliance", icon:"⚖️", badge:"legal"},
    {id:"commissions",name:"Commissions", icon:"💰"},
    {id:"settings",   name:"Settings",    icon:"⚙️"},
  ];

  var repModules = [
    {id:"dashboard",  name:"Dashboard",   icon:"◉"},
    {id:"email",      name:"Email",       icon:"✉️"},
    {id:"new_order",  name:"New Order",   icon:"➕"},
    {id:"rep_quotes",  name:"My Quotes",   icon:"📝"},
    {id:"orders",     name:"My Orders",   icon:"📦"},
    {id:"customers",  name:"Customers",   icon:"👥"},
    {id:"commissions",name:"Commissions", icon:"💰"},
    {id:"profile",    name:"My Profile",  icon:"👤"},
  ];

  var modules = isAdmin ? adminModules : repModules;

  return (
    <div style={{display:"flex",minHeight:"100vh",background:C.bg,color:C.text,
                 fontFamily:"'Inter',system-ui,-apple-system,sans-serif"}}>
      <Sidebar modules={modules} active={activeTab} onNav={function(id){setActiveTab(id);}}
        user={viewAsRep?Object.assign({},currentUser,{name:viewAsRep.repName,role:"rep",_impersonating:currentUser.name}):currentUser}
        onLogout={handleLogout} theme={theme}
        onToggleTheme={function(){setTheme(theme==="dark"?"light":"dark");}}
        taskCount={isAdmin?(reps.filter(function(r){return (r.w9Status==="received"&&r.w9ReviewStatus!=="approved")||r.status==="pending";}).length+applications.filter(function(a){return !a.status||a.status==="pending";}).length+(termsRequests||[]).filter(function(r){return r.status==="pending";}).length+orders.filter(function(o){return o.status==="Submitted";}).length):0}
        legalBadge={isAdmin?reps.filter(function(r){
          return r.status==="active"&&legalDocs.filter(function(d){return d.active&&d.requiresResign;}).some(function(d){
            return !signatures.some(function(s){return s.docId===d.id&&s.version===d.version&&s.repId===r.id;});
          });
        }).length:0}/>

      <div style={{display:"flex",flexDirection:"column",flex:1,minWidth:0}}>
      <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:8,padding:"10px 20px 0",flexShrink:0}}>
        <NotificationsBell notifications={notifications}
          onMarkRead={function(id){setNotifications(function(prev){return prev.map(function(n){return n.id===id?Object.assign({},n,{read:true}):n;});});}}
          onClear={function(){setNotifications([]);}}/>
        <button onClick={function(){setShowSearch(true);}}
          style={{background:"none",border:"none",cursor:"pointer",padding:"6px 10px",
                  borderRadius:8,color:C.muted,fontSize:13,lineHeight:1,display:"flex",alignItems:"center",gap:5}}>🔍 Search</button>
        <button onClick={function(){setShowHelp(true);}}
          style={{background:"none",border:"none",cursor:"pointer",padding:"6px",
                  borderRadius:8,color:C.muted,fontSize:16,lineHeight:1}}>?</button>
      </div>
      <main style={{flex:1,overflowY:"auto",padding:viewAsRep?"28px 32px 28px":"12px 32px 28px",minWidth:0}}>
        {/* Admin Modules */}
        {(activeTab==="email")&&(
          <EmailModule currentUser={currentUser} customers={customers} orders={orders}
            repId={effectiveUser.rep_id||effectiveUser.id}
            isAdmin={isAdmin} addToast={addToast} showResult={showResult}/>
        )}
        {(activeTab==="quotes"||activeTab==="rep_quotes")&&(
          <QuotesModule quotes={quotes} setQuotes={setQuotes}
            products={products} customers={customers} reps={reps} orders={orders}
            setOrders={setOrders} currentUser={currentUser} isAdmin={isAdmin}
            addToast={addToast} showResult={showResult}/>
        )}
        {isAdmin&&activeTab==="pricing"&&(
          <PricingModule products={products} discountCodes={discountCodes}
            onSaveDiscountCodes={setDiscountCodes} addToast={addToast}/>
        )}

        {isAdmin&&activeTab==="dashboard"&&(
          <AdminDashboard orders={orders} reps={reps} customers={customers} products={products} commissions={commissions} onNav={setActiveTab}/>
        )}
        {isAdmin&&activeTab==="orders"&&(
          <AdminOrders orders={orders} reps={reps} customers={customers} products={products}
            onUpdate={function(updated){setOrders(function(prev){return prev.map(function(o){return o.id===updated.id?updated:o;});});}}
            addToast={addToast} showResult={showResult} currentUser={currentUser}/>
        )}
        {isAdmin&&activeTab==="customers"&&(
          <AdminCustomers customers={customers} setCustomers={setCustomers} reps={reps} orders={orders} addToast={addToast}/>
        )}
        {isAdmin&&activeTab==="products"&&(
          <AdminProducts products={products} setProducts={setProducts} addToast={addToast}/>
        )}
        {isAdmin&&activeTab==="reps"&&(
          <AdminReps reps={reps} setReps={setReps} orders={orders}
            commissions={commissions} setCommissions={setCommissions}
            applications={applications} setApplications={setApplications}
            legalDocs={legalDocs} signatures={signatures}
            addToast={addToast} showResult={showResult}
            onViewAsRep={function(rep){setViewAsRep(rep);setActiveTab("dashboard");}}/>
        )}
        {isAdmin&&activeTab==="commissions"&&(
          <AdminCommissions orders={orders} reps={reps} commissions={commissions}
            setCommissions={setCommissions} addToast={addToast} showResult={showResult}
            payoutRequests={payoutRequests} setPayoutRequests={setPayoutRequests}/>
        )}
        {isAdmin&&activeTab==="legal"&&(
          <AdminLegal legalDocs={legalDocs} setLegalDocs={setLegalDocs}
            signatures={signatures} setSignatures={setSignatures}
            reps={reps} addToast={addToast}/>
        )}
        {isAdmin&&activeTab==="tasks"&&(
          <AdminTasks reps={reps} setReps={setReps}
            applications={applications} setApplications={setApplications}
            termsRequests={termsRequests} setTermsRequests={setTermsRequests}
            customers={customers} setCustomers={setCustomers}
            orders={orders} setOrders={setOrders} products={products}
            addToast={addToast} showResult={showResult}/>
        )}
        {isAdmin&&activeTab==="settings"&&(
          <AdminSettings supabaseCfg={supabaseCfg} onSaveSupabase={setSupabaseCfg}
            discountCodes={discountCodes} onSaveDiscountCodes={setDiscountCodes}
            invoiceCfg={invoiceCfg} onSaveInvoice={setInvoiceCfg}
            shippingRules={shippingRules} onSaveShippingRules={setShippingRules}
            shipStationCfg={shipStationCfg} onSaveShipStation={setShipStationCfg}
            taxCfg={taxCfg} onSaveTax={setTaxCfg}
            googleCfg={googleCfg} onSaveGoogle={setGoogleCfg}
            emailCfg={emailCfg} onSaveEmail={setEmailCfg}
            creditAgreementTemplate={creditAgreementTemplate} setCreditAgreementTemplate={setCreditAgreementTemplate}
            stripeLinks={stripeLinks} setStripeLinks={setStripeLinks}
            stripeAccountA={stripeAccountA} setStripeAccountA={setStripeAccountA}
            orders={orders} customers={customers} commissions={commissions}
            reps={reps} addToast={addToast}/>
        )}

        {/* Rep Modules */}
        {!isAdmin&&activeTab==="dashboard"&&(
          <RepDashboard repId={effectiveUser.rep_id||effectiveUser.id} repName={effectiveUser.name}
            orders={orders} customers={customers} commissions={commissions} onNav={setActiveTab} addToast={addToast}/>
        )}
        {!isAdmin&&(activeTab==="orders"||activeTab==="new_order")&&(
          <RepOrders repId={effectiveUser.rep_id||effectiveUser.id} repName={effectiveUser.name}
            currentUser={effectiveUser} repData={myRepData} orders={orders} customers={customers} products={products}
            setOrders={setOrders} setCustomers={setCustomers}
            addToast={addToast} showResult={showResult} discountCodes={discountCodes}
            shippingRules={shippingRules}
            autoOpen={activeTab==="new_order"}/>
        )}
        {!isAdmin&&activeTab==="customers"&&(
          <RepCustomers repId={effectiveUser.rep_id||effectiveUser.id}
            customers={customers} setCustomers={setCustomers}
            orders={orders} termsRequests={termsRequests}
            setTermsRequests={setTermsRequests} addToast={addToast}/>
        )}
        {!isAdmin&&activeTab==="commissions"&&(
          <RepCommissions repId={effectiveUser.rep_id||effectiveUser.id}
            orders={orders} commissions={commissions} repName={effectiveUser.name}
            payoutRequests={payoutRequests} setPayoutRequests={setPayoutRequests}
            addToast={addToast} repData={myRepData}/>
        )}
        {!isAdmin&&activeTab==="profile"&&(
          <RepProfile user={effectiveUser} repData={myRepData} setReps={setReps} commissions={commissions} addToast={addToast}/>
        )}
        {!isAdmin&&activeTab==="new_order"&&null}
      </main>
      {showHelp&&<HelpModal isAdmin={isAdmin} onClose={function(){setShowHelp(false);}}/>}
      {showSearch&&<GlobalSearch orders={orders} customers={customers} reps={reps} quotes={quotes} products={products} isAdmin={isAdmin} onNav={setActiveTab} onClose={function(){setShowSearch(false);}}/>}
      {viewAsRep&&React.createElement(ImpersonationBanner,{rep:viewAsRep,onExit:function(){setViewAsRep(null);setActiveTab("dashboard");}})}
      </div>
      {React.createElement(ToastStack,{toasts:toasts,setToasts:setToasts})}
      {resultModal&&React.createElement(ResultModal,{data:resultModal,onClose:function(){setResultModal(null);}})}
    </div>
  );
}

</script>

<script>
var N=16;
window.addEventListener('load',function(){
  var e=document.getElementById('err');
  function showErr(m){e.style.display='block';e.textContent=m;}
  try{
    var code='const {useState,useCallback,useRef,useEffect}=React;\n';
    for(var i=0;i<N;i++){var src=document.getElementById('c'+i).textContent;code+=Babel.transform(src,{presets:[['react',{}]],sourceType:'script',filename:'c'+i+'.jsx'}).code+'\n';}
    code+='\nReactDOM.createRoot(document.getElementById(\'root\')).render(React.createElement(App));';
    new Function('React','ReactDOM',code)(React,ReactDOM);
  }catch(ex){showErr('Error: '+ex.message+'\n\n'+(ex.stack||''));}
});
</script></body></html>
