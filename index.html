function getSB() {
  if(_sb) return _sb;
  try {
    if(window.supabase) {
      _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      return _sb;
    }
  } catch(e){}
  return null;
}

function dbSave(table, id, data) {
  var sb = getSB(); if(!sb) return;
  sb.from(table).upsert({id:id,data:data,updated_at:new Date().toISOString()})
    .then(function(r){if(r.error) console.warn("dbSave:",r.error.message);});
}

function dbDel(table, id) {
  var sb = getSB(); if(!sb) return;
  sb.from(table).delete().eq("id",id)
    .then(function(r){if(r.error) console.warn("dbDel:",r.error.message);});
}

function dbLoad(table) {
  var sb = getSB();
  if(!sb) return Promise.resolve([]);
  return sb.from(table).select("data").order("updated_at",{ascending:false})
    .then(function(r){
      if(r.error){console.warn("dbLoad ["+table+"]:",r.error.message);return [];}
      return (r.data||[]).map(function(row){return row.data;}).filter(Boolean);
    })
    .catch(function(e){console.warn("dbLoad ["+table+"] fetch error:",e.message);return [];});
}

/* ─── Theme ──────────────────────────────────────────────────────────────── */
var THEMES = {
  dark: {
    bg:"#09111f", surface:"#0d1826", surface2:"#121f30", border:"#1e2d40",
    accent:"#635bff", gold:"#f6ab2f", success:"#1ea672", warning:"#f6ab2f",

/* ─── Hooks ──────────────────────────────────────────────────────────────── */
function useLS(key, def) {
  var raw = localStorage.getItem("__pv__"+key);
  var init = raw ? JSON.parse(raw) : def;
  var result = useState(init);
  var v = result[0]; var setVRaw = result[1];
  var setV = useCallback(function(x){
    var val = typeof x === "function" ? x(v) : x;
    localStorage.setItem("__pv__"+key, JSON.stringify(val));
    setVRaw(val);
  }, [v, key]);
  return [v, setV];
}

function genId(prefix) {
  return (prefix||"id")+"_"+Math.random().toString(36).slice(2,9);
}

function fmtMoney(n) {
  return "$"+(parseFloat(n)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");
}

function fmtDate(d) {
  if(!d) return "—";
  return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}

/* ─── UI Primitives ──────────────────────────────────────────────────────── */
function Btn({children,onClick,disabled,variant,small,icon,fullWidth}) {
  var styles = {
    primary: {background:"#635bff",color:"#fff",border:"none",boxShadow:"0 1px 8px rgba(99,91,255,.4)"},
    danger:  {background:C.danger, color:"#fff",border:"none"},
    ghost:   {background:"transparent",color:C.muted,border:"1px solid "+C.border},
    success: {background:C.success,color:"#fff",border:"none"},
    outline: {background:"transparent",color:C.accent,border:"1px solid "+C.accent},
  };
  var s = styles[variant||"primary"];
  return (
    <button onClick={onClick} disabled={disabled}
      style={Object.assign({},s,{
        padding:small?"5px 12px":"9px 20px",
        borderRadius:6,cursor:disabled?"not-allowed":"pointer",
        opacity:disabled?0.55:1,fontFamily:"inherit",fontWeight:600,
        fontSize:small?11:13,letterSpacing:"-.01em",
        display:"inline-flex",alignItems:"center",gap:6,
        width:fullWidth?"100%":undefined,justifyContent:fullWidth?"center":undefined,
        transition:"opacity .15s"
      })}>
      {children}
    </button>
  );
}

function Field({label,value,onChange,type,placeholder,readOnly,children,hint}) {
  var inp = Object.assign({
    width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:7,
    padding:"9px 12px",color:C.text,fontSize:13,fontFamily:"inherit",
    boxSizing:"border-box",outline:"none",
  }, readOnly ? {opacity:0.6,cursor:"default"} : {});
  return (
    <div style={{marginBottom:14}}>
      {label&&<div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:5,letterSpacing:"-.01em"}}>{label}</div>}
      {children||(
        <input value={value||""} onChange={onChange?function(e){onChange(e.target.value);}:undefined}
          type={type||"text"} placeholder={placeholder||""} readOnly={!!readOnly} style={inp}/>
      )}
      {hint&&<div style={{fontSize:11,color:C.dim,marginTop:4}}>{hint}</div>}
    </div>
  );
}

function Drop({label,value,onChange,opts,hint}) {

                padding:"9px 12px",color:C.text,fontSize:13,fontFamily:"inherit",
                boxSizing:"border-box",outline:"none",cursor:"pointer"}}>

function Modal({title,onClose,children,footer,wide}) {

/* ─── Toast + Result Modal ───────────────────────────────────────────────── */
function ToastStack({toasts,setToasts}) {
  if(!toasts||!toasts.length) return null;
  return (
    <div style={{position:"fixed",bottom:24,right:24,zIndex:5000,
                 display:"flex",flexDirection:"column-reverse",gap:8,pointerEvents:"none"}}>
      {toasts.map(function(t){
        var col = {success:C.success,error:C.danger,warning:C.warning,info:C.accent}[t.type]||C.accent;
        return (
          <div key={t.id} style={{pointerEvents:"all",display:"flex",alignItems:"flex-start",gap:10,
                                   padding:"12px 16px",borderRadius:10,minWidth:280,maxWidth:380,
                                   background:C.surface,border:"1px solid "+col+"40",
                                   boxShadow:"0 8px 32px rgba(0,0,0,.3)",animation:"slideIn .2s ease"}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:col,flexShrink:0,marginTop:5}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:C.text,lineHeight:1.4}}>{t.msg}</div>
              {t.detail&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>{t.detail}</div>}
            </div>
            <button onClick={function(){setToasts(function(prev){return prev.filter(function(x){return x.id!==t.id;});});}}
              style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:16,padding:0}}>×</button>
          </div>
        );
      })}
    </div>
  );
}

function ResultModal({data,onClose}) {
  if(!data) return null;
  var icons = {order:"📦",email:"✉️",payment:"💳",commission:"💰",rep:"🤝",success:"✓",error:"⚠️"};
  var col = data.type==="error"?C.danger:C.success;
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(9,17,31,.75)",backdropFilter:"blur(6px)",
                 zIndex:4000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
         onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:C.surface,border:"1px solid "+col+"30",borderRadius:14,
                   padding:"32px 28px",maxWidth:420,width:"100%",
                   boxShadow:"0 24px 60px rgba(0,0,0,.5)",textAlign:"center"}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:col+"15",border:"2px solid "+col+"30",
                     display:"flex",alignItems:"center",justifyContent:"center",
                     fontSize:22,margin:"0 auto 16px"}}>{icons[data.type]||"✓"}</div>
        <div style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:6,letterSpacing:"-.02em"}}>{data.title}</div>
        {data.subtitle&&<div style={{fontSize:13,color:C.muted,marginBottom:16,lineHeight:1.6}}>{data.subtitle}</div>}
        {data.rows&&(
          <div style={{background:C.surface2,borderRadius:10,padding:"14px 16px",marginBottom:20,textAlign:"left"}}>
            {data.rows.map(function(row,i){return (
              <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,
                                   padding:"4px 0",borderBottom:i<data.rows.length-1?"1px solid "+C.border:"none"}}>
                <span style={{color:C.muted}}>{row[0]}</span>
                <span style={{fontWeight:600,color:C.text}}>{row[1]}</span>
              </div>
            );})}
          </div>
        )}
        {data.nextStep&&(
          <div style={{padding:"10px 14px",background:C.accent+"10",border:"1px solid "+C.accent+"20",
                       borderRadius:8,marginBottom:20,fontSize:12,color:C.accent,fontWeight:500}}>
            {data.nextStep}
          </div>
        )}
        <Btn onClick={onClose} fullWidth={true}>{data.cta||"Done"}</Btn>
      </div>
    </div>
  );
}

        <div style={{padding:"22px 24px 16px",borderBottom:"1px solid "+C.border}}>

          <div style={{fontSize:19,fontWeight:700,color:C.text,letterSpacing:"-.02em"}}>Sales Representative Agreement</div>

              <div key={cl.id} style={{marginBottom:14,padding:"14px 16px",borderRadius:10,

                                       border:"1px solid "+(ok?C.success+"30":C.border),

                  <input type="checkbox" checked={!!ok} onChange={function(){toggle(cl.id);}}
                    style={{width:15,height:15,accentColor:C.success,cursor:"pointer"}}/>
                  <span style={{fontSize:12,fontWeight:600,color:ok?C.success:C.muted}}>
                    {ok?"I agree to this clause":"I agree to this clause"}

function AppLanding({onLogin}) {
  const [showSignIn,  setShowSignIn]  = useState(false);
  const [showReg,     setShowReg]     = useState(false);
  const [siEmail,     setSiEmail]     = useState("");
  const [siPass,      setSiPass]      = useState("");
  const [siErr,       setSiErr]       = useState("");
  const [regDone,     setRegDone]     = useState(false);
  const [resetMode,   setResetMode]   = useState(false);
  const [newPass,     setNewPass]     = useState("");
  const [newPass2,    setNewPass2]    = useState("");
  const [resetErr,    setResetErr]    = useState("");
  const [resetDone,   setResetDone]   = useState(false);
  const [resetBusy,   setResetBusy]   = useState(false);
  const [signingIn,   setSigningIn]   = useState(false);

  useEffect(function() {
    var hash = window.location.hash||"";
    if(hash.indexOf("type=recovery")>=0 && hash.indexOf("access_token")>=0) {
      var sb = getSB();
      if(sb) {
        sb.auth.getSession().then(function(r){
          if(r.data&&r.data.session) setResetMode(true);
        });
      }
    }
  }, []);

  function handleSignIn() {
    if(!siEmail||!siPass){setSiErr("Email and password are required.");return;}
    var sb = getSB();
    if(!sb){setSiErr("Connection error — check your internet connection and try again.");return;}
    setSigningIn(true); setSiErr("");
    sb.auth.signInWithPassword({email:siEmail,password:siPass})
      .then(function(r){
        setSigningIn(false);
        if(r.error){setSiErr(r.error.message);return;}
        var uid = r.data&&r.data.user&&r.data.user.id;
        if(!uid){setSiErr("Login failed.");return;}
        return sb.from("crm_users").select("*").eq("id",uid).single()
          .then(function(ur){
            if(!ur.data){setSiErr("Account not configured. Ask admin to add your user profile.");return;}
            onLogin(Object.assign({},ur.data,{email:r.data.user.email}));
          });
      })
      .catch(function(err){
        setSigningIn(false);
        if(err.message&&err.message.indexOf("fetch")>=0) {
          setSiErr("Cannot connect to server. Make sure you are accessing this app from its hosted URL (not a local file).");
        } else {
          setSiErr(err.message||"Sign in error");
        }
      });
  }

  function handleReset() {
    if(!newPass.trim()){setResetErr("Enter a new password.");return;}
    if(newPass.length<8){setResetErr("Password must be at least 8 characters.");return;}
    if(newPass!==newPass2){setResetErr("Passwords do not match.");return;}
    var sb = getSB();
    if(!sb){setResetErr("Service unavailable.");return;}
    setResetBusy(true); setResetErr("");
    sb.auth.updateUser({password:newPass})
      .then(function(r){
        setResetBusy(false);
        if(r.error){setResetErr(r.error.message);return;}
        setResetDone(true);
        if(window.history) window.history.replaceState(null,"",window.location.pathname);
      })
      .catch(function(err){setResetBusy(false);setResetErr(err.message||"Error");});
  }

  var navStyle = {
    position:"fixed",top:0,left:0,right:0,zIndex:100,
    borderBottom:"1px solid rgba(255,255,255,.06)",
    background:C.surface+"f5",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"
  };

  if(resetMode) return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",
                 justifyContent:"center",padding:16,fontFamily:"'Inter',system-ui,sans-serif"}}>
      <div style={{background:"#0d1826",border:"1px solid rgba(255,255,255,.08)",borderRadius:14,
                   padding:"40px 36px",width:"100%",maxWidth:400,boxShadow:"0 24px 80px rgba(0,0,0,.6)"}}>
        {resetDone ? (
          <div style={{textAlign:"center"}}>
            <div style={{width:52,height:52,borderRadius:"50%",background:"rgba(30,166,114,.15)",
                         display:"flex",alignItems:"center",justifyContent:"center",
                         fontSize:22,margin:"0 auto 18px"}}>✓</div>
            <div style={{fontSize:20,fontWeight:700,marginBottom:8,color:C.text,letterSpacing:"-.02em"}}>Password Updated</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:24,lineHeight:1.6}}>You can now sign in with your new password.</div>
            <button onClick={function(){setResetMode(false);setResetDone(false);setNewPass("");setNewPass2("");setShowSignIn(true);}}
              style={{padding:"10px 28px",borderRadius:6,border:"none",background:"#635bff",color:"#fff",
                      cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:14,letterSpacing:"-.01em"}}>
              Sign In
            </button>
          </div>
        ) : (

            <div style={{fontSize:13,color:C.muted,marginBottom:22}}>Minimum 8 characters.</div>
            {resetErr&&<div style={{padding:"9px 12px",background:"rgba(223,27,65,.12)",border:"1px solid rgba(223,27,65,.3)",borderRadius:6,color:"#df1b41",fontSize:12,marginBottom:14}}>{resetErr}</div>}
            {["New Password","Confirm Password"].map(function(label,i){

                        fontFamily:"inherit",fontWeight:500,fontSize:12}}>
                Cancel
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );

  return (

                          cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:13}}>Done</button>
              </div>
            ) : (
              <div>
                <div style={{fontSize:18,fontWeight:700,marginBottom:5,color:C.text,letterSpacing:"-.02em"}}>Apply to join</div>
                <div style={{fontSize:12,color:C.muted,marginBottom:20}}>Submit your information to apply as a sales rep.</div>
                <ApplyForm onSubmit={function(data){
                  var sb = getSB();

                }} onCancel={function(){setShowReg(false);}}/>

    return (now-new Date(o.deliveredAt).getTime()) < RETURN_WINDOW_DAYS*24*60*60*1000;
  }).reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);
  var releasedComm = orders.filter(function(o){

  }).reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);

function AdminOrders({orders,reps,customers,products,onUpdate,addToast}) {
  const [search,    setSearch]    = useState("");
  const [filter,    setFilter]    = useState("all");
  const [viewOrder, setViewOrder] = useState(null);

  var filtered = orders.filter(function(o){
    if(filter!=="all" && o.status!==filter) return false;
    if(search) {
      var s = search.toLowerCase();
      return (o.id||"").toLowerCase().indexOf(s)>=0 ||
             (o.repName||"").toLowerCase().indexOf(s)>=0 ||
             (o.custName||"").toLowerCase().indexOf(s)>=0;
    }
    return true;
  });

  function advance(order) {
    var idx = ORDER_PIPELINE.indexOf(order.status);
    if(idx<0||idx>=ORDER_PIPELINE.length-1) return;
    var next = ORDER_PIPELINE[idx+1];
    var patch = {status:next};
    if(next==="Delivered") patch.deliveredAt = new Date().toISOString();
    var updated = Object.assign({},order,patch);
    onUpdate(updated);
    setViewOrder(updated);
    dbSave("crm_orders",order.id,updated);
    addToast("Order "+order.id+" → "+next,"info");
  }

  function cancel(order) {
    var updated = Object.assign({},order,{status:"Cancelled"});
    onUpdate(updated);
    setViewOrder(updated);
    dbSave("crm_orders",order.id,updated);
    addToast("Order "+order.id+" cancelled","warning");
  }

  return (
    <div>
      <PageHeader title="Orders" subtitle={orders.length+" total orders"}/>
      {/* Filters */}
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
        <input value={search} onChange={function(e){setSearch(e.target.value);}}
          placeholder="Search orders, reps, customers…"
          style={{flex:1,minWidth:200,background:C.surface,border:"1px solid "+C.border,
                  borderRadius:8,padding:"8px 12px",color:C.text,fontSize:13,
                  fontFamily:"inherit",outline:"none"}}/>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {["all"].concat(ORDER_PIPELINE).concat(["Cancelled"]).map(function(s){
            var active = filter===s;
            return (
              <button key={s} onClick={function(){setFilter(s);}}
                style={{padding:"7px 12px",borderRadius:6,border:"none",fontFamily:"inherit",cursor:"pointer",
                        fontSize:11,fontWeight:active?600:400,letterSpacing:"-.01em",
                        background:active?C.accent+"18":"transparent",
                        color:active?C.accent:C.muted}}>
                {s==="all"?"All Orders":s}
              </button>
            );
          })}
        </div>
      </div>

      {filtered.length===0 ? (
        <EmptyState icon="📦" title="No orders" subtitle="Orders placed by sales reps will appear here."/>
      ) : (
        <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:C.surface2}}>
              {["Order","Date","Rep","Customer","Items","Total","Commission","Status",""].map(function(h){return (
                <th key={h} style={{padding:"8px 14px",textAlign:"left",fontSize:10,color:C.dim,
                                   textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>
              );})}
            </tr></thead>
            <tbody>
              {filtered.map(function(o){return (
                <tr key={o.id} style={{borderTop:"1px solid "+C.border,cursor:"pointer"}}
                  onClick={function(){setViewOrder(o);}}>
                  <td style={{padding:"10px 14px",fontSize:12,fontFamily:"monospace",fontWeight:700,color:C.accent}}>{o.id}</td>
                  <td style={{padding:"10px 14px",fontSize:11,color:C.muted}}>{fmtDate(o.createdAt)}</td>
                  <td style={{padding:"10px 14px",fontSize:12,color:C.text}}>{o.repName||"—"}</td>
                  <td style={{padding:"10px 14px",fontSize:12,color:C.text}}>{o.custName||"—"}</td>
                  <td style={{padding:"10px 14px",fontSize:12,color:C.muted,fontFamily:"monospace"}}>{(o.items||[]).length}</td>
                  <td style={{padding:"10px 14px",fontSize:12,fontFamily:"monospace",fontWeight:600,color:C.text}}>{fmtMoney(o.totals&&o.totals.grand||0)}</td>
                  <td style={{padding:"10px 14px",fontSize:12,fontFamily:"monospace",color:C.gold}}>{fmtMoney(o.totals&&o.totals.commission||0)}</td>
                  <td style={{padding:"10px 14px"}}><Badge status={o.status}/></td>
                  <td style={{padding:"10px 14px"}} onClick={function(e){e.stopPropagation();}}>
                    {ORDER_PIPELINE.indexOf(o.status)>=0&&ORDER_PIPELINE.indexOf(o.status)<ORDER_PIPELINE.length-1&&(
                      <Btn small onClick={function(){advance(o);}}>
                        → {ORDER_PIPELINE[ORDER_PIPELINE.indexOf(o.status)+1]}
                      </Btn>
                    )}
                  </td>
                </tr>
              );})}
            </tbody>
          </table>
        </div>
      )}

      {/* Order Detail Modal */}
      {viewOrder&&(
        <Modal title={"Order "+viewOrder.id} wide={true} onClose={function(){setViewOrder(null);}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:".07em",marginBottom:12}}>Order Details</div>
              <div style={{background:C.surface2,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                {[
                  ["Status", <Badge status={viewOrder.status}/>],
                  ["Rep", viewOrder.repName||"—"],
                  ["Customer", viewOrder.custName||"—"],
                  ["Date", fmtDate(viewOrder.createdAt)],
                  ["Commission Rate", (viewOrder.commissionRate||0)+"%"],
                ].map(function(row,i){return (
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                                       padding:"6px 0",borderBottom:i<4?"1px solid "+C.border:"none"}}>
                    <span style={{fontSize:12,color:C.muted}}>{row[0]}</span>
                    <span style={{fontSize:12,fontWeight:600,color:C.text}}>{row[1]}</span>
                  </div>
                );})}
              </div>

              {/* Items */}
              <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:".07em",marginBottom:10}}>Items</div>
              <div style={{background:C.surface2,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                {(viewOrder.items||[]).map(function(it,i){
                  var p = products.find(function(x){return x.id===it.prodId;})||{name:"Unknown"};
                  return (
                    <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,
                                         padding:"4px 0",borderBottom:i<(viewOrder.items||[]).length-1?"1px solid "+C.border:"none"}}>
                      <span style={{color:C.muted}}>{it.qty}× {p.name}</span>
                      <span style={{fontFamily:"monospace",fontWeight:600}}>{fmtMoney((it.unitPrice||0)*it.qty)}</span>
                    </div>
                  );
                })}
                <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,color:C.accent,
                             fontSize:15,marginTop:8,paddingTop:8,borderTop:"1px solid "+C.border}}>
                  <span>Total</span>
                  <span style={{fontFamily:"monospace"}}>{fmtMoney(viewOrder.totals&&viewOrder.totals.grand||0)}</span>
                </div>
              </div>
            </div>

            <div>
              {/* Commission hold */}
              {viewOrder.repId&&(function(){
                var now2 = Date.now();
                var delMs = viewOrder.deliveredAt ? new Date(viewOrder.deliveredAt).getTime() : null;
                var expired = delMs ? (now2-delMs) >= RETURN_WINDOW_DAYS*24*60*60*1000 : false;
                var held = delMs && !expired && viewOrder.status!=="Cancelled" && viewOrder.status!=="Refunded";
                var blocked = viewOrder.status==="Cancelled"||viewOrder.status==="Refunded";
                if(!delMs) return null;
                var col2 = blocked?C.danger:held?C.warning:C.success;
                var msg = blocked?"🚫 Commission blocked — order cancelled/refunded"
                        : held?"🔒 Held — return window expires "+fmtDate(new Date(delMs+RETURN_WINDOW_DAYS*24*60*60*1000).toISOString())
                        : "✅ Commission released — return window closed";
                return (
                  <div style={{padding:"10px 14px",background:col2+"10",border:"1px solid "+col2+"30",
                               borderRadius:10,marginBottom:14,fontSize:12,color:col2,fontWeight:600}}>
                    {msg}
                  </div>
                );
              })()}

              {/* Totals */}
              <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:".07em",marginBottom:10}}>Financials</div>
              <div style={{background:C.surface2,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                {[
                  ["Subtotal", fmtMoney(viewOrder.totals&&viewOrder.totals.subtotal||0)],
                  ["Shipping", fmtMoney(viewOrder.totals&&viewOrder.totals.shipping||0)],
                  ["Tax", fmtMoney(viewOrder.totals&&viewOrder.totals.tax||0)],
                  ["Grand Total", fmtMoney(viewOrder.totals&&viewOrder.totals.grand||0)],
                  ["Commission ("+( viewOrder.commissionRate||0)+"%)", fmtMoney(viewOrder.totals&&viewOrder.totals.commission||0)],
                ].map(function(row,i){return (
                  <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,
                                       padding:"5px 0",borderBottom:i<4?"1px solid "+C.border:"none",
                                       fontWeight:i===3||i===4?700:400,
                                       color:i===3?C.accent:i===4?C.gold:C.text}}>
                    <span style={{color:i<3?C.muted:undefined}}>{row[0]}</span>
                    <span style={{fontFamily:"monospace"}}>{row[1]}</span>
                  </div>
                );})}
              </div>

              {/* Notes */}
              {viewOrder.notes&&(
                <div style={{background:C.surface2,borderRadius:10,padding:"12px 14px",marginBottom:14}}>
                  <div style={{fontSize:10,fontWeight:600,color:C.dim,marginBottom:6}}>NOTES</div>
                  <div style={{fontSize:12,color:C.muted,lineHeight:1.6}}>{viewOrder.notes}</div>
                </div>
              )}

              {/* Actions */}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {ORDER_PIPELINE.indexOf(viewOrder.status)>=0&&ORDER_PIPELINE.indexOf(viewOrder.status)<ORDER_PIPELINE.length-1&&(
                  <Btn onClick={function(){advance(viewOrder);}}>
                    Advance → {ORDER_PIPELINE[ORDER_PIPELINE.indexOf(viewOrder.status)+1]}
                  </Btn>
                )}
                {viewOrder.status!=="Cancelled"&&viewOrder.status!=="Refunded"&&viewOrder.status!=="Paid"&&(
                  <Btn variant="danger" onClick={function(){cancel(viewOrder);}}>Cancel</Btn>
                )}
              </div>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ─── Admin Products ─────────────────────────────────────────────────────── */

</script>
<script id="c2" type="text/plain">
function AdminProducts({products,setProducts,addToast}) {
  const [showForm, setShowForm] = useState(false);
  const [editing,  setEditing]  = useState(null);
  const [name,     setName]     = useState("");
  const [sku,      setSku]      = useState("");
  const [price,    setPrice]    = useState("");
  const [category, setCategory] = useState("");
  const [desc,     setDesc]     = useState("");
  const [active,   setActive]   = useState(true);

  function openNew() { setEditing(null);setName("");setSku("");setPrice("");setCategory("");setDesc("");setActive(true);setShowForm(true); }
  function openEdit(p) { setEditing(p);setName(p.name||"");setSku(p.sku||"");setPrice(String(p.price||""));setCategory(p.category||"");setDesc(p.description||"");setActive(p.active!==false);setShowForm(true); }

  function save() {
    if(!name.trim()||!price){return;}
    var data = {id:editing?editing.id:genId("prod"),name:name.trim(),sku:sku.trim(),
                price:parseFloat(price)||0,category:category.trim(),
                description:desc.trim(),active:active,updatedAt:new Date().toISOString()};
    if(!editing) data.createdAt = new Date().toISOString();
    setProducts(function(prev){
      return editing ? prev.map(function(p){return p.id===editing.id?data:p;}) : [data].concat(prev);
    });
    dbSave("crm_products",data.id,data);
    addToast(editing?"Product updated":"Product added","success");
    setShowForm(false);
  }

  function toggle(p) {
    var updated = Object.assign({},p,{active:!p.active});
    setProducts(function(prev){return prev.map(function(x){return x.id===p.id?updated:x;});});
    dbSave("crm_products",p.id,updated);
    addToast(p.name+(updated.active?" activated":" deactivated"),"info");
  }

  return (
    <div>
      <PageHeader title="Products" subtitle={products.length+" products in catalog"}
        action={<Btn onClick={openNew}>+ Add Product</Btn>}/>
      {products.length===0 ? (
        <EmptyState icon="📦" title="No products" subtitle="Add your PreVasive product catalog." action={<Btn onClick={openNew}>Add First Product</Btn>}/>
      ) : (
        <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:C.surface2}}>
              {["Product","SKU","Category","Price","Status",""].map(function(h){return (
                <th key={h} style={{padding:"8px 16px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>
              );})}
            </tr></thead>
            <tbody>
              {products.map(function(p){return (
                <tr key={p.id} style={{borderTop:"1px solid "+C.border}}>
                  <td style={{padding:"10px 16px"}}>
                    <div style={{fontWeight:600,fontSize:13,color:C.text}}>{p.name}</div>
                    {p.description&&<div style={{fontSize:11,color:C.dim,marginTop:1}}>{p.description.slice(0,60)}{p.description.length>60?"…":""}</div>}
                  </td>
                  <td style={{padding:"10px 16px",fontSize:11,fontFamily:"monospace",color:C.muted}}>{p.sku||"—"}</td>
                  <td style={{padding:"10px 16px",fontSize:12,color:C.muted}}>{p.category||"—"}</td>
                  <td style={{padding:"10px 16px",fontSize:13,fontFamily:"monospace",fontWeight:700,color:C.accent}}>{fmtMoney(p.price||0)}</td>
                  <td style={{padding:"10px 16px"}}>
                    <span style={{padding:"3px 9px",borderRadius:20,fontSize:10,fontWeight:700,
                                  background:p.active!==false?C.success+"18":C.danger+"18",
                                  color:p.active!==false?C.success:C.danger}}>
                      {p.active!==false?"Active":"Inactive"}
                    </span>
                  </td>
                  <td style={{padding:"10px 16px"}}>
                    <div style={{display:"flex",gap:6}}>
                      <Btn small variant="ghost" onClick={function(){openEdit(p);}}>Edit</Btn>
                      <Btn small variant="ghost" onClick={function(){toggle(p);}}>{p.active!==false?"Deactivate":"Activate"}</Btn>
                    </div>
                  </td>
                </tr>
              );})}
            </tbody>
          </table>
        </div>
      )}

      {showForm&&(
        <Modal title={editing?"Edit Product":"New Product"} onClose={function(){setShowForm(false);}}
          footer={<div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={function(){setShowForm(false);}}>Cancel</Btn><Btn onClick={save}>{editing?"Save Changes":"Add Product"}</Btn></div>}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div style={{gridColumn:"1/-1"}}><Field label="Product Name *" value={name} onChange={setName} placeholder="PreVasive X100"/></div>
            <Field label="SKU" value={sku} onChange={setSku} placeholder="PV-X100"/>
            <Field label="Price *" value={price} onChange={setPrice} type="number" placeholder="299.00"/>
            <Field label="Category" value={category} onChange={setCategory} placeholder="Device, Supply…"/>
            <div/>
            <div style={{gridColumn:"1/-1"}}><TextArea label="Description" value={desc} onChange={setDesc} rows={3}/></div>
          </div>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginTop:4}}>
            <input type="checkbox" checked={active} onChange={function(e){setActive(e.target.checked);}} style={{accentColor:C.accent}}/>
            <span style={{fontSize:13,color:C.text}}>Active — visible to reps when placing orders</span>
          </label>
        </Modal>
      )}
    </div>
  );
}

/* ─── Admin Customers ────────────────────────────────────────────────────── */
function AdminCustomers({customers,reps,orders,addToast}) {
  const [search,   setSearch]   = useState("");
  const [viewCust, setViewCust] = useState(null);
  var filtered = customers.filter(function(c){
    if(!search) return true;
    var s = search.toLowerCase();
    return (c.name||"").toLowerCase().indexOf(s)>=0 ||
           (c.company||"").toLowerCase().indexOf(s)>=0 ||
           (c.email||"").toLowerCase().indexOf(s)>=0;
  });

  return (
    <div>
      <PageHeader title="Customers" subtitle={customers.length+" total customers"}/>
      <div style={{marginBottom:16}}>
        <input value={search} onChange={function(e){setSearch(e.target.value);}}
          placeholder="Search customers…"
          style={{width:"100%",maxWidth:400,background:C.surface,border:"1px solid "+C.border,
                  borderRadius:8,padding:"8px 12px",color:C.text,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
      </div>
      {filtered.length===0 ? (
        <EmptyState icon="👥" title="No customers" subtitle="Customers added by reps will appear here."/>
      ) : (
        <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:C.surface2}}>
              {["Customer","Company","Contact","Rep","Orders","Lifetime Spend"].map(function(h){return (
                <th key={h} style={{padding:"8px 16px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>
              );})}
            </tr></thead>
            <tbody>
              {filtered.map(function(c){
                var rep = reps.find(function(r){return r.id===c.repId;})||null;
                var custOrds = orders.filter(function(o){return o.custId===c.id;});
                var spend = custOrds.reduce(function(s,o){return s+(o.totals&&o.totals.grand||0);},0);
                return (
                  <tr key={c.id} style={{borderTop:"1px solid "+C.border,cursor:"pointer"}}
                    onClick={function(){setViewCust(c);}}>
                    <td style={{padding:"10px 16px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <Avatar name={c.name} size={28}/>
                        <span style={{fontSize:13,fontWeight:600,color:C.text}}>{c.name}</span>
                      </div>
                    </td>
                    <td style={{padding:"10px 16px",fontSize:12,color:C.muted}}>{c.company||"—"}</td>
                    <td style={{padding:"10px 16px",fontSize:11,color:C.muted}}>{c.email||"—"}</td>
                    <td style={{padding:"10px 16px",fontSize:12,color:C.text}}>{rep?rep.name:"—"}</td>
                    <td style={{padding:"10px 16px",fontSize:12,fontFamily:"monospace",fontWeight:600,color:C.accent}}>{custOrds.length}</td>
                    <td style={{padding:"10px 16px",fontSize:12,fontFamily:"monospace",fontWeight:700,color:C.success}}>{fmtMoney(spend)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
      {viewCust&&(
        <CustomerProfile customer={viewCust} orders={orders} onClose={function(){setViewCust(null);}}/>
      )}
    </div>
  );
}

/* ─── Admin Reps ─────────────────────────────────────────────────────────── */
function AdminReps({reps,setReps,orders,applications,setApplications,addToast,showResult}) {
  const [tab,      setTab]      = useState("reps");
  const [showForm, setShowForm] = useState(false);
  const [name,     setName]     = useState("");
  const [email,    setEmail]    = useState("");
  const [formErr,  setFormErr]  = useState("");

  function saveRep() {
    if(!name.trim()||!email.trim()){setFormErr("Name and email are required.");return;}
    var existing = reps.find(function(r){return r.email===email.trim();});
    if(existing){setFormErr("A rep with this email already exists.");return;}
    var id = genId("rep");
    var newRep = {
      id:id, name:name.trim(), email:email.trim(),
      status:"pending", subscriptionStatus:"trial",
      trialStartedAt:new Date().toISOString(),
      planId:"starter", createdAt:new Date().toISOString(),
    };
    setReps(function(prev){return [newRep].concat(prev);});
    dbSave("crm_reps",id,newRep);
    addToast(name+" added as rep","success");
    setShowForm(false); setName(""); setEmail(""); setFormErr("");
  }

  function approve(rep) {
    var updated = Object.assign({},rep,{status:"active",approvedAt:new Date().toISOString()});
    setReps(function(prev){return prev.map(function(r){return r.id===rep.id?updated:r;});});
    dbSave("crm_reps",rep.id,updated);
    addToast(rep.name+" approved","success");
    showResult({type:"rep",title:"Rep Approved",subtitle:rep.name+" can now log in and place orders.",rows:[["Name",rep.name],["Email",rep.email],["Status","Active ✓"]],cta:"Done"});
  }

  function suspend(rep) {
    var updated = Object.assign({},rep,{status:"suspended"});
    setReps(function(prev){return prev.map(function(r){return r.id===rep.id?updated:r;});});
    dbSave("crm_reps",rep.id,updated);
    addToast(rep.name+" suspended","warning");
  }

  function changePlan(rep, planId) {
    var updated = Object.assign({},rep,{planId:planId,subscriptionStatus:planId?"active":"trial"});
    setReps(function(prev){return prev.map(function(r){return r.id===rep.id?updated:r;});});
    dbSave("crm_reps",rep.id,updated);
    addToast("Plan updated for "+rep.name,"info");
  }

  var TABS = [{id:"reps",label:"Sales Reps"},{id:"applications",label:"Applications"},{id:"subscriptions",label:"Subscriptions"}];

  return (
    <div>
      <PageHeader title="Sales Reps" subtitle={reps.length+" reps total"}
        action={<Btn onClick={function(){setName("");setEmail("");setFormErr("");setShowForm(true);}}>+ Add Rep</Btn>}/>

      <div style={{display:"flex",gap:0,borderBottom:"1px solid "+C.border,marginBottom:24}}>
        {TABS.map(function(t){
          var active = tab===t.id;
          return (
            <button key={t.id} onClick={function(){setTab(t.id);}}
              style={{padding:"8px 16px",background:"none",border:"none",fontFamily:"inherit",cursor:"pointer",
                      fontSize:13,fontWeight:active?600:400,color:active?C.text:C.dim,letterSpacing:"-.01em",
                      borderBottom:"2px solid "+(active?C.accent:"transparent"),marginBottom:-1}}>
              {t.label}
            </button>
          );
        })}
      </div>

      {tab==="reps"&&(
        reps.length===0 ? <EmptyState icon="🤝" title="No reps yet" subtitle="Add your first sales rep." action={<Btn onClick={function(){setShowForm(true);}}>Add Rep</Btn>}/> : (
          <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:C.surface2}}>
                {["Rep","Email","Status","W-9","Orders","Commission","Actions"].map(function(h){return (
                  <th key={h} style={{padding:"8px 16px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>
                );})}
              </tr></thead>
              <tbody>
                {reps.map(function(rep){
                  var repOrds = orders.filter(function(o){return o.repId===rep.id;});
                  var totalComm = repOrds.reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);
                  var sc = {active:C.success,pending:C.warning,suspended:C.danger,trial:C.accent}[rep.status]||C.muted;
                  return (
                    <tr key={rep.id} style={{borderTop:"1px solid "+C.border}}>
                      <td style={{padding:"10px 16px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <Avatar name={rep.name} size={28}/>
                          <span style={{fontSize:13,fontWeight:600,color:C.text}}>{rep.name}</span>
                        </div>
                      </td>
                      <td style={{padding:"10px 16px",fontSize:12,color:C.muted}}>{rep.email}</td>
                      <td style={{padding:"10px 16px"}}>
                        <span style={{padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700,background:sc+"18",color:sc,textTransform:"capitalize"}}>{rep.status}</span>
                      </td>
                      <td style={{padding:"10px 16px",fontSize:12,fontFamily:"monospace",fontWeight:600,color:C.accent}}>{repOrds.length}</td>
                      <td style={{padding:"10px 16px"}}>
                        <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:20,
                          background:rep.w9ReviewStatus==="approved"?C.success+"18":rep.w9Status==="received"?C.warning+"18":C.surface2,
                          color:rep.w9ReviewStatus==="approved"?C.success:rep.w9Status==="received"?C.warning:C.dim}}>
                          {rep.w9ReviewStatus==="approved"?"✓ Verified":rep.w9Status==="received"?"Pending":"Not filed"}
                        </span>
                      </td>
                      <td style={{padding:"10px 16px",fontSize:12,fontFamily:"monospace",fontWeight:700,color:C.gold}}>{fmtMoney(totalComm)}</td>
                      <td style={{padding:"10px 16px"}}>
                        <div style={{display:"flex",gap:6}}>
                          {rep.status==="pending"&&<Btn small onClick={function(){approve(rep);}}>Approve</Btn>}
                          {rep.status==="active"&&<Btn small variant="ghost" onClick={function(){suspend(rep);}}>Suspend</Btn>}
                          {rep.status==="suspended"&&<Btn small variant="success" onClick={function(){approve(rep);}}>Reactivate</Btn>}
                          {rep.w9Status==="received"&&rep.w9ReviewStatus!=="approved"&&(
                            <Btn small variant="success" onClick={function(){
                              var updated=Object.assign({},rep,{w9ReviewStatus:"approved",w9ApprovedAt:new Date().toISOString()});
                              setReps(function(prev){return prev.map(function(r){return r.id===rep.id?updated:r;});});
                              dbSave("crm_reps",rep.id,updated);
                              addToast("W-9 approved for "+rep.name,"success");
                            }}>✓ W-9</Btn>
                          )}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )
      )}

      {tab==="applications"&&(
        <div>
          {applications.length===0 ? (
            <EmptyState icon="📋" title="No applications" subtitle="Applications submitted via the landing page appear here."/>
          ) : (
            <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{background:C.surface2}}>
                  {["Applicant","Email","Company","Submitted","Status",""].map(function(h){return (
                    <th key={h} style={{padding:"8px 14px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>
                  );})}
                </tr></thead>
                <tbody>
                  {applications.map(function(app){
                    return (
                      <tr key={app.id} style={{borderTop:"1px solid "+C.border}}>
                        <td style={{padding:"10px 14px",fontSize:13,fontWeight:600,color:C.text}}>{app.name}</td>
                        <td style={{padding:"10px 14px",fontSize:12,color:C.muted}}>{app.email}</td>
                        <td style={{padding:"10px 14px",fontSize:12,color:C.muted}}>{app.company||"—"}</td>
                        <td style={{padding:"10px 14px",fontSize:11,color:C.dim}}>{fmtDate(app.submittedAt)}</td>
                        <td style={{padding:"10px 14px"}}>
                          <span style={{padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700,
                                        background:app.status==="approved"?C.success+"18":app.status==="declined"?C.danger+"18":C.warning+"18",
                                        color:app.status==="approved"?C.success:app.status==="declined"?C.danger:C.warning,
                                        textTransform:"capitalize"}}>{app.status||"pending"}</span>
                        </td>
                        <td style={{padding:"10px 14px"}}>
                          {(!app.status||app.status==="pending")&&(
                            <div style={{display:"flex",gap:6}}>
                              <Btn small onClick={function(){
                                var id = genId("rep");
                                var newRep = {id:id,name:app.name,email:app.email,company:app.company||"",
                                  status:"active",subscriptionStatus:"trial",
                                  trialStartedAt:new Date().toISOString(),planId:"starter",
                                  createdAt:new Date().toISOString()};
                                setReps(function(prev){return [newRep].concat(prev);});
                                dbSave("crm_reps",id,newRep);
                                var updated = Object.assign({},app,{status:"approved"});
                                setApplications(function(prev){return prev.map(function(a){return a.id===app.id?updated:a;});});
                                dbSave("crm_applications",app.id,updated);
                                addToast(app.name+" approved as rep","success");
                              }}>Approve</Btn>
                              <Btn small variant="ghost" onClick={function(){
                                var updated = Object.assign({},app,{status:"declined"});
                                setApplications(function(prev){return prev.map(function(a){return a.id===app.id?updated:a;});});
                                dbSave("crm_applications",app.id,updated);
                                addToast(app.name+" application declined","warning");
                              }}>Decline</Btn>
                            </div>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {tab==="subscriptions"&&(
        <div>
          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
            {(function(){
              var active=reps.filter(function(r){return r.subscriptionStatus==="active";});
              var trial=reps.filter(function(r){return r.subscriptionStatus==="trial";});
              var mrr=active.reduce(function(s,r){var p=REP_PLANS.find(function(x){return x.id===r.planId;});return s+(p?p.price:0);},0);
              return [
                ["MRR",fmtMoney(mrr)+"/mo",C.success],
                ["Active",active.length,C.accent],
                ["On Trial",trial.length,C.warning],
                ["Suspended",reps.filter(function(r){return r.status==="suspended";}).length,C.danger],
              ].map(function(item){return (
                <KpiCard key={item[0]} label={item[0]} value={item[1]} color={item[2]}/>
              );});
            })()}
          </div>

          <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:C.surface2}}>
                {["Rep","Plan","Commission Cap","Status","Change Plan"].map(function(h){return (
                  <th key={h} style={{padding:"8px 16px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>
                );})}
              </tr></thead>
              <tbody>
                {reps.map(function(rep){
                  var plan = REP_PLANS.find(function(p){return p.id===rep.planId;})||REP_PLANS[0];
                  var sc = {active:C.success,trial:C.accent,suspended:C.danger}[rep.subscriptionStatus]||C.muted;
                  return (
                    <tr key={rep.id} style={{borderTop:"1px solid "+C.border}}>
                      <td style={{padding:"10px 16px",fontSize:13,fontWeight:600,color:C.text}}>{rep.name}</td>
                      <td style={{padding:"10px 16px",fontSize:12,color:C.text}}>{plan?plan.name:"—"}</td>
                      <td style={{padding:"10px 16px",fontSize:12,fontFamily:"monospace",color:C.muted}}>{plan?fmtMoney(plan.ceiling)+"/mo":"—"}</td>
                      <td style={{padding:"10px 16px"}}>
                        <span style={{padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700,background:sc+"18",color:sc,textTransform:"capitalize"}}>{rep.subscriptionStatus}</span>
                      </td>
                      <td style={{padding:"10px 16px"}}>
                        <select value={rep.planId||""} onChange={function(e){changePlan(rep,e.target.value);}}
                          style={{background:C.surface2,border:"1px solid "+C.border,borderRadius:6,
                                  padding:"4px 8px",color:C.text,fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>
                          {REP_PLANS.map(function(p){return <option key={p.id} value={p.id}>{p.name} — ${p.price}/mo</option>;})}
                        </select>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {showForm&&(
        <Modal title="Add Sales Rep" onClose={function(){setShowForm(false);}}
          footer={<div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={function(){setShowForm(false);}}>Cancel</Btn><Btn onClick={saveRep}>Add Rep</Btn></div>}>
          {formErr&&<div style={{padding:"9px 12px",background:C.danger+"12",border:"1px solid "+C.danger+"30",borderRadius:6,color:C.danger,fontSize:12,marginBottom:14}}>{formErr}</div>}
          <Field label="Full Name *" value={name} onChange={setName} placeholder="Jordan Hayes"/>
          <Field label="Email *" value={email} onChange={setEmail} type="email" placeholder="jordan@company.com"
            hint="An account will need to be created for this rep in Supabase Authentication."/>
        </Modal>
      )}
    </div>
  );
}

</script>
<script id="c3" type="text/plain">
function AdminCommissions({orders,reps,commissions,setCommissions,addToast,showResult}) {
  var now = Date.now();
  var releasedOrds = orders.filter(function(o){
    if(!o.deliveredAt||!o.repId) return false;
    if(o.status==="Cancelled"||o.status==="Refunded") return false;
    return (now-new Date(o.deliveredAt).getTime()) >= RETURN_WINDOW_DAYS*24*60*60*1000;
  });
  var paidIds = (commissions||[]).map(function(c){return c.orderId;});
  var unpaid = releasedOrds.filter(function(o){return paidIds.indexOf(o.id)<0;});

  function payCommission(order) {
    var rep = reps.find(function(r){return r.id===order.repId;})||{name:"Unknown"};
    var rec = {id:genId("pay"),orderId:order.id,repId:order.repId,repName:rep.name,
               amount:order.totals&&order.totals.commission||0,paidAt:new Date().toISOString(),note:"Manual payout"};
    setCommissions(function(prev){return [rec].concat(prev||[]);});
    dbSave("crm_commission_payouts",rec.id,rec);
    addToast("Commission of "+fmtMoney(rec.amount)+" paid to "+rep.name,"success");
    showResult({type:"commission",title:"Commission Released",subtitle:"Payment recorded successfully.",
      rows:[["Rep",rep.name],["Order",order.id],["Amount",fmtMoney(rec.amount)],["Date",fmtDate(new Date().toISOString())]],
      nextStep:"Rep will see this in their Commissions tab.",cta:"Done"});
  }

  var totalUnpaid = unpaid.reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);
  var totalPaid = (commissions||[]).reduce(function(s,c){return s+(c.amount||0);},0);

  return (
    <div>
      <PageHeader title="Commissions" subtitle="Track and release rep commission payments"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:24}}>
        <KpiCard label="Ready to Pay" value={fmtMoney(totalUnpaid)} sub={unpaid.length+" orders"} color={C.gold}/>
        <KpiCard label="Total Paid Out" value={fmtMoney(totalPaid)} sub={(commissions||[]).length+" payments"} color={C.success}/>
        <KpiCard label="In Return Window" value={fmtMoney(orders.filter(function(o){
          if(!o.deliveredAt||!o.repId) return false;
          return (now-new Date(o.deliveredAt).getTime()) < RETURN_WINDOW_DAYS*24*60*60*1000;
        }).reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0))} sub="Held — 15-day window" color={C.warning}/>
      </div>

      {unpaid.length>0&&(
        <div style={{marginBottom:24}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>Ready to Release</div>
          <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:C.surface2}}>
                {["Order","Rep","Delivered","Commission",""].map(function(h){return (
                  <th key={h} style={{padding:"8px 14px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>
                );})}
              </tr></thead>
              <tbody>
                {unpaid.map(function(o){
                  var rep = reps.find(function(r){return r.id===o.repId;})||{name:"Unknown"};
                  return (
                    <tr key={o.id} style={{borderTop:"1px solid "+C.border}}>
                      <td style={{padding:"10px 14px",fontSize:12,fontFamily:"monospace",fontWeight:600,color:C.accent}}>{o.id}</td>
                      <td style={{padding:"10px 14px",fontSize:12,color:C.text}}>{rep.name}</td>
                      <td style={{padding:"10px 14px",fontSize:11,color:C.muted}}>{fmtDate(o.deliveredAt)}</td>
                      <td style={{padding:"10px 14px",fontSize:13,fontFamily:"monospace",fontWeight:700,color:C.gold}}>{fmtMoney(o.totals&&o.totals.commission||0)}</td>
                      <td style={{padding:"10px 14px"}}>
                        <Btn small onClick={function(){payCommission(o);}}>Pay Commission</Btn>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {(commissions||[]).length>0&&(
        <div>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>Payment History</div>
          <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:C.surface2}}>
                {["Date","Rep","Order","Amount"].map(function(h){return (
                  <th key={h} style={{padding:"8px 14px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>
                );})}
              </tr></thead>
              <tbody>
                {(commissions||[]).map(function(c){return (
                  <tr key={c.id} style={{borderTop:"1px solid "+C.border}}>
                    <td style={{padding:"10px 14px",fontSize:11,color:C.muted}}>{fmtDate(c.paidAt)}</td>
                    <td style={{padding:"10px 14px",fontSize:12,color:C.text}}>{c.repName}</td>
                    <td style={{padding:"10px 14px",fontSize:11,fontFamily:"monospace",color:C.dim}}>{c.orderId}</td>
                    <td style={{padding:"10px 14px",fontSize:13,fontFamily:"monospace",fontWeight:700,color:C.success}}>{fmtMoney(c.amount)}</td>
                  </tr>
                );})}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {unpaid.length===0&&(commissions||[]).length===0&&(
        <EmptyState icon="💰" title="No commissions yet" subtitle="Commissions appear here 15 days after orders are delivered."/>
      )}
    </div>
  );
}

/* ─── Admin Settings ─────────────────────────────────────────────────────── */
function AdminSettings({supabaseCfg,onSaveSupabase,addToast}) {
  const [url,     setUrl]     = useState((supabaseCfg&&supabaseCfg.url)||SUPABASE_URL);
  const [anonKey, setAnonKey] = useState((supabaseCfg&&supabaseCfg.anonKey)||"");
  const [enabled, setEnabled] = useState(true);
  const [msg,     setMsg]     = useState("");
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  function handleSave() {
    var trimUrl = url.trim().replace(/\/$/,"");
    var trimKey = anonKey.trim();
    if(trimUrl) localStorage.setItem("__sb_url__",trimUrl);
    if(trimKey) localStorage.setItem("__sb_key__",trimKey);
    if(onSaveSupabase) onSaveSupabase({url:trimUrl,anonKey:trimKey,enabled:enabled,savedAt:new Date().toISOString()});
    addToast("Settings saved","success");
    setMsg("Saved!");
    setTimeout(function(){setMsg("");},3000);
  }

  function test() {
    var trimUrl = url.trim().replace(/\/$/,"");
    var trimKey = anonKey.trim()||SUPABASE_ANON_KEY;
    if(!trimUrl||!trimKey){setTestResult({ok:false,msg:"Enter URL and key first."});return;}
    setTesting(true); setTestResult(null);
    fetch(trimUrl+"/rest/v1/crm_orders?select=id&limit=1",{
      headers:{"apikey":trimKey,"Authorization":"Bearer "+trimKey}
    }).then(function(r){
      setTesting(false);
      setTestResult(r.ok||r.status===406 ? {ok:true,msg:"Connection successful! Supabase is reachable."} : {ok:false,msg:"HTTP "+r.status+" — check your credentials."});
    }).catch(function(e){setTesting(false);setTestResult({ok:false,msg:"Error: "+e.message});});
  }

  return (
    <div>
      <PageHeader title="Settings"/>
      <div style={{maxWidth:520}}>
        <div style={{padding:"14px 16px",background:C.accent+"10",border:"1px solid "+C.accent+"25",borderRadius:10,marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:13,color:C.accent,marginBottom:4}}>Supabase Integration</div>
          <div style={{fontSize:12,color:C.muted,lineHeight:1.6}}>Your database credentials. Find them at <strong style={{color:C.text}}>supabase.com → Settings → API</strong>.</div>
        </div>
        <Field label="Project URL" value={url} onChange={setUrl} placeholder="https://xxx.supabase.co"/>
        <Field label="Anon Public Key" value={anonKey} onChange={setAnonKey} type="password" placeholder="eyJ…"/>
        {testResult&&(
          <div style={{padding:"9px 12px",borderRadius:8,fontSize:12,fontWeight:600,marginBottom:14,
                       background:testResult.ok?C.success+"12":C.danger+"12",
                       border:"1px solid "+(testResult.ok?C.success:C.danger)+"30",
                       color:testResult.ok?C.success:C.danger}}>
            {testResult.ok?"✓ ":"✗ "}{testResult.msg}
          </div>
        )}
        {msg&&<div style={{padding:"9px 12px",borderRadius:8,fontSize:12,fontWeight:600,marginBottom:14,background:C.success+"12",border:"1px solid "+C.success+"30",color:C.success}}>{msg}</div>}
        <div style={{display:"flex",gap:8}}>
          <button onClick={test} disabled={testing}
            style={{padding:"8px 16px",borderRadius:6,border:"1px solid "+C.border,background:C.surface2,
                    color:C.muted,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:13}}>
            {testing?"Testing…":"Test Connection"}
          </button>
          <Btn onClick={handleSave}>Save Settings</Btn>
        </div>
        {supabaseCfg&&supabaseCfg.savedAt&&(
          <div style={{marginTop:14,fontSize:11,color:C.dim}}>Last saved {fmtDate(supabaseCfg.savedAt)} · {supabaseCfg.url}</div>
        )}
      </div>
    </div>
  );
}

/* ─── Email Module ───────────────────────────────────────────────────────── */
var EMAIL_TEMPLATES = [
  {id:"followup",  label:"Follow-up",    subject:"Following up on your PreVasive order",
   body:"Hi {{customer_name}},\n\nI wanted to follow up on your recent order {{order_id}}. Please let me know if you have any questions or need anything.\n\nBest,\n{{rep_name}}"},
  {id:"intro",     label:"Introduction", subject:"Introducing PreVasive — Medical Solutions",
   body:"Hi {{customer_name}},\n\nI would love to introduce you to PreVasive's product line. We specialize in medical solutions that can benefit your practice.\n\nWould you have 15 minutes for a quick call?\n\nBest,\n{{rep_name}}"},
  {id:"reorder",   label:"Reorder Reminder", subject:"Time to reorder your PreVasive supplies",
   body:"Hi {{customer_name}},\n\nBased on your last order, you may be running low on supplies. I can have a new order processed quickly.\n\nLet me know and I will take care of it right away.\n\nBest,\n{{rep_name}}"},
  {id:"thankyou",  label:"Thank You",    subject:"Thank you for your order",
   body:"Hi {{customer_name}},\n\nThank you for your order {{order_id}}. We appreciate your business and look forward to serving you again.\n\nDon't hesitate to reach out if you need anything.\n\nBest,\n{{rep_name}}"},
  {id:"custom",    label:"Custom",       subject:"", body:""},
];

var EMAIL_VARS = ["{{customer_name}}","{{rep_name}}","{{order_id}}","{{date}}","{{company}}"];

function EmailModule({currentUser,customers,orders,isAdmin,addToast,showResult}) {
  const [toId,      setToId]      = useState("");
  const [toEmail,   setToEmail]   = useState("");
  const [subject,   setSubject]   = useState("");
  const [body,      setBody]      = useState("");
  const [tmpl,      setTmpl]      = useState("custom");
  const [search,    setSearch]    = useState("");
  const [custOpen,  setCustOpen]  = useState(false);
  const [sending,   setSending]   = useState(false);
  const [emailLog,  setEmailLog]  = useState([]);

  var myCustomers = isAdmin ? customers : customers.filter(function(c2){
    return c2.repId===(currentUser&&(currentUser.rep_id||currentUser.id));
  });
  var selCust = myCustomers.find(function(c2){return c2.id===toId;})||null;
  var filtCusts = search ? myCustomers.filter(function(c2){
    var s=search.toLowerCase();
    return (c2.name||"").toLowerCase().indexOf(s)>=0||(c2.email||"").toLowerCase().indexOf(s)>=0;
  }) : myCustomers;

  function applyTemplate(t) {
    setTmpl(t.id);
    var repName = currentUser&&currentUser.name||"";
    var custName = selCust?selCust.name:"{{customer_name}}";
    var company = selCust&&selCust.company?selCust.company:"{{company}}";
    var date = new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
    function fill(str) {
      return str
        .replace(/\{\{customer_name\}\}/g,custName)
        .replace(/\{\{rep_name\}\}/g,repName)
        .replace(/\{\{company\}\}/g,company)
        .replace(/\{\{date\}\}/g,date)
        .replace(/\{\{order_id\}\}/g,"");
    }
    setSubject(fill(t.subject));
    setBody(fill(t.body));
  }

  function insertVar(v) {
    var el = document.getElementById("email-body-ta");
    if(el) {
      var s=el.selectionStart; var e=el.selectionEnd;
      var newBody = body.slice(0,s)+v+body.slice(e);
      setBody(newBody);
    } else {
      setBody(body+v);
    }
  }

  function send() {
    if(!toEmail.trim()){return;}
    setSending(true);
    setTimeout(function(){
      setSending(false);
      var entry = {id:genId("email"),to:toEmail,toName:selCust?selCust.name:toEmail,
                   subject:subject,sentAt:new Date().toISOString(),sentBy:currentUser&&currentUser.name};
      setEmailLog(function(prev){return [entry].concat(prev);});
      addToast("Email sent to "+(selCust?selCust.name:toEmail),"success");
      showResult({type:"email",title:"Email Sent!",subtitle:"Message delivered successfully.",
        rows:[["To",selCust?selCust.name+" <"+toEmail+">":toEmail],
              ["Subject",subject||"(no subject)"],
              ["Sent",new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})]],cta:"Done"});
      setSubject(""); setBody(""); setToId(""); setToEmail(""); setTmpl("custom");
    }, 800);
  }

  return (
    <div>
      <PageHeader title="Email" subtitle="Compose and send messages to customers"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 360px",gap:20,alignItems:"start"}}>
        {/* Compose */}
        <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
          {/* Templates */}
          <div style={{padding:"14px 18px",borderBottom:"1px solid "+C.border,
                       display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:11,fontWeight:600,color:C.dim,marginRight:4}}>TEMPLATE:</span>
            {EMAIL_TEMPLATES.map(function(t){
              var sel = tmpl===t.id;
              return (
                <button key={t.id} onClick={function(){applyTemplate(t);}}
                  style={{padding:"4px 10px",borderRadius:20,border:"none",fontFamily:"inherit",cursor:"pointer",
                          fontSize:11,fontWeight:sel?700:400,
                          background:sel?C.accent+"18":"transparent",color:sel?C.accent:C.muted}}>
                  {t.label}
                </button>
              );
            })}
          </div>

          <div style={{padding:"18px"}}>
            {/* To field */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:5}}>To</div>
              <div style={{position:"relative"}}>
                <div onClick={function(){setCustOpen(!custOpen);}}
                  style={{padding:"8px 12px",background:C.bg,border:"1px solid "+(custOpen?C.accent:C.border),
                          borderRadius:7,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                  {selCust
                    ? <span style={{fontSize:13,fontWeight:600,color:C.text}}>{selCust.name} &lt;{selCust.email||toEmail}&gt;</span>
                    : <span style={{fontSize:13,color:C.dim}}>Select customer or type email…</span>}
                  <span style={{fontSize:10,color:C.dim}}>{custOpen?"▲":"▼"}</span>
                </div>
                {custOpen&&(
                  <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:200,
                               background:C.surface,border:"1px solid "+C.border,borderRadius:8,
                               boxShadow:"0 8px 32px rgba(0,0,0,.25)",marginTop:4}}>
                    <div style={{padding:8,borderBottom:"1px solid "+C.border}}>
                      <input autoFocus value={search} onChange={function(e){setSearch(e.target.value);}}
                        placeholder="Search or type email…"
                        style={{width:"100%",background:C.surface2,border:"1px solid "+C.border,borderRadius:6,
                                padding:"6px 10px",color:C.text,fontSize:12,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
                    </div>
                    <div style={{maxHeight:200,overflowY:"auto"}}>
                      {search&&search.indexOf("@")>=0&&(
                        <div onClick={function(){setToEmail(search);setToId("");setCustOpen(false);setSearch("");}}
                          style={{padding:"9px 12px",cursor:"pointer",fontSize:12,color:C.accent,fontWeight:600,borderBottom:"1px solid "+C.border}}>
                          Send to: {search}
                        </div>
                      )}
                      {filtCusts.map(function(cu){return (
                        <div key={cu.id} onClick={function(){setToId(cu.id);setToEmail(cu.email||"");setCustOpen(false);setSearch("");}}
                          style={{padding:"9px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,
                                  background:cu.id===toId?C.accent+"10":"none",borderBottom:"1px solid "+C.border}}>
                          <Avatar name={cu.name} size={24}/>
                          <div>
                            <div style={{fontSize:12,fontWeight:600,color:C.text}}>{cu.name}</div>
                            <div style={{fontSize:10,color:C.dim}}>{cu.email||"no email"}</div>
                          </div>
                        </div>
                      );})}
                    </div>
                  </div>
                )}
              </div>
            </div>

            {/* Subject */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:5}}>Subject</div>
              <input value={subject} onChange={function(e){setSubject(e.target.value);}}
                placeholder="Email subject…"
                style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:7,
                        padding:"8px 12px",color:C.text,fontSize:13,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
            </div>

            {/* Variable toolbar */}
            <div style={{marginBottom:6,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span style={{fontSize:10,fontWeight:600,color:C.dim}}>INSERT:</span>
              {EMAIL_VARS.map(function(v){return (
                <button key={v} onClick={function(){insertVar(v);}}
                  style={{padding:"2px 8px",borderRadius:4,border:"1px solid "+C.border,background:C.surface2,
                          color:C.accent,cursor:"pointer",fontFamily:"monospace",fontSize:10,fontWeight:600}}>
                  {v}
                </button>
              );})}
            </div>

            {/* Body */}
            <div style={{marginBottom:14}}>
              <textarea id="email-body-ta" value={body} onChange={function(e){setBody(e.target.value);}}
                rows={10} placeholder="Write your message…"
                style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:7,
                        padding:"10px 12px",color:C.text,fontSize:13,fontFamily:"inherit",
                        boxSizing:"border-box",outline:"none",resize:"vertical",lineHeight:1.7}}/>
            </div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:11,color:C.dim}}>{body.length} characters</div>
              <Btn onClick={send} disabled={sending||!toEmail.trim()||!body.trim()}>
                {sending?"Sending…":"Send Email →"}
              </Btn>
            </div>
          </div>
        </div>

        {/* Preview + Log */}
        <div>
          {/* Live Preview */}
          <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,
                       overflow:"hidden",marginBottom:14}}>
            <div style={{padding:"10px 14px",borderBottom:"1px solid "+C.border,fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:".06em"}}>Preview</div>
            <div style={{padding:"14px",maxHeight:260,overflowY:"auto"}}>
              {subject&&<div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:8,paddingBottom:8,borderBottom:"1px solid "+C.border}}>{subject}</div>}
              {body ? (
                <div style={{fontSize:12,color:C.muted,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{body}</div>
              ) : (
                <div style={{fontSize:12,color:C.dim,fontStyle:"italic"}}>Start typing to preview…</div>
              )}
            </div>
          </div>

          {/* Sent Log */}
          {emailLog.length>0&&(
            <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
              <div style={{padding:"10px 14px",borderBottom:"1px solid "+C.border,fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:".06em"}}>Sent</div>
              {emailLog.slice(0,5).map(function(e){return (
                <div key={e.id} style={{padding:"10px 14px",borderBottom:"1px solid "+C.border,fontSize:12}}>
                  <div style={{fontWeight:600,color:C.text,marginBottom:2}}>{e.toName}</div>
                  <div style={{color:C.muted,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.subject}</div>
                  <div style={{color:C.dim,fontSize:10,marginTop:2}}>{fmtDate(e.sentAt)}</div>
                </div>
              );})}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


function generateInvoice(order, customers, products, currentUser) {
  var cust = customers.find(function(x){return x.id===order.custId;})||{};

      +"<td style='padding:8px 12px;border-bottom:1px solid #e8ecef;text-align:right;font-weight:600'>"+fmtMoney(line)+"</td>"
      +"</tr>";
  }).join("");
  var totals = order.totals||{};
  var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'>"
    +"<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;color:#1a1a2e;max-width:720px;margin:0 auto;padding:40px 24px;font-size:13px}"
    +"h1{font-size:28px;font-weight:800;letter-spacing:-.03em}.muted{color:#6b7c93}.mono{font-family:monospace}"
    +"table{width:100%;border-collapse:collapse}.th{padding:8px 12px;background:#f6f9fc;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#6b7c93;font-weight:600}"
    +"</style></head><body>"
    +"<div style='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px'>"
    +"<div><div style='font-size:22px;font-weight:900;color:#635bff'>PreVasive</div><div style='font-size:11px;color:#6b7c93;margin-top:2px'>Medical Solutions</div></div>"
    +"<div style='text-align:right'><h1>Invoice</h1><div class='mono' style='color:#635bff;margin-top:4px'>"+order.id+"</div>"
    +"<div style='margin-top:6px;font-size:12px;color:#6b7c93'>Date: "+date+"<br>Due: "+dueDate+"</div></div></div>"
    +"<div style='display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px'>"
    +"<div><div style='font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7c93;margin-bottom:8px'>Bill To</div>"
    +"<div style='font-weight:700;font-size:14px'>"+(cust.name||"Customer")+"</div>"
    +(cust.company?"<div style='color:#6b7c93'>"+cust.company+"</div>":"")
    +(cust.email?"<div style='color:#6b7c93'>"+cust.email+"</div>":"")
    +"</div>"
    +"<div><div style='font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7c93;margin-bottom:8px'>Sales Rep</div>"
    +"<div style='font-weight:700;font-size:14px'>"+(order.repName||"Rep")+"</div>"
    +(currentUser&&currentUser.email?"<div style='color:#6b7c93'>"+currentUser.email+"</div>":"")
    +"</div></div>"
    +"<table><thead><tr>"
    +"<th class='th' style='text-align:left'>Product</th><th class='th' style='text-align:center'>Qty</th>"
    +"<th class='th' style='text-align:right'>Unit Price</th><th class='th' style='text-align:right'>Total</th>"
    +"</tr></thead><tbody>"+rows+"</tbody>"
    +"<tfoot>"
    +(totals.shipping>0?"<tr><td colspan='3' style='padding:8px 12px;text-align:right;color:#6b7c93'>Shipping</td><td class='mono' style='padding:8px 12px;text-align:right'>"+fmtMoney(totals.shipping||0)+"</td></tr>":"")
    +(totals.tax>0?"<tr><td colspan='3' style='padding:8px 12px;text-align:right;color:#6b7c93'>Tax</td><td class='mono' style='padding:8px 12px;text-align:right'>"+fmtMoney(totals.tax||0)+"</td></tr>":"")
    +"<tr><td colspan='3' style='padding:12px;text-align:right;font-weight:800;font-size:15px'>Total Due</td>"
    +"<td class='mono' style='padding:12px;text-align:right;font-weight:900;font-size:18px;color:#635bff'>"+fmtMoney(totals.grand||0)+"</td></tr>"
    +"</tfoot></table>"
    +"<div style='margin-top:32px;padding-top:20px;border-top:1px solid #e8ecef;color:#6b7c93;font-size:11px;line-height:1.7'>"
    +"Payment due within 30 days of invoice date. Thank you for your business.</div>"
    +"</body></html>";
  var blob = new Blob([html],{type:"text/html"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href=url; a.download="Invoice-"+order.id+".html";
  document.body.appendChild(a); a.click();
  setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},100);
}
