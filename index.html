            </div>
          </div>
        </Modal>
      )}

      {/* Quote detail */}
      {viewQuote&&(
        <Modal title={"Quote "+viewQuote.id} wide={true} onClose={function(){setViewQuote(null);}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <div>
              <div style={{background:C.surface2,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                {[["Customer",viewQuote.custName||"—"],["Rep",viewQuote.repName||"—"],["Created",fmtDate(viewQuote.createdAt)],["Valid Until",fmtDate(viewQuote.validUntil)],["Status",viewQuote.status]].map(function(row,i){return (
                  <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"5px 0",borderBottom:i<4?"1px solid "+C.border:"none"}}>
                    <span style={{color:C.muted}}>{row[0]}</span><span style={{fontWeight:600,color:C.text}}>{row[1]}</span>
                  </div>
                );})}
              </div>
              {viewQuote.notes&&<div style={{background:C.surface2,borderRadius:10,padding:"12px 14px",fontSize:12,color:C.muted}}>{viewQuote.notes}</div>}
            </div>
            <div>
              <div style={{background:C.surface2,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                {(viewQuote.items||[]).map(function(it,i){
                  var p=products.find(function(x){return x.id===it.prodId;})||{name:"Product",price:0};
                  return <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:"1px solid "+C.border}}><span style={{color:C.muted}}>{it.qty}× {p.name}</span><span style={{fontFamily:"monospace",fontWeight:600}}>{fmtMoney(p.price*it.qty)}</span></div>;
                })}
                <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:15,color:C.accent,marginTop:8,paddingTop:8,borderTop:"1px solid "+C.border}}><span>Total</span><span style={{fontFamily:"monospace"}}>{fmtMoney(viewQuote.total||0)}</span></div>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {(viewQuote.status==="draft"||viewQuote.status==="sent")&&(
                  <Btn onClick={function(){convertToOrder(viewQuote);}}>→ Convert to Order</Btn>
                )}
                {viewQuote.status==="draft"&&<Btn variant="ghost" onClick={function(){sendQuote(viewQuote);}}>Send Quote</Btn>}
              </div>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}


function CSVImportModal({repId,onImport,onClose,addToast}) {
  const [rows,     setRows]     = useState([]);
  const [headers,  setHeaders]  = useState([]);
  const [mapping,  setMapping]  = useState({});
  const [preview,  setPreview]  = useState([]);
  const [step,     setStep]     = useState("upload");

  var FIELDS = [{v:"name",l:"Name *"},{v:"email",l:"Email"},{v:"company",l:"Company"},{v:"phone",l:"Phone"},{v:"address",l:"Address"},{v:"city",l:"City"},{v:"state",l:"State"},{v:"zip",l:"ZIP"},{v:"paymentTerms",l:"Payment Terms"}];

  function handleFile(e) {
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var lines = ev.target.result.split("\n").filter(function(l){return l.trim();});
      if(lines.length<2) return;
      var hdrs = lines[0].split(",").map(function(h){return h.trim().replace(/"/g,"");});
      var data = lines.slice(1).map(function(line){
        var cols = line.split(",").map(function(v){return v.trim().replace(/"/g,"");});
        var obj = {};
        hdrs.forEach(function(h,i){obj[h]=cols[i]||"";});
        return obj;
      });
      setHeaders(hdrs);
      setRows(data);
      // Auto-map obvious matches
      var autoMap = {};
      hdrs.forEach(function(h){
        var hl = h.toLowerCase();
        if(hl==="name"||hl==="full name"||hl==="customer name") autoMap["name"]=h;
        else if(hl==="email"||hl==="email address") autoMap["email"]=h;
        else if(hl==="company"||hl==="organization") autoMap["company"]=h;
        else if(hl==="phone"||hl==="phone number") autoMap["phone"]=h;
        else if(hl==="address") autoMap["address"]=h;
        else if(hl==="city") autoMap["city"]=h;
        else if(hl==="state") autoMap["state"]=h;
        else if(hl==="zip"||hl==="postal code") autoMap["zip"]=h;
      });
      setMapping(autoMap);
      setPreview(data.slice(0,3));
      setStep("map");
    };
    reader.readAsText(file);
  }

  function doImport() {
    var imported = rows.filter(function(r){return mapping["name"]&&r[mapping["name"]];}).map(function(r){
      var id = genId("cust");
      return {id:id,repId:repId,
        name:(r[mapping["name"]]||"").trim(),email:(r[mapping["email"]]||"").trim(),
        company:(r[mapping["company"]]||"").trim(),phone:(r[mapping["phone"]]||"").trim(),
        address:(r[mapping["address"]]||"").trim(),city:(r[mapping["city"]]||"").trim(),
        state:(r[mapping["state"]]||"").trim(),zip:(r[mapping["zip"]]||"").trim(),
        paymentTerms:(r[mapping["paymentTerms"]]||"").trim(),
        createdAt:new Date().toISOString()};
    });
    imported.forEach(function(cust){dbSave("crm_customers",cust.id,cust);});
    onImport(imported);
    addToast(imported.length+" customers imported","success");
    onClose();
  }

  return (
    <Modal title="Import Customers from CSV" wide={true} onClose={onClose}
      footer={<div style={{display:"flex",gap:8,justifyContent:"space-between"}}>
        <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
        {step==="map"&&<div style={{display:"flex",gap:8}}>
          <span style={{fontSize:12,color:C.muted,lineHeight:"36px"}}>{rows.length} rows found</span>
          <Btn onClick={doImport} disabled={!mapping["name"]}>Import {rows.length} Customers</Btn>
        </div>}
      </div>}>
      {step==="upload"&&(
        <div style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:32,marginBottom:16}}>📄</div>
          <div style={{fontWeight:700,fontSize:15,color:C.text,marginBottom:8}}>Upload a CSV file</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:20,lineHeight:1.6}}>
            First row must be column headers. Accepted: Name, Email, Company, Phone, Address, City, State, ZIP
          </div>
          <label style={{display:"inline-flex",alignItems:"center",gap:8,padding:"10px 20px",
                         borderRadius:8,border:"2px dashed "+C.border,cursor:"pointer",
                         background:C.surface2,color:C.accent,fontWeight:600,fontSize:13}}>
            <span>📎 Choose CSV File</span>
            <input type="file" accept=".csv" onChange={handleFile} style={{display:"none"}}/>
          </label>
        </div>
      )}
      {step==="map"&&(
        <div>
          <div style={{marginBottom:16,fontSize:12,color:C.muted}}>Map your CSV columns to customer fields:</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {FIELDS.map(function(f){return (
              <div key={f.v} style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:12,fontWeight:600,color:C.text,minWidth:100}}>{f.l}</span>
                <select value={mapping[f.v]||""} onChange={function(e){setMapping(function(prev){return Object.assign({},prev,{[f.v]:e.target.value||undefined});});}}
                  style={{flex:1,background:C.bg,border:"1px solid "+C.border,borderRadius:6,padding:"6px 8px",color:C.text,fontSize:12,fontFamily:"inherit",outline:"none"}}>
                  <option value="">— skip —</option>
                  {headers.map(function(h){return <option key={h} value={h}>{h}</option>;})}
                </select>
              </div>
            );})}
          </div>
          {preview.length>0&&(
            <div>
              <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:".06em"}}>Preview (first 3 rows)</div>
              <div style={{background:C.surface2,borderRadius:8,overflow:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead><tr style={{background:C.border}}>
                    {["Name","Email","Company","Phone"].map(function(h){return <th key={h} style={{padding:"6px 10px",textAlign:"left",color:C.dim}}>{h}</th>;})}
                  </tr></thead>
                  <tbody>
                    {preview.map(function(r,i){return (
                      <tr key={i} style={{borderTop:"1px solid "+C.border}}>
                        {["name","email","company","phone"].map(function(f){return <td key={f} style={{padding:"6px 10px",color:C.text}}>{r[mapping[f]]||"—"}</td>;})}
                      </tr>
                    );})}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}
    </Modal>
  );
}


function GlobalSearch({orders,customers,reps,quotes,products,isAdmin,onNav,onClose}) {
  const [q, setQ] = useState("");
  var s = q.trim().toLowerCase();
  var results = [];
  if(s.length>=2) {
    customers.forEach(function(c2){
      if((c2.name||"").toLowerCase().indexOf(s)>=0||(c2.email||"").toLowerCase().indexOf(s)>=0||(c2.company||"").toLowerCase().indexOf(s)>=0)
        results.push({type:"customer",icon:"👥",label:c2.name,sub:c2.company||c2.email||"",id:c2.id,nav:"customers"});
    });
    orders.forEach(function(o){
      if((o.id||"").toLowerCase().indexOf(s)>=0||(o.custName||"").toLowerCase().indexOf(s)>=0||(o.repName||"").toLowerCase().indexOf(s)>=0)
        results.push({type:"order",icon:"📦",label:o.id,sub:o.custName+(o.repName?" · "+o.repName:"")+" · "+fmtMoney(o.totals&&o.totals.grand||0),id:o.id,nav:"orders"});
    });
    if(isAdmin) reps.forEach(function(r){
      if((r.name||"").toLowerCase().indexOf(s)>=0||(r.email||"").toLowerCase().indexOf(s)>=0)
        results.push({type:"rep",icon:"🤝",label:r.name,sub:r.email+" · "+r.status,id:r.id,nav:"reps"});
    });
    products.forEach(function(p){
      if((p.name||"").toLowerCase().indexOf(s)>=0||(p.sku||"").toLowerCase().indexOf(s)>=0)
        results.push({type:"product",icon:"📋",label:p.name,sub:(p.sku||"")+" · "+fmtMoney(p.price||0),id:p.id,nav:"products"});
    });
    quotes.forEach(function(qt){
      if((qt.id||"").toLowerCase().indexOf(s)>=0||(qt.custName||"").toLowerCase().indexOf(s)>=0)
        results.push({type:"quote",icon:"📝",label:qt.id,sub:qt.custName+" · "+fmtMoney(qt.total||0),id:qt.id,nav:"quotes"});
    });
  }
  results = results.slice(0,12);

  return (
    <div style={{position:"fixed",inset:0,background:C.bg+"e8",backdropFilter:"blur(8px)",
                 zIndex:6000,display:"flex",alignItems:"flex-start",justifyContent:"center",
                 padding:"80px 16px 16px"}}
         onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:14,
                   width:"100%",maxWidth:560,boxShadow:"0 16px 48px rgba(0,0,0,.25)"}}>
        <div style={{padding:"14px 16px",borderBottom:"1px solid "+C.border,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:16,color:C.dim}}>🔍</span>
          <input autoFocus value={q} onChange={function(e){setQ(e.target.value);}}
            placeholder="Search orders, customers, reps, products…"
            onKeyDown={function(e){if(e.key==="Escape")onClose();}}
            style={{flex:1,background:"none",border:"none",color:C.text,fontSize:15,fontFamily:"inherit",outline:"none"}}/>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:18}}>×</button>
        </div>
        {s.length>=2&&results.length===0&&(
          <div style={{padding:"32px",textAlign:"center",fontSize:13,color:C.dim}}>No results for "{q}"</div>
        )}
        {results.length>0&&(
          <div style={{maxHeight:400,overflowY:"auto"}}>
            {results.map(function(r,i){return (
              <div key={i} onClick={function(){onNav(r.nav);onClose();}}
                style={{padding:"10px 16px",borderBottom:"1px solid "+C.border,cursor:"pointer",
                        display:"flex",alignItems:"center",gap:10}}
                onMouseEnter={function(e){e.currentTarget.style.background=C.accent+"08";}}
                onMouseLeave={function(e){e.currentTarget.style.background="transparent";}}>
                <span style={{fontSize:18,flexShrink:0}}>{r.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:C.text}}>{r.label}</div>
                  <div style={{fontSize:11,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.sub}</div>
                </div>
                <span style={{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:20,
                              background:C.accent+"15",color:C.accent,textTransform:"capitalize"}}>{r.type}</span>
              </div>
            );})}
          </div>
        )}
        {s.length<2&&s.length>0&&(
          <div style={{padding:"20px",textAlign:"center",fontSize:12,color:C.dim}}>Type at least 2 characters…</div>
        )}
        {s.length===0&&(
          <div style={{padding:"16px",display:"flex",gap:8,flexWrap:"wrap"}}>
            {["orders","customers",isAdmin?"reps":"","products"].filter(Boolean).map(function(nav){return (
              <button key={nav} onClick={function(){onNav(nav);onClose();}}
                style={{padding:"5px 12px",borderRadius:20,border:"1px solid "+C.border,background:C.surface2,
                        color:C.muted,cursor:"pointer",fontFamily:"inherit",fontSize:12,textTransform:"capitalize"}}>
                {nav}
              </button>
            );})}
            <div style={{width:"100%",fontSize:11,color:C.dim,marginTop:4}}>Press Esc to close</div>
          </div>
        )}
      </div>
    </div>
  );
}


function NotificationsBell({notifications,onMarkRead,onClear}) {
  const [open, setOpen] = useState(false);
  var unread = notifications.filter(function(n){return !n.read;}).length;
  return (
    <div style={{position:"relative"}}>
      <button onClick={function(){setOpen(!open);}}
        style={{background:"none",border:"none",cursor:"pointer",position:"relative",
                padding:"6px",borderRadius:8,color:C.muted,fontSize:18,lineHeight:1}}>
        🔔
        {unread>0&&<span style={{position:"absolute",top:2,right:2,width:14,height:14,
          borderRadius:"50%",background:C.danger,color:"#fff",fontSize:8,fontWeight:800,
          display:"flex",alignItems:"center",justifyContent:"center"}}>{unread>9?"9+":unread}</span>}
      </button>
      {open&&(
        <div style={{position:"absolute",right:0,top:"100%",width:320,zIndex:500,
                     background:C.surface,border:"1px solid "+C.border,borderRadius:10,
                     boxShadow:"0 8px 32px rgba(0,0,0,.2)",marginTop:4}}>
          <div style={{padding:"10px 14px",borderBottom:"1px solid "+C.border,
                       display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontWeight:700,fontSize:13,color:C.text}}>Notifications</span>
            {notifications.length>0&&<button onClick={function(){onClear();setOpen(false);}} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>Clear all</button>}
          </div>
          <div style={{maxHeight:300,overflowY:"auto"}}>
            {notifications.length===0?(
              <div style={{padding:"24px",textAlign:"center",fontSize:12,color:C.dim}}>No notifications</div>
            ):notifications.slice(0,20).map(function(n){return (
              <div key={n.id} onClick={function(){onMarkRead(n.id);}}
                style={{padding:"10px 14px",borderBottom:"1px solid "+C.border,cursor:"pointer",
                        background:n.read?"transparent":C.accent+"06",
                        display:"flex",alignItems:"flex-start",gap:8}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:n.read?C.dim:C.accent,flexShrink:0,marginTop:5}}/>
                <div>
                  <div style={{fontSize:12,color:C.text,lineHeight:1.4}}>{n.msg}</div>
                  <div style={{fontSize:10,color:C.dim,marginTop:2}}>{fmtDate(n.ts)}</div>
                </div>
              </div>
            );})}
          </div>
        </div>
      )}
    </div>
  );
}


</script>

function RepDrawer({rep,orders,commissions,legalDocs,signatures,reps,setReps,
                    setCommissions,addToast,showResult,onViewAsRep,onClose}) {
  const [tab,       setTab]       = useState("overview");
  const [payTarget, setPayTarget] = useState(null);
  const [adminNote, setAdminNote] = useState(rep.adminNote||"");
  const [noteMsg,   setNoteMsg]   = useState("");

  var repOrds   = orders.filter(function(o){return o.repId===rep.id;});
  var repComms  = (commissions||[]).filter(function(cp){return cp.repId===rep.id;});
  var repSigs   = (signatures||[]).filter(function(s){return s.repId===rep.id;});
  var activeDocs = (legalDocs||[]).filter(function(d){return d.active;});
  var plan      = REP_PLANS.find(function(p){return p.id===rep.planId;})||REP_PLANS[0];
  var now2      = Date.now();

  var totalRev  = repOrds.reduce(function(s,o){return s+(o.totals&&o.totals.grand||0);},0);
  var totalComm = repOrds.reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);
  var paidComm  = repComms.reduce(function(s,cp){return s+(cp.amount||0);},0);
  var heldComm  = repOrds.filter(function(o){
    if(!o.deliveredAt||o.status==="Cancelled"||o.status==="Returned") return false;
    return (now2-new Date(o.deliveredAt).getTime())<RETURN_WINDOW_DAYS*24*60*60*1000;
  }).reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);
  var readyComm = repOrds.filter(function(o){
    if(!o.deliveredAt||o.status==="Cancelled"||o.status==="Returned") return false;
    var paid=repComms.map(function(cp){return cp.orderId;});
    return (now2-new Date(o.deliveredAt).getTime())>=RETURN_WINDOW_DAYS*24*60*60*1000&&paid.indexOf(o.id)<0;
  }).reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);

  var trialDays = rep.trialStartedAt
    ? Math.max(0, TRIAL_DAYS - Math.floor((now2-new Date(rep.trialStartedAt).getTime())/(24*60*60*1000)))
    : null;

  function updateRep(patch) {
    var updated = Object.assign({},rep,patch);
    setReps(function(prev){return prev.map(function(r){return r.id===rep.id?updated:r;});});
    dbSave("crm_reps",rep.id,updated);
    return updated;
  }

  function approve()  { updateRep({status:"active",   approvedAt:new Date().toISOString()}); addToast(rep.name+" approved","success"); }
  function suspend()  { updateRep({status:"suspended"}); addToast(rep.name+" suspended","warning"); }
  function reactivate(){ updateRep({status:"active"}); addToast(rep.name+" reactivated","success"); }
  function approveW9(){ updateRep({w9ReviewStatus:"approved",w9ApprovedAt:new Date().toISOString()}); addToast("W-9 approved","success"); }
  function rejectW9() { updateRep({w9ReviewStatus:"rejected"}); addToast("W-9 rejected","warning"); }
  function changePlan(planId){ updateRep({planId:planId,subscriptionStatus:"active"}); addToast("Plan updated","info"); }

  function saveNote() {
    updateRep({adminNote:adminNote});
    addToast("Note saved","success");
    setNoteMsg("Saved"); setTimeout(function(){setNoteMsg("");},2000);
  }

  function copyInvite() {
    var token = rep.inviteToken||(rep.id+"_inv_"+Math.random().toString(36).slice(2,8));
    var link = window.location.origin+window.location.pathname+"#invite="+token;
    navigator.clipboard.writeText(link).then(function(){addToast("Invite link copied","success");});
  }

  var STATUS_COLOR = {active:C.success,pending:C.warning,suspended:C.danger}[rep.status]||C.muted;
  var TABS = [
    {id:"overview",    l:"Overview"},
    {id:"orders",      l:"Orders ("+repOrds.length+")"},
    {id:"commissions", l:"Commissions"},
    {id:"documents",   l:"Documents"},
    {id:"legal",       l:"Legal"},
    {id:"account",     l:"Account"},
  ];

  return (
    <div style={{position:"fixed",inset:0,zIndex:3000,display:"flex",justifyContent:"flex-end"}}
         onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      {/* Backdrop */}
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.45)",backdropFilter:"blur(2px)"}}
           onClick={onClose}/>

      {/* Drawer */}
      <div style={{position:"relative",width:540,height:"100%",background:C.bg,
                   borderLeft:"1px solid "+C.border,display:"flex",flexDirection:"column",
                   boxShadow:"-8px 0 40px rgba(0,0,0,.3)",overflowY:"hidden"}}>

        {/* Header */}
        <div style={{padding:"18px 20px 0",borderBottom:"1px solid "+C.border,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <Avatar name={rep.name} size={44}/>
              <div>
                <div style={{fontWeight:800,fontSize:17,color:C.text,letterSpacing:"-.02em"}}>{rep.name}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>{rep.email}</div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginTop:5}}>
                  <span style={{padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700,
                                background:STATUS_COLOR+"18",color:STATUS_COLOR,textTransform:"capitalize"}}>
                    {rep.status}
                  </span>
                  <span style={{padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:600,
                                background:C.accent+"12",color:C.accent}}>
                    {plan?plan.name:"No Plan"}
                  </span>
                  {rep.subscriptionStatus==="trial"&&trialDays!==null&&(
                    <span style={{padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:600,
                                  background:trialDays<5?C.danger+"18":C.warning+"18",
                                  color:trialDays<5?C.danger:C.warning}}>
                      {trialDays}d trial left
                    </span>
                  )}
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <button onClick={function(){onViewAsRep({repId:rep.id,repName:rep.name,repData:rep});onClose();}}
                style={{padding:"6px 12px",borderRadius:6,border:"1px solid "+C.accent+"40",
                        background:C.accent+"10",color:C.accent,cursor:"pointer",
                        fontFamily:"inherit",fontWeight:700,fontSize:12}}>
                👁 View as Rep
              </button>
              <button onClick={onClose}
                style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:22,
                        lineHeight:1,padding:"4px 8px",borderRadius:6}}>×</button>
            </div>
          </div>

          {/* Tabs */}
          <div style={{display:"flex",gap:0,overflowX:"auto"}}>
            {TABS.map(function(t){var act=tab===t.id;return (
              <button key={t.id} onClick={function(){setTab(t.id);}}
                style={{padding:"7px 12px",background:"none",border:"none",fontFamily:"inherit",
                        cursor:"pointer",fontSize:12,fontWeight:act?600:400,
                        color:act?C.text:C.dim,whiteSpace:"nowrap",
                        borderBottom:"2px solid "+(act?C.accent:"transparent"),marginBottom:-1}}>
                {t.l}
              </button>
            );})}
          </div>
        </div>

        {/* Body */}
        <div style={{flex:1,overflowY:"auto",padding:"18px 20px"}}>

          {/* ── Overview ── */}
          {tab==="overview"&&(
            <div>
              {/* Quick actions */}
              <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
                {rep.status==="pending"   &&<Btn small onClick={approve}>✓ Approve Rep</Btn>}
                {rep.status==="active"    &&<Btn small variant="ghost" onClick={suspend}>Suspend</Btn>}
                {rep.status==="suspended" &&<Btn small variant="success" onClick={reactivate}>Reactivate</Btn>}
                {rep.w9Status==="received"&&rep.w9ReviewStatus!=="approved"&&<Btn small variant="success" onClick={approveW9}>✓ Approve W-9</Btn>}
                <Btn small variant="ghost" onClick={copyInvite}>✉ Copy Invite</Btn>
              </div>

              {/* KPI strip */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
                {[["Total Orders",repOrds.length,C.accent],["Total Revenue",fmtMoney(totalRev),C.text],
                  ["Comm Earned",fmtMoney(totalComm),C.gold],["Comm Paid",fmtMoney(paidComm),C.success],
                  ["Comm Ready",fmtMoney(readyComm),C.warning],["Comm Held",fmtMoney(heldComm),C.dim],
                ].map(function(item,i){return (
                  <div key={i} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:10,
                                       padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:11,color:C.muted}}>{item[0]}</span>
                    <span style={{fontWeight:800,fontFamily:"monospace",fontSize:14,color:item[2]}}>{item[1]}</span>
                  </div>
                );})}
              </div>

              {/* Rep details */}
              <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden",marginBottom:14}}>
                {[
                  ["Default Commission",rep.defaultCommissionRate!=null?(rep.defaultCommissionRate+"%"):"Not set"],
                  ["Plan / Ceiling", (plan?plan.name:"—")+" · "+fmtMoney(plan?plan.ceiling:0)+"/mo"],
                  ["Subscription",rep.subscriptionStatus||"—"],
                  ["Trial Started",rep.trialStartedAt?fmtDate(rep.trialStartedAt):"—"],
                  ["Rep Since",fmtDate(rep.createdAt)],
                  ["Last Order",repOrds.length>0?fmtDate(repOrds[0].createdAt):"No orders"],
                ].map(function(row,i){return (
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",
                                       borderBottom:"1px solid "+C.border,fontSize:12}}>
                    <span style={{color:C.muted}}>{row[0]}</span>
                    <span style={{fontWeight:600,color:C.text}}>{row[1]}</span>
                  </div>
                );})}
              </div>

              {/* Plan change */}
              <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:"12px 14px"}}>
                <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:8}}>Change Plan</div>
                <div style={{display:"flex",gap:8}}>
                  {REP_PLANS.map(function(p){var sel=rep.planId===p.id;
                    var planLinks=JSON.parse(localStorage.getItem("__pv__stripeLinks")||"{}");
                    var link=p.id==="pro"?planLinks.pro:planLinks.starter;
                    return (
                      <div key={p.id} style={{flex:1,padding:"10px",borderRadius:8,
                              border:"2px solid "+(sel?C.accent:C.border),
                              background:sel?C.accent+"10":C.surface2,textAlign:"left"}}>
                        <div style={{fontWeight:700,fontSize:12,color:sel?C.accent:C.text,marginBottom:2}}>{p.name}</div>
                        <div style={{fontSize:10,color:C.dim,marginBottom:6}}>${p.price}/mo · {fmtMoney(p.ceiling)}/mo cap</div>
                        {sel?(
                          <div style={{fontSize:10,fontWeight:700,color:C.accent}}>✓ Current Plan</div>
                        ):(
                          <button onClick={function(){changePlan(p.id);}}
                            style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontFamily:"inherit",fontSize:10,fontWeight:600,padding:0}}>
                            Switch Plan
                          </button>
                        )}
                        {link&&sel&&!rep.stripeSubscriptionId&&(
                          <a href={link} target="_blank"
                            style={{display:"block",marginTop:8,padding:"5px 8px",borderRadius:6,
                                    background:C.accent,color:"#fff",textDecoration:"none",
                                    fontSize:10,fontWeight:700,textAlign:"center"}}>
                            ⚡ Subscribe via Stripe →
                          </a>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* ── Orders ── */}
          {tab==="orders"&&(
            <div>
              {repOrds.length===0?<EmptyState icon="📦" title="No orders" subtitle="This rep hasn't placed any orders yet."/>:(
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,fontSize:12,color:C.muted}}>
                    <span>{repOrds.length} orders</span>
                    <span style={{fontWeight:700,color:C.text}}>{fmtMoney(totalRev)} total revenue</span>
                  </div>
                  {repOrds.map(function(o){
                    var sc={Submitted:C.accent,Processing:C.warning,Shipped:C.text,Delivered:C.success,Paid:C.success,Cancelled:C.danger,Returned:C.danger}[o.status]||C.dim;
                    return (
                      <div key={o.id} style={{background:C.surface,border:"1px solid "+C.border,
                                              borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                          <span style={{fontFamily:"monospace",fontWeight:700,fontSize:12,color:C.accent}}>{o.id}</span>
                          <span style={{padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:700,
                                        background:sc+"18",color:sc}}>{o.status}</span>
                        </div>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted}}>
                          <span>{o.custName||"—"} · {fmtDate(o.createdAt)}</span>
                          <div style={{textAlign:"right"}}>
                            <span style={{fontFamily:"monospace",fontWeight:700,color:C.text}}>{fmtMoney(o.totals&&o.totals.grand||0)}</span>
                            <span style={{color:C.gold,marginLeft:8}}>+{fmtMoney(o.totals&&o.totals.commission||0)}</span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* ── Commissions ── */}
          {tab==="commissions"&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:18}}>
                {[["Paid Out",fmtMoney(paidComm),C.success],["Ready",fmtMoney(readyComm),C.gold],["Held",fmtMoney(heldComm),C.warning]].map(function(item,i){return (
                  <div key={i} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:"12px",textAlign:"center"}}>
                    <div style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:5}}>{item[0]}</div>
                    <div style={{fontSize:18,fontWeight:900,fontFamily:"monospace",color:item[2]}}>{item[1]}</div>
                  </div>
                );})}
              </div>
              {readyComm>0&&(
                <div style={{marginBottom:14}}>
                  <Btn onClick={function(){
                    setPayTarget({order:{id:"BULK",totals:{commission:readyComm}},rep:rep});
                  }} fullWidth={true}>💳 Release {fmtMoney(readyComm)} to {rep.name}</Btn>
                </div>
              )}
              {repComms.length===0?<EmptyState icon="💰" title="No payments yet" subtitle="Commission payments appear here once released."/>:(
                <div>
                  <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Payment History</div>
                  {repComms.map(function(cp){return (
                    <div key={cp.id} style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",
                                             background:C.surface,border:"1px solid "+C.border,borderRadius:8,marginBottom:6,fontSize:12}}>
                      <div><div style={{fontWeight:600,color:C.text}}>{fmtDate(cp.paidAt)}</div><div style={{fontSize:10,color:C.dim}}>{cp.orderId}</div></div>
                      <div style={{fontFamily:"monospace",fontWeight:800,color:C.success,fontSize:14}}>{fmtMoney(cp.amount)}</div>
                    </div>
                  );})}
                </div>
              )}
              {payTarget&&(
                <RepPayModal order={payTarget.order} rep={payTarget.rep}
                  onConfirm={function(opts){
                    var id=genId("pay");
                    var payout={id:id,repId:rep.id,repName:rep.name,amount:readyComm,
                                orderId:"BULK",note:opts.note,method:opts.method,
                                paidAt:new Date().toISOString()};
                    setCommissions(function(prev){return [payout].concat(prev);});
                    dbSave("crm_commission_payouts",id,payout);
                    addToast(fmtMoney(readyComm)+" released to "+rep.name,"success");
                    setPayTarget(null);
                  }}
                  onClose={function(){setPayTarget(null);}}/>
              )}
            </div>
          )}

          {/* ── Documents ── */}
          {tab==="documents"&&(
            <div>
              {/* W-9 */}
              <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,
                           padding:"16px",marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{fontWeight:700,fontSize:14,color:C.text}}>W-9 Tax Information</div>

                    color:rep.w9ReviewStatus==="approved"?C.success:rep.w9Status==="received"?C.warning:C.dim}}>

                      <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,
                                           padding:"6px 0",borderBottom:"1px solid "+C.border}}>
                        <span style={{color:C.muted}}>{row[0]}</span>
                        <span style={{fontWeight:600,color:C.text,textTransform:"capitalize"}}>{row[1]}</span>
                      </div>
                    );})}
                    {rep.w9ReviewStatus!=="approved"&&(
                      <div style={{display:"flex",gap:8,marginTop:12}}>
                        <Btn small variant="success" onClick={approveW9}>✓ Approve W-9</Btn>
                        <Btn small variant="danger" onClick={rejectW9}>Reject</Btn>
                      </div>
                    )}
                    {rep.w9ReviewStatus==="approved"&&(
                      <div style={{marginTop:10,fontSize:11,color:C.success,fontWeight:600}}>
                        ✓ Approved {fmtDate(rep.w9ApprovedAt)}
                      </div>
                    )}
                  </div>
                ):<div style={{fontSize:13,color:C.dim,fontStyle:"italic"}}>Rep has not submitted a W-9 yet.</div>}
              </div>

              {/* 1099 */}
              <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"16px"}}>
                <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:10}}>1099-NEC Reference</div>
                {(function(){
                  var yr=new Date().getFullYear()-1;

                    <span style={{fontSize:11,color:item[1]?C.success:C.danger,fontWeight:600}}>{item[2]}</span>
                  </div>

                {activeDocs.map(function(doc){
                  var sig=repSigs.find(function(s){return s.docId===doc.id&&s.version===doc.version;});

                    <div key={doc.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",

                      </div>

                        {sig?fmtDate(sig.signedAt):"Not signed"}

              {activeDocs.length===0&&repSigs.length===0&&(

          {tab==="account"&&(
            <div>
              <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden",marginBottom:14}}>
                {[["Rep ID",rep.id],["Email",rep.email],["Phone",rep.phone||"—"],["Company",rep.company||"—"],["Created",fmtDate(rep.createdAt)]].map(function(row,i){return (

                                       borderBottom:"1px solid "+C.border,fontSize:12}}>
                    <span style={{color:C.muted}}>{row[0]}</span>
                    <span style={{fontWeight:600,color:C.text,fontFamily:row[0]==="Rep ID"?"monospace":"inherit",
                                  fontSize:row[0]==="Rep ID"?10:12}}>{row[1]}</span>
                  </div>
                );})}

              {/* Invite link */}
              <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:"14px",marginBottom:14}}>

                <Btn small variant="ghost" onClick={copyInvite} fullWidth={true}>📋 Copy Invite Link</Btn>
                <div style={{fontSize:10,color:C.dim,marginTop:6,lineHeight:1.5}}>

                <textarea value={adminNote} onChange={function(e){setAdminNote(e.target.value);}} rows={4}
                  placeholder="Private notes about this rep (territory, performance, follow-ups)…"
                  style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:7,
                          padding:"8px 10px",color:C.text,fontSize:12,fontFamily:"inherit",
                          boxSizing:"border-box",outline:"none",resize:"vertical",lineHeight:1.6}}/>
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
                  <Btn small onClick={saveNote}>Save Note</Btn>
                  {noteMsg&&<span style={{fontSize:11,color:C.success,fontWeight:600}}>{noteMsg}</span>}

              {/* Danger zone */}
              <div style={{border:"1px solid "+C.danger+"30",borderRadius:10,padding:"14px",background:C.danger+"06"}}>

                  {rep.status==="suspended"&&<Btn small variant="success" onClick={reactivate}>Reactivate</Btn>}
                </div>

                  Suspended reps cannot log in or place orders. Their data is preserved.
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

</script>
<script id="c9" type="text/plain">
function AdminDashboard({orders,reps,customers,products,commissions,onNav}) {
  const [range, setRange] = useState("month");
  var now2 = new Date();
  function filterByRange(list, dateKey) {
    return list.filter(function(o){
      var d = new Date(o[dateKey]||o.createdAt||"");
      if(range==="today") return d.toDateString()===now2.toDateString();
      if(range==="week")  return (now2-d) < 7*24*60*60*1000;
      if(range==="month") return d.getMonth()===now2.getMonth()&&d.getFullYear()===now2.getFullYear();
      if(range==="year")  return d.getFullYear()===now2.getFullYear();
      return true; // all
    });
  }
  var filtOrders = filterByRange(orders,"createdAt");
  var now = Date.now();
  var totalRevenue = filtOrders.filter(function(o){return o.status==="Paid";})
    .reduce(function(s,o){return s+(o.totals&&o.totals.grand||0);},0);
  var pendingComm = filtOrders.filter(function(o){
    if(!o.deliveredAt) return false;
    if(o.status==="Cancelled"||o.status==="Refunded") return false;
    return (now-new Date(o.deliveredAt).getTime()) < RETURN_WINDOW_DAYS*24*60*60*1000;
  }).reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);
  var releasedComm = filtOrders.filter(function(o){
    if(!o.deliveredAt) return false;
    if(o.status==="Cancelled"||o.status==="Refunded") return false;
    return (now-new Date(o.deliveredAt).getTime()) >= RETURN_WINDOW_DAYS*24*60*60*1000;
  }).reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);
  var activeReps = reps.filter(function(r){return r.status==="active";}).length;
  var taskCount2 = reps.filter(function(r){return (r.w9Status==="received"&&r.w9ReviewStatus!=="approved")||r.status==="pending";}).length
    + (reps.filter(function(r){return r.status==="pending";}).length);


  return (
    <div>
      <PageHeader title="Dashboard" subtitle="Overview of your rep sales platform"
        action={<div style={{display:"flex",gap:4}}>
          {[["today","Today"],["week","This Week"],["month","This Month"],["year","This Year"],["all","All Time"]].map(function(r){
            var act=range===r[0];
            return <button key={r[0]} onClick={function(){setRange(r[0]);}}
              style={{padding:"5px 10px",borderRadius:6,border:"none",fontFamily:"inherit",cursor:"pointer",
                      fontSize:11,fontWeight:act?700:400,background:act?C.accent+"18":"transparent",
                      color:act?C.accent:C.muted}}>{r[1]}</button>;
          })}
        </div>}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:14,marginBottom:28}}>
        <KpiCard label="Total Revenue" value={fmtMoney(totalRevenue)} sub="All paid orders" color={C.success}/>
        <KpiCard label="Active Reps" value={activeReps} sub={reps.length+" total"} color={C.accent}/>
        <KpiCard label="Total Orders" value={orders.length} sub={orders.filter(function(o){return o.status==="Submitted";}).length+" pending"} color={C.text}/>
        <KpiCard label="Commission Due" value={fmtMoney(releasedComm)} sub={fmtMoney(pendingComm)+" held"} color={C.gold}/>
      </div>

      {/* Recent Orders */}
      <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden",marginBottom:20}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:700,fontSize:14,color:C.text}}>Recent Orders</div>
          <button onClick={function(){onNav("orders");}} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600}}>View all →</button>
        </div>
        {filtOrders.length===0 ? (
          <div style={{padding:"32px",textAlign:"center",color:C.dim,fontSize:13}}>No orders yet</div>
        ) : (
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:C.surface2}}>
              {["Order","Rep","Customer","Total","Status"].map(function(h){return (
                <th key={h} style={{padding:"8px 16px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>
              );})}
            </tr></thead>
            <tbody>
              {filtOrders.slice(0,5).map(function(o){return (
                <tr key={o.id} style={{borderTop:"1px solid "+C.border}}>
                  <td style={{padding:"10px 16px",fontSize:12,fontFamily:"monospace",color:C.accent,fontWeight:600}}>{o.id}</td>
                  <td style={{padding:"10px 16px",fontSize:12,color:C.muted}}>{o.repName||"—"}</td>
                  <td style={{padding:"10px 16px",fontSize:12,color:C.text}}>{o.custName||"—"}</td>
                  <td style={{padding:"10px 16px",fontSize:12,fontFamily:"monospace",fontWeight:600,color:C.text}}>{fmtMoney(o.totals&&o.totals.grand||0)}</td>
                  <td style={{padding:"10px 16px"}}><Badge status={o.status}/></td>
                </tr>
              );})}
            </tbody>
          </table>
        )}
      </div>

      {/* Quick stats row */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"18px 20px"}}>
          <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:14}}>Rep Subscription MRR</div>
          {(function(){
            var mrr = reps.filter(function(r){return r.subscriptionStatus==="active";})
              .reduce(function(s,r){var p=REP_PLANS.find(function(x){return x.id===r.planId;});return s+(p?p.price:0);},0);
            var starters = reps.filter(function(r){return r.planId==="starter"&&r.subscriptionStatus==="active";}).length;
            var pros = reps.filter(function(r){return r.planId==="pro"&&r.subscriptionStatus==="active";}).length;
            var trials = reps.filter(function(r){return r.subscriptionStatus==="trial";}).length;
            return (
              <div>
                <div style={{fontSize:28,fontWeight:800,fontFamily:"monospace",color:C.success,marginBottom:8}}>{fmtMoney(mrr)}<span style={{fontSize:12,color:C.dim,fontWeight:400}}>/mo</span></div>
                <div style={{display:"flex",gap:12,fontSize:11,color:C.muted}}>
                  <span>{starters} Starter</span><span>{pros} Pro</span><span>{trials} Trial</span>
                </div>
              </div>
            );
          })()}
        </div>
        <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"18px 20px"}}>
          <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:14}}>Products</div>
          <div style={{fontSize:28,fontWeight:800,fontFamily:"monospace",color:C.text,marginBottom:8}}>{products.length}</div>
          <div style={{fontSize:11,color:C.muted}}>{products.filter(function(p){return p.active!==false;}).length} active · {customers.length} customers</div>
        </div>
      </div>

      {/* Rep Performance */}
      {reps.filter(function(r){return r.status==="active";}).length>0&&(
        <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"18px 20px",marginTop:14}}>
          <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:16}}>Rep Performance — {range==="all"?"All Time":range==="month"?"This Month":range==="week"?"This Week":range==="today"?"Today":"This Year"}</div>
          {(function(){
            var repStats = reps.filter(function(r){return r.status==="active";}).map(function(r){
              var repOrds = filtOrders.filter(function(o){return o.repId===r.id;});
              var rev = repOrds.reduce(function(s,o){return s+(o.totals&&o.totals.grand||0);},0);
              var comm = repOrds.reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);
              return {name:r.name,orders:repOrds.length,revenue:rev,commission:comm};
            }).sort(function(a,b){return b.revenue-a.revenue;});
            var maxRev = repStats.reduce(function(s,r){return Math.max(s,r.revenue);},1);
            return (
              <div>
                {repStats.map(function(r,i){return (
                  <div key={i} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}}>
                      <span style={{fontWeight:600,color:C.text}}>{r.name}</span>
                      <span style={{color:C.muted,fontFamily:"monospace"}}>{r.orders} orders · {fmtMoney(r.revenue)}</span>
                    </div>
                    <div style={{height:6,background:C.surface2,borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",borderRadius:3,background:"linear-gradient(90deg,"+C.accent+","+C.success+")",
                                   width:maxRev>0?(r.revenue/maxRev*100)+"%":"0%",transition:"width .3s"}}/>
                    </div>
                  </div>
                );})}
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}

/* ─── Admin Orders ───────────────────────────────────────────────────────── */
function AdminOrders({orders,reps,customers,products,onUpdate,addToast,showResult,currentUser}) {
  const [search,      setSearch]      = useState("");
  const [filter,      setFilter]      = useState("all");
  const [viewOrder,   setViewOrder]   = useState(null);
  const [showReturn,  setShowReturn]   = useState(false);
  const [showSendInv, setShowSendInv] = useState(false);
  const [auditTab,    setAuditTab]    = useState(false);
  const [editTarget,     setEditTarget]    = useState(null);
  const [dupTarget,      setDupTarget]     = useState(null);
  const [selected,       setSelected]      = useState({});
  const [fulfillTarget2, setFulfillTarget2] = useState(null);
  const [collectTarget2,  setCollectTarget2]  = useState(null);

  var filtered = orders.filter(function(o){
    if(filter!=="all" && o.status!==filter) return false;
    if(search) {
      var s = search.toLowerCase();
      return (o.id||"").toLowerCase().indexOf(s)>=0 ||
             (o.repName||"").toLowerCase().indexOf(s)>=0 ||
             (o.custName||"").toLowerCase().indexOf(s)>=0;
    }
    return true;
  });

  function advance(order) {
    var next = getNextOrderStatus(order);
    if(!next) return;
    var patch = {status:next};
    if(next==="Delivered") patch.deliveredAt = new Date().toISOString();
    var withAudit = addAuditEntry(Object.assign({},order,patch),"Status → "+next,currentUser&&currentUser.name);
    onUpdate(withAudit);
    setViewOrder(withAudit);
    dbSave("crm_orders",order.id,withAudit);
    addToast("Order "+order.id+" → "+next,"info");
  }

  function cancel(order) {
    var withAudit = addAuditEntry(Object.assign({},order,{status:"Cancelled"}), "Cancelled", currentUser&&currentUser.name);
    onUpdate(withAudit); setViewOrder(withAudit); dbSave("crm_orders",order.id,withAudit);
    addToast("Order "+order.id+" cancelled","warning");
  }

  function processReturn(order, ret) {
    var refundAmt = ret.type==="full"?(order.totals&&order.totals.grand||0):ret.refundAmount;
    var patch = {status:"Returned",returnedAt:new Date().toISOString(),returnReason:ret.reason,
                 returnType:ret.type,refundAmount:refundAmt,returnNotes:ret.notes,
                 totals:Object.assign({},order.totals,{commission:0})};
    var withAudit = addAuditEntry(Object.assign({},order,patch),"Return processed — "+ret.reason,currentUser&&currentUser.name);
    onUpdate(withAudit); setViewOrder(withAudit); setShowReturn(false);
    dbSave("crm_orders",order.id,withAudit);
    addToast("Return processed for "+order.id,"warning");
    showResult({type:"error",title:"Return Processed",subtitle:"Order returned. Commission reversed.",
      rows:[["Order",order.id],["Reason",ret.reason],["Refund",fmtMoney(refundAmt)],["Commission","$0.00 (reversed)"]],cta:"Done"});
  }

  return (
    <div>
      <PageHeader title="Orders" subtitle={orders.length+" total orders"}
        action={<Btn small variant="ghost" onClick={function(){exportOrders(orders,reps,customers);}}>⬇ Export CSV</Btn>}/>
      {/* Bulk actions */}
      {Object.keys(selected).length>0&&(
        <div style={{padding:"10px 16px",background:C.accent+"10",border:"1px solid "+C.accent+"25",borderRadius:10,marginBottom:14,display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:13,fontWeight:700,color:C.accent}}>{Object.keys(selected).length} selected</span>
          <Btn small onClick={function(){Object.keys(selected).forEach(function(id){var o=orders.find(function(x){return x.id===id;});if(o&&o.status==="Submitted"){var u=addAuditEntry(Object.assign({},o,{status:"Processing"}),"> Processing","Admin");onUpdate(u);dbSave("crm_orders",id,u);}});setSelected({});addToast("Orders moved to Processing","info");}}>→ Mark Processing</Btn>
          <Btn small onClick={function(){Object.keys(selected).forEach(function(id){var o=orders.find(function(x){return x.id===id;});if(o&&o.status==="Processing"){var u=addAuditEntry(Object.assign({},o,{status:"Shipped"}),"> Shipped","Admin");onUpdate(u);dbSave("crm_orders",id,u);}});setSelected({});addToast("Orders marked Shipped","info");}}>→ Mark Shipped</Btn>
          <button onClick={function(){setSelected({});}} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>Clear selection</button>
        </div>
      )}
      {/* Filters */}
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
        <input value={search} onChange={function(e){setSearch(e.target.value);}}
          placeholder="Search orders, reps, customers…"
          style={{flex:1,minWidth:200,background:C.surface,border:"1px solid "+C.border,
                  borderRadius:8,padding:"8px 12px",color:C.text,fontSize:13,
                  fontFamily:"inherit",outline:"none"}}/>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {["all"].concat(ORDER_PIPELINE).concat(["Cancelled"]).map(function(s){
            var active = filter===s;
            return (
              <button key={s} onClick={function(){setFilter(s);}}
                style={{padding:"7px 12px",borderRadius:6,border:"none",fontFamily:"inherit",cursor:"pointer",
                        fontSize:11,fontWeight:active?600:400,letterSpacing:"-.01em",
                        background:active?C.accent+"18":"transparent",
                        color:active?C.accent:C.muted}}>
                {s==="all"?"All Orders":s}
              </button>
            );
          })}
        </div>
      </div>

      {filtered.length===0 ? (
        <EmptyState icon="📦" title="No orders" subtitle="Orders placed by sales reps will appear here."/>
      ) : (
        <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:C.surface2}}>
              {["","Order","Date","Rep","Customer","Items","Total","Commission","Status",""].map(function(h,hi){return (
                <th key={h} style={{padding:"8px 14px",textAlign:"left",fontSize:10,color:C.dim,
                                   textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>
              );})}
            </tr></thead>
            <tbody>
              {filtered.map(function(o){return (
                <tr key={o.id} style={{borderTop:"1px solid "+C.border,cursor:"pointer"}}
                  onClick={function(){setViewOrder(o);}}>
                  <td style={{padding:"10px 14px",fontSize:12,fontFamily:"monospace",fontWeight:700,color:C.accent}}>{o.id}</td>
                  <td style={{padding:"10px 14px",fontSize:11,color:C.muted}}>{fmtDate(o.createdAt)}</td>
                  <td style={{padding:"10px 14px",fontSize:12,color:C.text}}>{o.repName||"—"}</td>
                  <td style={{padding:"10px 14px",fontSize:12,color:C.text}}>{o.custName||"—"}</td>
                  <td style={{padding:"10px 14px",fontSize:12,color:C.muted,fontFamily:"monospace"}}>{(o.items||[]).length}</td>
                  <td style={{padding:"10px 14px",fontSize:12,fontFamily:"monospace",fontWeight:600,color:C.text}}>{fmtMoney(o.totals&&o.totals.grand||0)}</td>
                  <td style={{padding:"10px 14px",fontSize:12,fontFamily:"monospace",color:C.gold}}>{fmtMoney(o.totals&&o.totals.commission||0)}</td>
                  <td style={{padding:"10px 14px"}}><Badge status={o.status}/></td>
                  <td style={{padding:"10px 14px"}} onClick={function(e){e.stopPropagation();}}>
                    {ORDER_PIPELINE.indexOf(o.status)>=0&&ORDER_PIPELINE.indexOf(o.status)<ORDER_PIPELINE.length-1&&(
                      <Btn small onClick={function(){advance(o);}}>
                        → {ORDER_PIPELINE[ORDER_PIPELINE.indexOf(o.status)+1]}
                      </Btn>
                    )}
                  </td>
                </tr>
              );})}
            </tbody>
          </table>
        </div>
      )}

      {collectTarget2&&(
        <CollectPaymentModal order={collectTarget2} addToast={addToast}
          onCollect={function(payRef){
            var co4=JSON.parse(localStorage.getItem("__pv__invoiceCfg")||"{}").company||"PreVasive USA";
            var cust4=customers.find(function(x){return x.id===collectTarget2.custId;})||{name:collectTarget2.custName||""};
            var rTok2=generateReceiptToken(collectTarget2,cust4,payRef,co4);
            var rLink2=window.location.origin+window.location.pathname+"#receipt="+rTok2;
            var updated=addAuditEntry(Object.assign({},collectTarget2,{
              status:"Paid",paidAt:new Date().toISOString(),
              paymentRef:payRef,paymentType:payRef.type,
              receiptToken:rTok2,receiptLink:rLink2,
            }),"Payment collected","Admin",payRef.type==="card"?"Card ····"+payRef.last4:payRef.type);
            onUpdate(updated); setViewOrder(updated);
            dbSave("crm_orders",collectTarget2.id,updated);
            setCollectTarget2(null);
            addToast("Payment collected! Copy receipt link from order detail.","success");
          }}
          onClose={function(){setCollectTarget2(null);}}/>
      )}
      {fulfillTarget2&&(
        <FulfillmentModal order={fulfillTarget2} customers={customers} products={products}
          onSend={function(result){
            var patch={status:result.status};
            if(result.trackingNumber){patch.trackingNumber=result.trackingNumber;patch.carrier=result.carrier;patch.trackingUrl=result.trackingUrl;}
            if(result.status==="Shipped") patch.shippedAt=new Date().toISOString();
            var updated=addAuditEntry(Object.assign({},fulfillTarget2,patch),result.status==="Shipped"?"Tracking added → Shipped":"Sent to fulfillment","Admin",result.trackingNumber||"");
            onUpdate(updated); setViewOrder(updated); setFulfillTarget2(updated);
            dbSave("crm_orders",fulfillTarget2.id,updated);
            addToast("Order "+fulfillTarget2.id+" → "+result.status,"success");
          }}
          onClose={function(){setFulfillTarget2(null);}}/>
      )}
      {editTarget&&(
        <OrderEditModal order={editTarget} products={products} customers={customers}
          onSave={function(updated){onUpdate(updated);dbSave("crm_orders",updated.id,updated);addToast("Order "+updated.id+" updated","success");setEditTarget(null);}}
          onClose={function(){setEditTarget(null);}}/>
      )}
      {dupTarget&&(
        <OrderDupModal order={dupTarget} products={products} customers={customers}
          reps={reps} setOrders={setOrders} addToast={addToast} showResult={showResult}
          onClose={function(){setDupTarget(null);}}/>
      )}
      {showReturn&&viewOrder&&(
        <ReturnModal order={viewOrder} currentUser={currentUser}
          onProcess={function(ret){processReturn(viewOrder,ret);}}
          onClose={function(){setShowReturn(false);}}/>
      )}
      {showSendInv&&viewOrder&&(
        <SendInvoiceModal order={viewOrder} customers={customers} products={products}
          currentUser={currentUser} addToast={addToast} showResult={showResult}
          onClose={function(){setShowSendInv(false);}}/>
      )}
      {/* Order Detail Modal */}
      {viewOrder&&(
        <Modal title={"Order "+viewOrder.id} wide={true} onClose={function(){setViewOrder(null);}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:".07em",marginBottom:12}}>Order Details</div>
              <div style={{background:C.surface2,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                {[
                  ["Status", <Badge status={viewOrder.status}/>],
                  ["Rep", viewOrder.repName||"—"],
                  ["Customer", viewOrder.custName||"—"],
                  ["Date", fmtDate(viewOrder.createdAt)],
                  ["Commission Rate", (viewOrder.commissionRate||0)+"%"],
                ].map(function(row,i){return (
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                                       padding:"6px 0",borderBottom:i<4?"1px solid "+C.border:"none"}}>
                    <span style={{fontSize:12,color:C.muted}}>{row[0]}</span>
                    <span style={{fontSize:12,fontWeight:600,color:C.text}}>{row[1]}</span>
                  </div>
                );})}
              </div>

              {/* Items */}
              <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:".07em",marginBottom:10}}>Items</div>
              <div style={{background:C.surface2,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                {(viewOrder.items||[]).map(function(it,i){
                  var p   = products.find(function(x){return x.id===it.prodId;})||{name:"Unknown"};
                  var cup = it.customerPrice||p.price||0;
                  return (
                    <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,
                                         padding:"4px 0",borderBottom:i<(viewOrder.items||[]).length-1?"1px solid "+C.border:"none"}}>
                      <span style={{color:C.muted}}>{it.qty}× {p.name}</span>
                      <span style={{fontFamily:"monospace",fontWeight:600}}>{fmtMoney((it.unitPrice||0)*it.qty)}</span>
                    </div>
                  );
                })}
                <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,color:C.accent,
                             fontSize:15,marginTop:8,paddingTop:8,borderTop:"1px solid "+C.border}}>
                  <span>Total</span>
                  <span style={{fontFamily:"monospace"}}>{fmtMoney(viewOrder.totals&&viewOrder.totals.grand||0)}</span>
                </div>
              </div>
            </div>

            <div>
              {/* Commission hold */}
              {viewOrder.repId&&(function(){
                var now2 = Date.now();
                var delMs = viewOrder.deliveredAt ? new Date(viewOrder.deliveredAt).getTime() : null;
                var expired = delMs ? (now2-delMs) >= RETURN_WINDOW_DAYS*24*60*60*1000 : false;
                var held = delMs && !expired && viewOrder.status!=="Cancelled" && viewOrder.status!=="Refunded";
                var blocked = viewOrder.status==="Cancelled"||viewOrder.status==="Refunded";
                if(!delMs) return null;
                var col2 = blocked?C.danger:held?C.warning:C.success;
                var msg = blocked?"🚫 Commission blocked — order cancelled/refunded"
                        : held?"🔒 Held — return window expires "+fmtDate(new Date(delMs+RETURN_WINDOW_DAYS*24*60*60*1000).toISOString())
                        : "✅ Commission released — return window closed";
                return (
                  <div style={{padding:"10px 14px",background:col2+"10",border:"1px solid "+col2+"30",
                               borderRadius:10,marginBottom:14,fontSize:12,color:col2,fontWeight:600}}>
                    {msg}
                  </div>
                );
              })()}

              {/* Totals */}
              <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:".07em",marginBottom:10}}>Financials</div>
              <div style={{background:C.surface2,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                {[
                  ["Subtotal", fmtMoney(viewOrder.totals&&viewOrder.totals.subtotal||0)],
                  ["Shipping", fmtMoney(viewOrder.totals&&viewOrder.totals.shipping||0)],
                  ["Tax", fmtMoney(viewOrder.totals&&viewOrder.totals.tax||0)],
                  ["Grand Total", fmtMoney(viewOrder.totals&&viewOrder.totals.grand||0)],
                  ["Commission ("+( viewOrder.commissionRate||0)+"%)", fmtMoney(viewOrder.totals&&viewOrder.totals.commission||0)],
                ].map(function(row,i){return (
                  <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,
                                       padding:"5px 0",borderBottom:i<4?"1px solid "+C.border:"none",
                                       fontWeight:i===3||i===4?700:400,
                                       color:i===3?C.accent:i===4?C.gold:C.text}}>
                    <span style={{color:i<3?C.muted:undefined}}>{row[0]}</span>
                    <span style={{fontFamily:"monospace"}}>{row[1]}</span>
                  </div>
                );})}
              </div>

              {/* Return window indicator */}
              {(function(){
                var now3=Date.now();
                var delMs2=viewOrder.deliveredAt?new Date(viewOrder.deliveredAt).getTime():null;
                if(!delMs2) return null;
                var daysLeft2=Math.max(0,Math.ceil((RETURN_WINDOW_DAYS*24*60*60*1000-(now3-delMs2))/(24*60*60*1000)));
                var inWin=daysLeft2>0;
                return (
                  <div style={{padding:"9px 14px",borderRadius:8,marginBottom:14,fontSize:12,fontWeight:600,
                               background:inWin?C.warning+"10":C.success+"10",
                               border:"1px solid "+(inWin?C.warning:C.success)+"30",
                               color:inWin?C.warning:C.success}}>
                    {inWin?"🔒 Return window: "+daysLeft2+" day"+(daysLeft2!==1?"s":"")+" remaining"
                          :"✅ Return window closed — commission released"}
                  </div>
                );
              })()}

              {/* Notes */}
              {viewOrder.notes&&(
                <div style={{background:C.surface2,borderRadius:10,padding:"12px 14px",marginBottom:14}}>
                  <div style={{fontSize:10,fontWeight:600,color:C.dim,marginBottom:6}}>NOTES</div>
                  <div style={{fontSize:12,color:C.muted,lineHeight:1.6}}>{viewOrder.notes}</div>
                </div>
              )}

              {/* Audit Log */}
              {auditTab&&(
                <div style={{background:C.surface2,borderRadius:10,padding:"12px 14px"}}>
                  <div style={{fontSize:10,fontWeight:700,color:C.dim,textTransform:"uppercase",letterSpacing:".07em",marginBottom:10}}>Audit Log</div>
                  {(!viewOrder.auditLog||viewOrder.auditLog.length===0)?(
                    <div style={{fontSize:12,color:C.dim,fontStyle:"italic"}}>No audit entries yet.</div>
                  ):(
                    <div>
                      {viewOrder.auditLog.map(function(entry,i){return (
                        <div key={i} style={{display:"flex",gap:10,marginBottom:8,paddingBottom:8,
                                             borderBottom:i<viewOrder.auditLog.length-1?"1px solid "+C.border:"none"}}>
                          <div style={{width:7,height:7,borderRadius:"50%",background:C.accent,flexShrink:0,marginTop:5}}/>
                          <div style={{flex:1}}>
                            <div style={{fontSize:12,fontWeight:600,color:C.text}}>{entry.action}</div>
                            <div style={{fontSize:10,color:C.dim,marginTop:1}}>{entry.actor} · {fmtDate(entry.ts)}</div>
                            {entry.detail&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>{entry.detail}</div>}
                          </div>
                        </div>
                      );})}
                    </div>
                  )}
                </div>
              )}

              {/* Actions */}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {ORDER_PIPELINE.indexOf(viewOrder.status)>=0&&ORDER_PIPELINE.indexOf(viewOrder.status)<ORDER_PIPELINE.length-1&&(
                  <Btn onClick={function(){advance(viewOrder);}}>
                    Advance → {ORDER_PIPELINE[ORDER_PIPELINE.indexOf(viewOrder.status)+1]}
                  </Btn>
                )}
                {viewOrder.status!=="Cancelled"&&viewOrder.status!=="Refunded"&&viewOrder.status!=="Paid"&&(
                  <Btn variant="danger" onClick={function(){cancel(viewOrder);}}>Cancel</Btn>
                )}
              </div>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}
