</script>
<script id="c4" type="text/plain">
function OrderForm({repId,repName,products,customers,setCustomers,setOrders,
                    editOrder,onClose,addToast,showResult}) {
  const [step,       setStep]       = useState(1);
  const [custId,     setCustId]     = useState((editOrder&&editOrder.custId)||"");
  const [custSearch, setCustSearch] = useState("");
  const [custOpen,   setCustOpen]   = useState(false);
  const [items,      setItems]      = useState((editOrder&&editOrder.items)||[{prodId:"",qty:1,unitPrice:0}]);
  const [commRate,   setCommRate]   = useState((editOrder&&editOrder.commissionRate)||10);
  const [notes,      setNotes]      = useState((editOrder&&editOrder.notes)||"");
  const [shipAddr,   setShipAddr]   = useState((editOrder&&editOrder.shipAddress)||{name:"",address:"",city:"",state:"",zip:""});
  const [cardNum,    setCardNum]    = useState("");
  const [cardExp,    setCardExp]    = useState("");
  const [cardCvv,    setCardCvv]    = useState("");
  const [cardName2,  setCardName2]  = useState("");
  const [payMethod,  setPayMethod]  = useState("pay_now");
  const [agreed,     setAgreed]     = useState(false);
  const [placing,    setPlacing]    = useState(false);
  const [newCustName, setNewCustName] = useState("");
  const [newCustEmail,setNewCustEmail] = useState("");
  const [newCustComp, setNewCustComp]  = useState("");
  const [showNewCust, setShowNewCust]  = useState(false);

  var isEdit = !!(editOrder&&editOrder.id);
  var selCust = customers.find(function(c){return c.id===custId;})||null;
  var filtCusts = custSearch ? customers.filter(function(c){
    var s = custSearch.toLowerCase();
    return (c.name||"").toLowerCase().indexOf(s)>=0||(c.email||"").toLowerCase().indexOf(s)>=0;
  }) : customers;

  var activeProds = products.filter(function(p){return p.active!==false;});

  function calcTotals() {
    var subtotal = items.reduce(function(s,it){
      var p = products.find(function(x){return x.id===it.prodId;});
      return s + (p?p.price:it.unitPrice||0)*it.qty;
    },0);
    var commission = subtotal*(parseFloat(commRate)||0)/100;
    return {subtotal:subtotal,shipping:0,tax:0,grand:subtotal,commission:commission};
  }

  var totals = calcTotals();
  var validItems = items.filter(function(it){return it.prodId&&it.qty>0;});
  var cardFilled = cardNum.replace(/\s/g,"").length>=15 && cardExp.length>=4 && cardCvv.length>=3;
  var step1Valid = custId && validItems.length>0;
  var step2Valid = payMethod==="pay_later" || cardFilled;

  function addItem() { setItems(function(prev){return prev.concat([{prodId:"",qty:1,unitPrice:0}]);}); }
  function removeItem(i) { setItems(function(prev){return prev.filter(function(_,j){return j!==i;});}); }
  function updateItem(i,field,val) {
    setItems(function(prev){
      return prev.map(function(it,j){
        if(j!==i) return it;
        var updated = Object.assign({},it);
        updated[field] = val;
        if(field==="prodId") {
          var p = products.find(function(x){return x.id===val;});
          if(p) updated.unitPrice = p.price;
        }
        return updated;
      });
    });
  }

  function createCustomer() {
    if(!newCustName.trim()) return;
    var id = genId("cust");
    var cust = {id:id,name:newCustName.trim(),email:newCustEmail.trim(),
                company:newCustComp.trim(),repId:repId,
                createdAt:new Date().toISOString()};
    setCustomers(function(prev){return [cust].concat(prev);});
    dbSave("crm_customers",id,cust);
    setCustId(id);
    setShowNewCust(false);
    setNewCustName(""); setNewCustEmail(""); setNewCustComp("");
  }

  function placeOrder() {
    if(!agreed||placing) return;
    setPlacing(true);
    var ordId = "ORD-"+String(Date.now()).slice(-6);
    var order = {
      id:ordId, repId:repId, repName:repName,
      custId:custId, custName:selCust?selCust.name:"",
      items:validItems, commissionRate:parseFloat(commRate)||0,
      totals:totals, notes:notes,
      shipAddress:shipAddr, payMethod:payMethod,
      status:"Submitted", createdAt:new Date().toISOString(),
      payment:{method:payMethod,cardLast4:payMethod==="pay_now"?cardNum.replace(/\s/g,"").slice(-4):null}
    };
    setOrders(function(prev){return [order].concat(prev);});
    dbSave("crm_orders",ordId,order);
    setPlacing(false);
    addToast("Order "+ordId+" placed","success");
    showResult({type:"order",title:"Order Placed!",subtitle:"Your order has been submitted for processing.",
      rows:[["Order #",ordId],["Customer",selCust?selCust.name:""],["Total",fmtMoney(totals.grand)],["Status","Submitted"]],
      nextStep:"You'll be notified as your order progresses.",cta:"Done"});
    onClose();
  }

  var STEPS = ["Details","Payment","Confirm"];

  function StepDots() {
    return (
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:0,marginBottom:4}}>
        {STEPS.map(function(s,i){
          var done = i+1<step; var active = i+1===step;
          return (
            <div key={s} style={{display:"flex",alignItems:"center"}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                             fontWeight:700,fontSize:11,
                             background:done?C.success:active?C.accent:C.surface2,
                             color:done||active?"#fff":C.dim,
                             border:"2px solid "+(done?C.success:active?C.accent:C.border)}}>
                  {done?"✓":i+1}
                </div>
                <div style={{fontSize:9,fontWeight:active?700:400,color:active?C.accent:done?C.success:C.dim,
                             textTransform:"uppercase",letterSpacing:".05em"}}>{s}</div>
              </div>
              {i<STEPS.length-1&&<div style={{width:36,height:2,background:done?C.success:C.border,margin:"0 4px 14px"}}/>}
            </div>
          );
        })}
      </div>
    );
  }

  /* Step 1: Details */
  if(step===1) return (
    <Modal title={<StepDots/>} wide={true} onClose={onClose}
      footer={<div style={{display:"flex",justifyContent:"space-between"}}>
        <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
        <Btn onClick={function(){setStep(2);}} disabled={!step1Valid}>Continue to Payment →</Btn>
      </div>}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <div>
          {/* Customer picker */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:5}}>Customer *</div>
            <div style={{position:"relative"}}>
              <div onClick={function(){setCustOpen(!custOpen);}}
                style={{padding:"9px 12px",background:C.bg,border:"1px solid "+(custOpen?C.accent:C.border),
                        borderRadius:7,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                {selCust
                  ? <span style={{fontSize:13,fontWeight:600,color:C.text}}>{selCust.name}</span>
                  : <span style={{fontSize:13,color:C.dim}}>Select customer…</span>}
                <span style={{fontSize:10,color:C.dim}}>{custOpen?"▲":"▼"}</span>
              </div>
              {custOpen&&(
                <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:200,
                             background:C.surface,border:"1px solid "+C.border,borderRadius:8,
                             boxShadow:"0 8px 32px rgba(0,0,0,.3)",marginTop:4}}>
                  <div style={{padding:8,borderBottom:"1px solid "+C.border}}>
                    <input autoFocus value={custSearch} onChange={function(e){setCustSearch(e.target.value);}}
                      placeholder="Search…"
                      style={{width:"100%",background:C.surface2,border:"1px solid "+C.border,borderRadius:6,
                              padding:"6px 10px",color:C.text,fontSize:12,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
                  </div>
                  <div style={{maxHeight:200,overflowY:"auto"}}>
                    <div onClick={function(){setShowNewCust(true);setCustOpen(false);}}
                      style={{padding:"9px 12px",cursor:"pointer",fontSize:12,color:C.accent,fontWeight:600,
                              borderBottom:"1px solid "+C.border}}>+ New Customer</div>
                    {filtCusts.length===0&&<div style={{padding:"12px",fontSize:12,color:C.dim,textAlign:"center"}}>No customers found</div>}
                    {filtCusts.map(function(cu){return (
                      <div key={cu.id} onClick={function(){setCustId(cu.id);setCustOpen(false);setCustSearch("");}}
                        style={{padding:"9px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,
                                background:cu.id===custId?C.accent+"10":"none",borderBottom:"1px solid "+C.border}}>
                        <Avatar name={cu.name} size={26}/>
                        <div>
                          <div style={{fontSize:12,fontWeight:600,color:C.text}}>{cu.name}</div>
                          <div style={{fontSize:10,color:C.dim}}>{cu.email||cu.company||""}</div>
                        </div>
                      </div>
                    );})}
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* New Customer inline */}
          {showNewCust&&(
            <div style={{background:C.surface2,borderRadius:10,padding:"14px",marginBottom:14,border:"1px solid "+C.border}}>
              <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>New Customer</div>
              <Field label="Name *" value={newCustName} onChange={setNewCustName} placeholder="Dr. Jane Smith"/>
              <Field label="Email" value={newCustEmail} onChange={setNewCustEmail} type="email" placeholder="jane@practice.com"/>
              <Field label="Company" value={newCustComp} onChange={setNewCustComp} placeholder="Smith Medical"/>
              <div style={{display:"flex",gap:8}}>
                <Btn small onClick={createCustomer} disabled={!newCustName.trim()}>Add Customer</Btn>
                <Btn small variant="ghost" onClick={function(){setShowNewCust(false);}}>Cancel</Btn>
              </div>
            </div>
          )}

          {/* Shipping address */}
          <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:8}}>Ship To</div>
          <div style={{background:C.surface2,borderRadius:10,padding:"12px",marginBottom:14}}>
            <Field label="Contact Name" value={shipAddr.name} onChange={function(v){setShipAddr(Object.assign({},shipAddr,{name:v}));}} placeholder="Dr. Jane Smith"/>
            <Field label="Address" value={shipAddr.address} onChange={function(v){setShipAddr(Object.assign({},shipAddr,{address:v}));}} placeholder="123 Medical Dr"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              <Field label="City" value={shipAddr.city} onChange={function(v){setShipAddr(Object.assign({},shipAddr,{city:v}));}}/>
              <Field label="State" value={shipAddr.state} onChange={function(v){setShipAddr(Object.assign({},shipAddr,{state:v}));}} placeholder="CA"/>
              <Field label="ZIP" value={shipAddr.zip} onChange={function(v){setShipAddr(Object.assign({},shipAddr,{zip:v}));}}/>
            </div>
          </div>
        </div>

        <div>
          {/* Items */}
          <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:8}}>Order Items *</div>
          {items.map(function(it,i){return (
            <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 80px auto",gap:8,marginBottom:8,alignItems:"flex-end"}}>
              <div>
                {i===0&&<div style={{fontSize:10,color:C.dim,marginBottom:4}}>Product</div>}
                <select value={it.prodId} onChange={function(e){updateItem(i,"prodId",e.target.value);}}
                  style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:7,
                          padding:"9px 12px",color:it.prodId?C.text:C.dim,fontSize:13,fontFamily:"inherit",outline:"none"}}>
                  <option value="">Select product…</option>
                  {activeProds.map(function(p){return <option key={p.id} value={p.id}>{p.name} — {fmtMoney(p.price)}</option>;})}
                </select>
              </div>
              <div>
                {i===0&&<div style={{fontSize:10,color:C.dim,marginBottom:4}}>Qty</div>}
                <input type="number" min="1" value={it.qty}
                  onChange={function(e){updateItem(i,"qty",parseInt(e.target.value)||1);}}
                  style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:7,
                          padding:"9px 10px",color:C.text,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
              </div>
              {items.length>1&&(
                <button onClick={function(){removeItem(i);}}
                  style={{background:"none",border:"none",color:C.danger,cursor:"pointer",
                          fontSize:16,padding:"8px 4px",marginTop:i===0?16:0}}>×</button>
              )}
            </div>
          );})}
          <button onClick={addItem}
            style={{background:"none",border:"1px dashed "+C.border,borderRadius:7,
                    color:C.accent,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600,
                    padding:"8px 14px",width:"100%",marginBottom:14}}>
            + Add Item
          </button>

          {/* Totals */}
          <div style={{background:C.surface2,borderRadius:10,padding:"14px",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:10}}>TOTALS</div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:800,color:C.accent,marginBottom:10}}>
              <span>Grand Total</span>
              <span style={{fontFamily:"monospace"}}>{fmtMoney(totals.grand)}</span>
            </div>
            <div>
              <div style={{fontSize:10,color:C.muted,marginBottom:5}}>Commission Rate</div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <input type="range" min="0" max="25" step="0.5" value={commRate}
                  onChange={function(e){setCommRate(e.target.value);}}
                  style={{flex:1,accentColor:C.accent}}/>
                <span style={{fontSize:13,fontWeight:700,color:C.gold,fontFamily:"monospace",minWidth:45,textAlign:"right"}}>
                  {commRate}% = {fmtMoney(totals.commission)}
                </span>
              </div>
            </div>
          </div>

          {/* Notes */}
          <TextArea label="Notes (optional)" value={notes} onChange={setNotes} rows={2} placeholder="Special instructions…"/>
        </div>
      </div>
    </Modal>
  );

  /* Step 2: Payment */
  if(step===2) return (
    <Modal title={<StepDots/>} onClose={onClose}
      footer={<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
        <Btn variant="ghost" onClick={function(){setStep(1);}}>← Back</Btn>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {!step2Valid&&payMethod==="pay_now"&&<span style={{fontSize:11,color:C.danger}}>Complete card details</span>}
          <Btn onClick={function(){setStep(3);}} disabled={!step2Valid}>Review & Confirm →</Btn>
        </div>
      </div>}>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        {/* Pay method toggle */}
        <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:10}}>Payment Method</div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {[["pay_now","💳 Pay Now","Charge card immediately"],["pay_later","📄 Pay Later","Invoice on delivery"]].map(function(opt){
            var sel = payMethod===opt[0];
            return (
              <button key={opt[0]} onClick={function(){setPayMethod(opt[0]);}}
                style={{flex:1,padding:"12px 10px",borderRadius:10,textAlign:"left",fontFamily:"inherit",cursor:"pointer",
                        border:"2px solid "+(sel?C.accent:C.border),background:sel?C.accent+"10":C.surface2}}>
                <div style={{fontSize:13,fontWeight:700,color:sel?C.accent:C.text,marginBottom:2}}>{opt[1]}</div>
                <div style={{fontSize:10,color:C.dim}}>{opt[2]}</div>
              </button>
            );
          })}
        </div>

        {payMethod==="pay_now"&&(
          <div style={{background:C.surface2,borderRadius:12,padding:"16px 18px"}}>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:14}}>Card Details</div>
            <Field label="Card Number *" value={cardNum} onChange={function(v){
              var n=v.replace(/\D/g,"").slice(0,16);
              setCardNum(n.replace(/(.{4})/g,"$1 ").trim());
            }} placeholder="1234 5678 9012 3456"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              <Field label="Expiry *" value={cardExp} onChange={function(v){
                var n=v.replace(/\D/g,"");
                if(n.length>=2) n=n.slice(0,2)+"/"+n.slice(2,4);
                setCardExp(n);
              }} placeholder="09/27"/>
              <Field label="CVV *" value={cardCvv} onChange={function(v){setCardCvv(v.replace(/\D/g,"").slice(0,4));}} type="password" placeholder="123"/>
            </div>
            <Field label="Name on Card" value={cardName2} onChange={setCardName2} placeholder="Jane Smith"/>

              <span>Total to charge</span>
              <span style={{fontFamily:"monospace"}}>{fmtMoney(totals.grand)}</span>
            </div>
          </div>
        )}

        {payMethod==="pay_later"&&(
          <div style={{background:C.accent+"10",border:"2px solid "+C.accent+"30",borderRadius:12,padding:"18px"}}>

            </div>
          </div>
        )}

    </Modal>
  );

  /* Step 3: Confirm */
  return (
    <Modal title={<StepDots/>} wide={true} onClose={onClose}
      footer={<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>

        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <label style={{display:"flex",alignItems:"center",gap:7,fontSize:12,color:C.muted,cursor:"pointer"}}>
            <input type="checkbox" checked={agreed} onChange={function(e){setAgreed(e.target.checked);}} style={{accentColor:C.accent}}/>
            I confirm this order and payment terms
          </label>
          <Btn onClick={placeOrder} disabled={!agreed||placing}>
            {placing?"Placing…":"Place Order"}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:".07em",marginBottom:12}}>Order Summary</div>
          <div style={{background:C.surface2,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
            {validItems.map(function(it,i){
              var p = products.find(function(x){return x.id===it.prodId;})||{name:"Unknown",price:0};
              return (
                <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",
                                     borderBottom:i<validItems.length-1?"1px solid "+C.border:"none"}}>
                  <span style={{color:C.muted}}>{it.qty}× {p.name}</span>
                  <span style={{fontFamily:"monospace",fontWeight:600}}>{fmtMoney(p.price*it.qty)}</span>
                </div>
              );
            })}
            <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,color:C.accent,fontSize:16,marginTop:8,paddingTop:8,borderTop:"1px solid "+C.border}}>
              <span>Total</span><span style={{fontFamily:"monospace"}}>{fmtMoney(totals.grand)}</span>
            </div>
          </div>
          {selCust&&(
            <div style={{background:C.surface2,borderRadius:10,padding:"12px 14px"}}>
              <div style={{fontSize:10,fontWeight:600,color:C.dim,marginBottom:6}}>SHIP TO</div>
              <div style={{fontSize:12,fontWeight:600,color:C.text}}>{shipAddr.name||selCust.name}</div>
              {shipAddr.address&&<div style={{fontSize:11,color:C.muted,marginTop:2,lineHeight:1.5}}>{shipAddr.address}<br/>{[shipAddr.city,shipAddr.state,shipAddr.zip].filter(Boolean).join(", ")}</div>}
            </div>
          )}
        </div>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:".07em",marginBottom:12}}>Payment</div>
          {payMethod==="pay_now"?(
            <div style={{background:C.gold+"10",border:"2px solid "+C.gold+"30",borderRadius:10,padding:"14px 16px",marginBottom:14}}>
              <div style={{fontSize:14,fontWeight:800,color:C.gold,marginBottom:6}}>💳 Charging Card</div>
              <div style={{fontSize:12,color:C.muted}}>···· {cardNum.replace(/\s/g,"").slice(-4)} · exp {cardExp}</div>
              <div style={{fontSize:18,fontWeight:900,color:C.gold,fontFamily:"monospace",marginTop:8}}>{fmtMoney(totals.grand)}</div>
            </div>
          ):(
            <div style={{background:C.accent+"10",border:"2px solid "+C.accent+"30",borderRadius:10,padding:"14px 16px",marginBottom:14}}>
              <div style={{fontSize:14,fontWeight:800,color:C.accent,marginBottom:6}}>📄 Invoice on Delivery</div>
              <div style={{fontSize:18,fontWeight:900,color:C.accent,fontFamily:"monospace",marginTop:4}}>{fmtMoney(totals.grand)}</div>
            </div>
          )}
          <div style={{background:C.gold+"10",border:"1px solid "+C.gold+"20",borderRadius:8,padding:"10px 12px",fontSize:12,color:C.gold,fontWeight:600,marginBottom:14}}>
            Commission: {fmtMoney(totals.commission)} ({commRate}%)
          </div>
          <div style={{padding:"10px 12px",background:C.warning+"10",border:"1px solid "+C.warning+"25",borderRadius:8,fontSize:11,color:C.warning,lineHeight:1.5}}>
            ⚠ Once placed, this order will be submitted for processing.
          </div>
        </div>
      </div>
    </Modal>
  );
}

<script id="c5" type="text/plain">
function RepDashboard({repId,repName,orders,customers,commissions,onNav,addToast}) {

  var heldComm = myOrds.filter(function(o){
    if(!o.deliveredAt) return false;

    return (now-new Date(o.deliveredAt).getTime()) < RETURN_WINDOW_DAYS*24*60*60*1000;
  }).reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);
  var releasedComm = myOrds.filter(function(o){

    if(o.status==="Cancelled"||o.status==="Refunded") return false;
    var paidIds = myComm.map(function(c){return c.orderId;});
    return (now-new Date(o.deliveredAt).getTime()) >= RETURN_WINDOW_DAYS*24*60*60*1000 && paidIds.indexOf(o.id)<0;

            <div style={{fontWeight:700,fontSize:13,color:C.warning}}>🔒 {fmtMoney(heldComm)} held — return window open</div>

        </div>

/* ─── Rep Customers ──────────────────────────────────────────────────────── */
function RepCustomers({repId,customers,setCustomers,orders,addToast}) {
  const [showForm, setShowForm] = useState(false);
  const [viewCust2, setViewCust2] = useState(null);
  const [editCust, setEditCust] = useState(null);
  const [name,     setName]     = useState("");
  const [email,    setEmail]    = useState("");
  const [company,  setCompany]  = useState("");
  const [phone,    setPhone]    = useState("");
  const [addr,     setAddr]     = useState("");
  const [city,     setCity]     = useState("");
  const [state,    setState2]   = useState("");
  const [zip,      setZip]      = useState("");
  const [search,   setSearch]   = useState("");

  var myCusts = customers.filter(function(c){return c.repId===repId;});
  var filtered = myCusts.filter(function(c){
    if(!search) return true;
    var s = search.toLowerCase();
    return (c.name||"").toLowerCase().indexOf(s)>=0||(c.company||"").toLowerCase().indexOf(s)>=0;
  });

  function openNew() {setEditCust(null);setName("");setEmail("");setCompany("");setPhone("");setAddr("");setCity("");setState2("");setZip("");setShowForm(true);}
  function openEdit(c) {setEditCust(c);setName(c.name||"");setEmail(c.email||"");setCompany(c.company||"");setPhone(c.phone||"");setAddr(c.address||"");setCity(c.city||"");setState2(c.state||"");setZip(c.zip||"");setShowForm(true);}

  function save() {
    if(!name.trim()) return;
    var id = editCust ? editCust.id : genId("cust");
    var data = {id:id,repId:repId,name:name.trim(),email:email.trim(),company:company.trim(),
                phone:phone.trim(),address:addr.trim(),city:city.trim(),state:state.trim(),zip:zip.trim(),
                updatedAt:new Date().toISOString()};
    if(!editCust) data.createdAt = new Date().toISOString();
    setCustomers(function(prev){
      return editCust ? prev.map(function(c){return c.id===editCust.id?data:c;}) : [data].concat(prev);
    });
    dbSave("crm_customers",id,data);
    addToast(editCust?"Customer updated":"Customer added","success");
    setShowForm(false);
  }

  return (
    <div>
      <PageHeader title="My Customers" subtitle={myCusts.length+" customers"}
        action={<Btn onClick={openNew}>+ Add Customer</Btn>}/>
      <div style={{marginBottom:14}}>
        <input value={search} onChange={function(e){setSearch(e.target.value);}}
          placeholder="Search customers…"
          style={{width:"100%",maxWidth:360,background:C.surface,border:"1px solid "+C.border,
                  borderRadius:8,padding:"8px 12px",color:C.text,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
      </div>
      {filtered.length===0 ? (
        <EmptyState icon="👥" title="No customers" subtitle="Add your first customer to start placing orders."
          action={<Btn onClick={openNew}>Add Customer</Btn>}/>
      ) : (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
          {filtered.map(function(c){
            var custOrds = orders.filter(function(o){return o.custId===c.id;});
            var spend = custOrds.reduce(function(s,o){return s+(o.totals&&o.totals.grand||0);},0);
            return (
              <div key={c.id} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"16px 18px"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <Avatar name={c.name} size={34}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:14,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                    {c.company&&<div style={{fontSize:11,color:C.dim}}>{c.company}</div>}
                  </div>
                </div>
                {c.email&&<div style={{fontSize:11,color:C.muted,marginBottom:4}}>✉️ {c.email}</div>}
                {c.phone&&<div style={{fontSize:11,color:C.muted,marginBottom:8}}>📞 {c.phone}</div>}
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.dim,
                             padding:"8px 0",borderTop:"1px solid "+C.border,marginBottom:10}}>
                  <span>{custOrds.length} orders</span>
                  <span style={{fontWeight:700,color:C.success}}>{fmtMoney(spend)}</span>
                </div>
<Btn small variant="outline" fullWidth={true} onClick={function(){setViewCust2(c);}} style={{marginBottom:6}}>View Profile</Btn>
                <Btn small variant="ghost" fullWidth={true} onClick={function(){openEdit(c);}}>Edit</Btn>
              </div>
            );
          })}
        </div>
      )}

      {viewCust2&&(
        <CustomerProfile customer={viewCust2} orders={orders} onEdit={openEdit} onClose={function(){setViewCust2(null);}}/> 
      )}
      {showForm&&(
        <Modal title={editCust?"Edit Customer":"New Customer"} onClose={function(){setShowForm(false);}}
          footer={<div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={function(){setShowForm(false);}}>Cancel</Btn><Btn onClick={save}>{editCust?"Save Changes":"Add Customer"}</Btn></div>}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div style={{gridColumn:"1/-1"}}><Field label="Full Name *" value={name} onChange={setName} placeholder="Dr. Jane Smith"/></div>
            <Field label="Email" value={email} onChange={setEmail} type="email" placeholder="jane@practice.com"/>
            <Field label="Phone" value={phone} onChange={setPhone} placeholder="555-1234"/>
            <div style={{gridColumn:"1/-1"}}><Field label="Company / Practice" value={company} onChange={setCompany} placeholder="Smith Medical Group"/></div>
            <div style={{gridColumn:"1/-1"}}><Field label="Address" value={addr} onChange={setAddr} placeholder="123 Medical Dr"/></div>
            <Field label="City" value={city} onChange={setCity}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Field label="State" value={state} onChange={setState2} placeholder="CA"/>
              <Field label="ZIP" value={zip} onChange={setZip}/>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ─── Rep Commissions ────────────────────────────────────────────────────── */

                );})}

            </table>
          </div>

          <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:C.surface2}}>
                {["Date","Order","Amount"].map(function(h){return (
                  <th key={h} style={{padding:"8px 14px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>

        <EmptyState icon="💰" title="No commissions yet" subtitle="Commissions appear here after you place orders and they are delivered."/>
      )}
    </div>
  );
}

/* ─── App Shell ──────────────────────────────────────────────────────────── */
function App() {
  const [theme,       setTheme]       = useLS("theme","dark");
  const [currentUser, setCurrentUser] = useState(null);
  const [loading,     setLoading]     = useState(true);
  const [activeTab,   setActiveTab]   = useState("dashboard");
  const [orders,      setOrders]      = useState([]);
  const [customers,   setCustomers]   = useState([]);
  const [products,    setProducts]    = useState([]);
  const [reps,        setReps]        = useState([]);
  const [commissions, setCommissions] = useState([]);
  const [applications, setApplications] = useState([]);
  const [supabaseCfg, setSupabaseCfg] = useLS("supabaseCfg",{});
  const [toasts,      setToasts]      = useState([]);
  const [resultModal, setResultModal] = useState(null);

  // Apply theme
  Object.assign(C, THEMES[theme]||THEMES.dark);
  useEffect(function(){
    document.body.style.background = C.bg;
    document.body.style.color = C.text;
  }, [theme]);

  function addToast(msg, type, detail) {
    var id = Date.now();
    setToasts(function(prev){return [{id:id,msg:msg,type:type||"success",detail:detail||""}].concat(prev).slice(0,5);});
    setTimeout(function(){setToasts(function(prev){return prev.filter(function(t){return t.id!==id;});});}, 4500);
  }

  function showResult(data) { setResultModal(data); }

  // Session restore
  useEffect(function() {
    var sb = getSB();
    if(!sb) { setLoading(false); return; }
    sb.auth.getSession()
      .then(function(r){
        var session = r.data&&r.data.session;
        if(!session) { setLoading(false); return; }
        return sb.from("crm_users").select("*").eq("id",session.user.id).single()
          .then(function(ur){
            if(ur.data) setCurrentUser(Object.assign({},ur.data,{email:session.user.email}));
            setLoading(false);
          });
      })
      .catch(function(e){
        console.warn("Session restore error:",e.message);
        setLoading(false);
      });
  }, []);

  // Load data when logged in
  useEffect(function() {
    if(!currentUser) return;
    var alive = true;
    dbLoad("crm_orders").then(function(d){if(alive) setOrders(d);});
    dbLoad("crm_customers").then(function(d){if(alive) setCustomers(d);});
    dbLoad("crm_products").then(function(d){if(alive) setProducts(d);});
    dbLoad("crm_reps").then(function(d){if(alive) setReps(d);});
    dbLoad("crm_commission_payouts").then(function(d){if(alive) setCommissions(d);});
    dbLoad("crm_applications").then(function(d){if(alive) setApplications(d);});
    return function(){alive=false;};
  }, [currentUser&&currentUser.id]);

  function handleLogin(user) { setCurrentUser(user); setActiveTab("dashboard"); }
  function handleLogout() {
    var sb = getSB();
    if(sb) sb.auth.signOut();
    setCurrentUser(null); setActiveTab("dashboard");
  }

  if(loading) return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Inter',system-ui,sans-serif"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:32,height:32,border:"3px solid "+C.border,borderTopColor:C.accent,
                     borderRadius:"50%",animation:"spin .7s linear infinite",margin:"0 auto 16px"}}/>
        <div style={{fontSize:13,color:C.muted}}>Loading…</div>
      </div>
    </div>
  );

  if(!currentUser) return React.createElement(AppLanding, {onLogin:handleLogin});

  var isAdmin = currentUser.role==="admin";
  var myRepData = isAdmin ? null : reps.find(function(r){return r.id===currentUser.rep_id||r.email===currentUser.email;})||null;

  // Rep agreement gate
  var needsAgreement = !isAdmin && myRepData && !myRepData.agreementSignedAt;
  // Rep subscription gate
  var now2 = Date.now();
  var trialExpired = !isAdmin && myRepData && myRepData.trialStartedAt &&
    (now2-new Date(myRepData.trialStartedAt).getTime()) >= TRIAL_DAYS*24*60*60*1000 &&
    myRepData.subscriptionStatus!=="active";

  if(needsAgreement) return React.createElement(RepAgreementModal, {
    repName: currentUser.name,
    onAgree: function() {
      var updated = Object.assign({},myRepData,{
        agreementSignedAt: new Date().toISOString(),
        agreementVersion: REP_AGREEMENT_VERSION,
      });
      setReps(function(prev){return prev.map(function(r){return r.id===myRepData.id?updated:r;});});
      dbSave("crm_reps",myRepData.id,updated);
    },
    onDecline: handleLogout,
  });

  if(trialExpired) return React.createElement(RepSubscriptionWall, {
    rep: myRepData,
    onActivate: function(planId) {
      var updated = Object.assign({},myRepData,{planId:planId,subscriptionStatus:"active",planActivatedAt:new Date().toISOString()});
      setReps(function(prev){return prev.map(function(r){return r.id===myRepData.id?updated:r;});});
      dbSave("crm_reps",myRepData.id,updated);
    },
    onLogout: handleLogout,
  });

  var adminModules = [
    {label:"General"},
    {id:"dashboard",  name:"Dashboard",   icon:"◉"},
    {id:"email",      name:"Email",       icon:"✉️"},
    {id:"orders",     name:"Orders",      icon:"📦"},
    {id:"customers",  name:"Customers",   icon:"👥"},
    {id:"products",   name:"Products",    icon:"📋"},
    {divider:true},
    {label:"Management"},
    {id:"reps",       name:"Sales Reps",  icon:"🤝"},
    {id:"commissions",name:"Commissions", icon:"💰"},
    {id:"settings",   name:"Settings",    icon:"⚙️"},
  ];

  var repModules = [
    {id:"dashboard",  name:"Dashboard",   icon:"◉"},
    {id:"email",      name:"Email",       icon:"✉️"},
    {id:"new_order",  name:"New Order",   icon:"➕"},
    {id:"orders",     name:"My Orders",   icon:"📦"},
    {id:"customers",  name:"Customers",   icon:"👥"},
    {id:"commissions",name:"Commissions", icon:"💰"},
    {id:"profile",    name:"My Profile",  icon:"👤"},
  ];

  var modules = isAdmin ? adminModules : repModules;

  return (
    <div style={{display:"flex",minHeight:"100vh",background:C.bg,color:C.text,
                 fontFamily:"'Inter',system-ui,-apple-system,sans-serif"}}>
      <Sidebar modules={modules} active={activeTab} onNav={setActiveTab}
        user={currentUser} onLogout={handleLogout}
        theme={theme} onToggleTheme={function(){setTheme(theme==="dark"?"light":"dark");}}/>

      <main style={{flex:1,overflowY:"auto",padding:"28px 32px",minWidth:0}}>
        {/* Admin Modules */}
        {(activeTab==="email")&&(
          <EmailModule currentUser={currentUser} customers={customers} orders={orders}
            isAdmin={isAdmin} addToast={addToast} showResult={showResult}/>
        )}

        {isAdmin&&activeTab==="dashboard"&&(
          <AdminDashboard orders={orders} reps={reps} customers={customers} products={products} commissions={commissions} onNav={setActiveTab}/>
        )}
        {isAdmin&&activeTab==="orders"&&(
          <AdminOrders orders={orders} reps={reps} customers={customers} products={products}
            onUpdate={function(updated){setOrders(function(prev){return prev.map(function(o){return o.id===updated.id?updated:o;});});}}
            addToast={addToast}/>
        )}
        {isAdmin&&activeTab==="customers"&&(
          <AdminCustomers customers={customers} reps={reps} orders={orders} addToast={addToast}/>
        )}
        {isAdmin&&activeTab==="products"&&(
          <AdminProducts products={products} setProducts={setProducts} addToast={addToast}/>
        )}
        {isAdmin&&activeTab==="reps"&&(
          <AdminReps reps={reps} setReps={setReps} orders={orders}
            applications={applications} setApplications={setApplications}
            addToast={addToast} showResult={showResult}/>
        )}
        {isAdmin&&activeTab==="commissions"&&(
          <AdminCommissions orders={orders} reps={reps} commissions={commissions}
            setCommissions={setCommissions} addToast={addToast} showResult={showResult}/>
        )}
        {isAdmin&&activeTab==="settings"&&(
          <AdminSettings supabaseCfg={supabaseCfg} onSaveSupabase={setSupabaseCfg} addToast={addToast}/>
        )}

        {/* Rep Modules */}
        {!isAdmin&&activeTab==="dashboard"&&(
          <RepDashboard repId={currentUser.rep_id||currentUser.id} repName={currentUser.name}
            orders={orders} customers={customers} commissions={commissions} onNav={setActiveTab} addToast={addToast}/>
        )}
        {!isAdmin&&(activeTab==="orders"||activeTab==="new_order")&&(
          <RepOrders repId={currentUser.rep_id||currentUser.id} repName={currentUser.name}
            currentUser={currentUser} orders={orders} customers={customers} products={products}
            setOrders={setOrders} setCustomers={setCustomers}
            addToast={addToast} showResult={showResult}/>
        )}
        {!isAdmin&&activeTab==="customers"&&(
          <RepCustomers repId={currentUser.rep_id||currentUser.id}
            customers={customers} setCustomers={setCustomers}
            orders={orders} addToast={addToast}/>
        )}
        {!isAdmin&&activeTab==="commissions"&&(
          <RepCommissions repId={currentUser.rep_id||currentUser.id}
            orders={orders} commissions={commissions}/>
        )}
        {!isAdmin&&activeTab==="profile"&&(
          <RepProfile user={currentUser} repData={myRepData} setReps={setReps} commissions={commissions} addToast={addToast}/>
        )}
        {!isAdmin&&activeTab==="new_order"&&null}
      </main>

      {React.createElement(ToastStack,{toasts:toasts,setToasts:setToasts})}
      {resultModal&&React.createElement(ResultModal,{data:resultModal,onClose:function(){setResultModal(null);}})}
    </div>
  );
}

</script>

<script>
var N=7;
window.addEventListener('load',function(){
  var e=document.getElementById('err');
  function showErr(m){e.style.display='block';e.textContent=m;}
  try{
    var code='const {useState,useCallback,useRef,useEffect}=React;\n';
    for(var i=0;i<N;i++){
      var src=document.getElementById('c'+i).textContent;
      code+=Babel.transform(src,{presets:[['react',{}]],sourceType:'script',filename:'c'+i+'.jsx'}).code+'\n';
    }
    code+='\nReactDOM.createRoot(document.getElementById(\'root\')).render(React.createElement(App));';
    new Function('React','ReactDOM',code)(React,ReactDOM);
  }catch(ex){showErr('Error: '+ex.message+'\n\n'+(ex.stack||''));}
});
</script>
</body></html>
