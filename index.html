<script id="c10" type="text/plain">
function AdminProducts({products,setProducts,addToast}) {
  const [showForm, setShowForm] = useState(false);
  const [editing,  setEditing]  = useState(null);
  const [name,     setName]     = useState("");
  const [sku,      setSku]      = useState("");
  const [price,    setPrice]    = useState("");
  const [category, setCategory] = useState("");
  const [desc,     setDesc]     = useState("");
  const [active,   setActive]   = useState(true);
  const [imgUrl,   setImgUrl]   = useState("");

  function openNew() { setEditing(null);setName("");setSku("");setPrice("");setCategory("");setDesc("");setActive(true);setImgUrl("");setShowForm(true); }
  function openEdit(p) { setEditing(p);setName(p.name||"");setSku(p.sku||"");setPrice(String(p.price||""));setCategory(p.category||"");setDesc(p.description||"");setActive(p.active!==false);setImgUrl(p.imageUrl||"");setShowForm(true); }

  function save() {
    if(!name.trim()||!price){return;}
    var data = {id:editing?editing.id:genId("prod"),name:name.trim(),sku:sku.trim(),
                price:parseFloat(price)||0,category:category.trim(),
                description:desc.trim(),active:active,imageUrl:imgUrl.trim(),updatedAt:new Date().toISOString()};
    if(!editing) data.createdAt = new Date().toISOString();
    setProducts(function(prev){
      return editing ? prev.map(function(p){return p.id===editing.id?data:p;}) : [data].concat(prev);
    });
    dbSave("crm_products",data.id,data);
    addToast(editing?"Product updated":"Product added","success");
    setShowForm(false);
  }

  function toggle(p) {
    var updated = Object.assign({},p,{active:!p.active});
    setProducts(function(prev){return prev.map(function(x){return x.id===p.id?updated:x;});});
    dbSave("crm_products",p.id,updated);
    addToast(p.name+(updated.active?" activated":" deactivated"),"info");
  }

  return (
    <div>
      <PageHeader title="Products" subtitle={products.length+" products in catalog"}
        action={<Btn onClick={openNew}>+ Add Product</Btn>}/>
      {products.length===0 ? (
        <EmptyState icon="📦" title="No products" subtitle="Add your PreVasive product catalog." action={<Btn onClick={openNew}>Add First Product</Btn>}/>
      ) : (
        <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:C.surface2}}>
              {["Product","SKU","Category","Price","Status",""].map(function(h){return (
                <th key={h} style={{padding:"8px 16px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>
              );})}
            </tr></thead>
            <tbody>
              {products.map(function(p){return (
                <tr key={p.id} style={{borderTop:"1px solid "+C.border}}>
                  <td style={{padding:"10px 16px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      {p.imageUrl&&<img src={p.imageUrl} alt="" style={{width:32,height:32,borderRadius:6,objectFit:"cover",border:"1px solid "+C.border}}/>}
                      <div>
                        <div style={{fontWeight:600,fontSize:13,color:C.text}}>{p.name}</div>
                        {p.description&&<div style={{fontSize:11,color:C.dim,marginTop:1}}>{p.description.slice(0,60)}{p.description.length>60?"…":""}</div>}
                      </div>
                    </div>
                  </td>
                  <td style={{padding:"10px 16px",fontSize:11,fontFamily:"monospace",color:C.muted}}>{p.sku||"—"}</td>
                  <td style={{padding:"10px 16px",fontSize:12,color:C.muted}}>{p.category||"—"}</td>
                  <td style={{padding:"10px 16px",fontSize:13,fontFamily:"monospace",fontWeight:700,color:C.accent}}>{fmtMoney(p.price||0)}</td>
                  <td style={{padding:"10px 16px"}}>
                    <span style={{padding:"3px 9px",borderRadius:20,fontSize:10,fontWeight:700,
                                  background:p.active!==false?C.success+"18":C.danger+"18",
                                  color:p.active!==false?C.success:C.danger}}>
                      {p.active!==false?"Active":"Inactive"}
                    </span>
                  </td>
                  <td style={{padding:"10px 16px"}}>
                    <div style={{display:"flex",gap:6}}>
                      <Btn small variant="ghost" onClick={function(){openEdit(p);}}>Edit</Btn>
                      <Btn small variant="ghost" onClick={function(){toggle(p);}}>{p.active!==false?"Deactivate":"Activate"}</Btn>
                    </div>
                  </td>
                </tr>
              );})}
            </tbody>
          </table>
        </div>
      )}

      {showForm&&(
        <Modal title={editing?"Edit Product":"New Product"} onClose={function(){setShowForm(false);}}
          footer={<div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={function(){setShowForm(false);}}>Cancel</Btn><Btn onClick={save}>{editing?"Save Changes":"Add Product"}</Btn></div>}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div style={{gridColumn:"1/-1"}}><Field label="Product Name *" value={name} onChange={setName} placeholder="PreVasive X100"/></div>
            <div style={{gridColumn:"1/-1"}}><Field label="Image URL (optional)" value={imgUrl||""} onChange={setImgUrl} placeholder="https://…/product.jpg" hint="Shown in the order form product picker"/></div>
            <Field label="SKU" value={sku} onChange={setSku} placeholder="PV-X100"/>
            <Field label="Price *" value={price} onChange={setPrice} type="number" placeholder="299.00"/>
            <Field label="Category" value={category} onChange={setCategory} placeholder="Device, Supply…"/>
            <div/>
            <div style={{gridColumn:"1/-1"}}><TextArea label="Description" value={desc} onChange={setDesc} rows={3}/></div>
          </div>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginTop:4}}>
            <input type="checkbox" checked={active} onChange={function(e){setActive(e.target.checked);}} style={{accentColor:C.accent}}/>
            <span style={{fontSize:13,color:C.text}}>Active — visible to reps when placing orders</span>
          </label>
        </Modal>
      )}
    </div>
  );
}

/* ─── Admin Customers ────────────────────────────────────────────────────── */
function AdminCustomers({customers,setCustomers,reps,orders,addToast}) {
  const [editCustModal2,setEditCustModal2] = useState(null);
  const [search,     setSearch]     = useState("");
  const [viewCust,   setViewCust]   = useState(null);
  const [showImport, setShowImport] = useState(false);
  var filtered = customers.filter(function(c){
    if(!search) return true;
    var s = search.toLowerCase();
    return (c.name||"").toLowerCase().indexOf(s)>=0 ||
           (c.company||"").toLowerCase().indexOf(s)>=0 ||
           (c.email||"").toLowerCase().indexOf(s)>=0;
  });

  return (
    <div>
      <PageHeader title="Customers" subtitle={customers.length+" total customers"}
        action={<div style={{display:"flex",gap:8}}>
          <Btn small variant="ghost" onClick={function(){setShowImport(true);}}>⬆ Import CSV</Btn>
          <Btn small variant="ghost" onClick={function(){exportCustomers(customers);}}>⬇ Export CSV</Btn>
        </div>}/>
      <div style={{marginBottom:16}}>
        <input value={search} onChange={function(e){setSearch(e.target.value);}}
          placeholder="Search customers…"
          style={{width:"100%",maxWidth:400,background:C.surface,border:"1px solid "+C.border,
                  borderRadius:8,padding:"8px 12px",color:C.text,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
      </div>
      {filtered.length===0 ? (
        <EmptyState icon="👥" title="No customers" subtitle="Customers added by reps will appear here."/>
      ) : (
        <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:C.surface2}}>
              {["Customer","Company","Contact","Rep","Orders","Lifetime Spend"].map(function(h){return (
                <th key={h} style={{padding:"8px 16px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>
              );})}
            </tr></thead>
            <tbody>
              {filtered.map(function(c){
                var rep = reps.find(function(r){return r.id===c.repId;})||null;
                var custOrds = orders.filter(function(o){return o.custId===c.id;});
                var spend = custOrds.reduce(function(s,o){return s+(o.totals&&o.totals.grand||0);},0);
                return (
                  <tr key={c.id} style={{borderTop:"1px solid "+C.border,cursor:"pointer"}}
                    onClick={function(){setViewCust(c);}}>
                    <td style={{padding:"10px 16px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <Avatar name={c.name} size={28}/>
                        <span style={{fontSize:13,fontWeight:600,color:C.text}}>{c.name}</span>
                      </div>
                    </td>
                    <td style={{padding:"10px 16px",fontSize:12,color:C.muted}}>{c.company||"—"}</td>
                    <td style={{padding:"10px 16px",fontSize:11,color:C.muted}}>{c.email||"—"}</td>
                    <td style={{padding:"10px 16px",fontSize:12,color:C.text}}>{rep?rep.name:"—"}</td>
                    <td style={{padding:"10px 16px",fontSize:12,fontFamily:"monospace",fontWeight:600,color:C.accent}}>{custOrds.length}</td>
                    <td style={{padding:"10px 16px",fontSize:12,fontFamily:"monospace",fontWeight:700,color:C.success}}>{fmtMoney(spend)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
      {showImport&&<CSVImportModal repId={null} onImport={function(imported){setCustomers(function(prev){return imported.concat(prev);});}} onClose={function(){setShowImport(false);}} addToast={addToast}/>}
      {viewCust&&(
        <CustomerProfile customer={viewCust} orders={orders}
          onEdit={function(cust){setViewCust(null);setEditCustModal2(cust);}}
          onClose={function(){setViewCust(null);}}/>
      )}
      {editCustModal2&&(
        <CustomerEditModal
          customer={editCustModal2}
          onSave={function(updated){
            setCustomers(function(prev){return prev.map(function(x){return x.id===updated.id?updated:x;});});
            dbSave("crm_customers",updated.id,updated);
          }}
          onClose={function(){setEditCustModal2(null);}}
          addToast={addToast}/>
      )}
    </div>
  );
}

/* ─── Admin Reps ─────────────────────────────────────────────────────────── */
function AdminReps({reps,setReps,orders,commissions,setCommissions,applications,setApplications,legalDocs,signatures,addToast,showResult,onViewAsRep}) {
  const [tab,      setTab]      = useState("reps");
  const [showForm, setShowForm] = useState(false);
  const [name,     setName]     = useState("");
  const [email,    setEmail]    = useState("");
  const [formErr,    setFormErr]    = useState("");
  const [repCommRate,setRepCommRate] = useState("10");
  const [showInvite, setShowInvite] = useState(false);
  const [inviteRep,  setInviteRep]  = useState(null);
  const [drawerRep,  setDrawerRep]  = useState(null);

  function saveRep() {
    if(!name.trim()||!email.trim()){setFormErr("Name and email are required.");return;}
    var existing = reps.find(function(r){return r.email===email.trim();});
    if(existing){setFormErr("A rep with this email already exists.");return;}
    var id = genId("rep");
    var newRep = {
      id:id, name:name.trim(), email:email.trim(),
      status:"pending", subscriptionStatus:"trial",
      trialStartedAt:new Date().toISOString(),
      planId:"starter", defaultCommissionRate:parseFloat(repCommRate)||10,
      createdAt:new Date().toISOString(),
    };
    setReps(function(prev){return [newRep].concat(prev);});
    dbSave("crm_reps",id,newRep);
    addToast(name+" added as rep","success");
    setShowForm(false); setName(""); setEmail(""); setFormErr("");
  }

  function approve(rep) {
    var updated = Object.assign({},rep,{status:"active",approvedAt:new Date().toISOString()});
    setReps(function(prev){return prev.map(function(r){return r.id===rep.id?updated:r;});});
    dbSave("crm_reps",rep.id,updated);
    addToast(rep.name+" approved","success");
    showResult({type:"rep",title:"Rep Approved",subtitle:rep.name+" can now log in and place orders.",rows:[["Name",rep.name],["Email",rep.email],["Status","Active ✓"]],cta:"Done"});
  }

  function suspend(rep) {
    var updated = Object.assign({},rep,{status:"suspended"});
    setReps(function(prev){return prev.map(function(r){return r.id===rep.id?updated:r;});});
    dbSave("crm_reps",rep.id,updated);
    addToast(rep.name+" suspended","warning");
  }

  function changePlan(rep, planId) {
    var updated = Object.assign({},rep,{planId:planId,subscriptionStatus:planId?"active":"trial"});
    setReps(function(prev){return prev.map(function(r){return r.id===rep.id?updated:r;});});

                        <td style={{padding:"10px 14px"}}>

            {(function(){
              var active=reps.filter(function(r){return r.subscriptionStatus==="active";});
              var trial=reps.filter(function(r){return r.subscriptionStatus==="trial";});
              var mrr=active.reduce(function(s,r){var p=REP_PLANS.find(function(x){return x.id===r.planId;});return s+(p?p.price:0);},0);
              return [
                ["MRR",fmtMoney(mrr)+"/mo",C.success],

          <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>

                {["Rep","Plan","Commission Cap","Status","Change Plan"].map(function(h){return (
                  <th key={h} style={{padding:"8px 16px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{h}</th>
                );})}

              <tbody>
                {reps.map(function(rep){
                  var plan = REP_PLANS.find(function(p){return p.id===rep.planId;})||REP_PLANS[0];
                  var sc = {active:C.success,trial:C.accent,suspended:C.danger}[rep.subscriptionStatus]||C.muted;
                  return (
                    <tr key={rep.id} style={{borderTop:"1px solid "+C.border}}>
                      <td style={{padding:"10px 16px",fontSize:13,fontWeight:600,color:C.text}}>{rep.name}</td>
                      <td style={{padding:"10px 16px",fontSize:12,color:C.text}}>{plan?plan.name:"—"}</td>

                      </td>

/* ─── Admin Commissions ──────────────────────────────────────────────────── */

</script>
<script id="c11" type="text/plain">
function AdminCommissions({orders,reps,commissions,setCommissions,addToast,showResult,payoutRequests,setPayoutRequests}) {
  const [payTarget,    setPayTarget]    = useState(null);
  const [releasingAll, setReleasingAll] = useState(false);

  var now2 = Date.now();
  var paidOrderIds = (commissions||[]).map(function(cp){return cp.orderId;});

  function getReadyOrders() {
    return orders.filter(function(o){
      if(!o.deliveredAt) return false;
      if(o.status==="Cancelled"||o.status==="Refunded"||o.status==="Returned") return false;
      if(paidOrderIds.indexOf(o.id)>=0) return false;
      return (now2-new Date(o.deliveredAt).getTime()) >= RETURN_WINDOW_DAYS*24*60*60*1000;
    });
  }

  function releaseAll() {
    var ready = getReadyOrders();
    if(!ready.length) return;
    setReleasingAll(true);
    var newPayouts = ready.map(function(o){
      var rep2 = reps.find(function(r){return r.id===o.repId;})||{name:"Rep"};
      return {id:genId("pay"),repId:o.repId,repName:rep2.name||o.repName,
              orderId:o.id,amount:o.totals&&o.totals.commission||0,
              method:"auto_release",note:"Auto-released after "+RETURN_WINDOW_DAYS+"-day return window",
              paidAt:new Date().toISOString()};
    });
    newPayouts.forEach(function(p){dbSave("crm_commission_payouts",p.id,p);});
    setCommissions(function(prev){return newPayouts.concat(prev);});

    // Attempt Stripe transfers if Edge Function configured
    var cfg = JSON.parse(localStorage.getItem("__pv__stripeAccountA")||"{}");
    var fn  = cfg.edgeFnUrl;
    if(fn) {
      newPayouts.forEach(function(p){
        var rep3 = reps.find(function(r){return r.id===p.repId;})||{};
        if(rep3.stripeConnectId) {
          fetch(fn,{method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({action:"transfer",repId:p.repId,amount:p.amount,stripeAccountId:rep3.stripeConnectId})})
          .then(function(r){return r.json();})
          .then(function(d){
            if(d.transferId){
              var upd=Object.assign({},p,{stripeTransferId:d.transferId,transferStatus:"sent"});
              dbSave("crm_commission_payouts",p.id,upd);
            }
          }).catch(function(){});
        }
      });
    }

    setTimeout(function(){
      setReleasingAll(false);
      addToast(newPayouts.length+" commission"+(newPayouts.length!==1?"s":"")+" released — "+fmtMoney(newPayouts.reduce(function(s,p){return s+p.amount;},0)),"success");
      showResult({type:"order",title:"Commissions Released!",
        subtitle:newPayouts.length+" payments processed.",
        rows:[["Orders Released",newPayouts.length],["Total Amount",fmtMoney(newPayouts.reduce(function(s,p){return s+p.amount;},0))],["Method","Return window cleared"],["Date",fmtDate(new Date().toISOString())]],
        cta:"Done"});
    },400);
  }
  var now = Date.now();
  var releasedOrds = orders.filter(function(o){
    if(!o.deliveredAt||!o.repId) return false;
    if(o.status==="Cancelled"||o.status==="Refunded") return false;
    return (now-new Date(o.deliveredAt).getTime()) >= RETURN_WINDOW_DAYS*24*60*60*1000;
  });
  var paidIds = (commissions||[]).map(function(c){return c.orderId;});
  var unpaid = releasedOrds.filter(function(o){return paidIds.indexOf(o.id)<0;});

  function payCommission(order) {
    var rep = reps.find(function(r){return r.id===order.repId;})||{name:"Unknown"};
    var rec = {id:genId("pay"),orderId:order.id,repId:order.repId,repName:rep.name,
               amount:order.totals&&order.totals.commission||0,paidAt:new Date().toISOString(),note:"Manual payout"};
    setCommissions(function(prev){return [rec].concat(prev||[]);});
    dbSave("crm_commission_payouts",rec.id,rec);
    addToast("Commission of "+fmtMoney(rec.amount)+" paid to "+rep.name,"success");
    showResult({type:"commission",title:"Commission Released",subtitle:"Payment recorded successfully.",
      rows:[["Rep",rep.name],["Order",order.id],["Amount",fmtMoney(rec.amount)],["Date",fmtDate(new Date().toISOString())]],
      nextStep:"Rep will see this in their Commissions tab.",cta:"Done"});
  }

  var totalUnpaid = unpaid.reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);
  var totalPaid = (commissions||[]).reduce(function(s,c){return s+(c.amount||0);},0);

  return (
    <div>
      <PageHeader title="Commissions" subtitle="Track and release rep commission payments"
        action={<div style={{display:"flex",gap:8}}>
          {getReadyOrders().length>0&&(
            <Btn onClick={releaseAll} disabled={releasingAll}
              variant="success">
              {releasingAll?"Releasing…":"⚡ Release All Ready ("+getReadyOrders().length+")"}
            </Btn>
          )}
          <Btn small variant="ghost" onClick={function(){exportCommissions(commissions,orders);}}>⬇ Export CSV</Btn>
        </div>}/>

      {/* Ready to release banner */}
      {getReadyOrders().length>0&&(
        <div style={{padding:"12px 16px",background:C.success+"10",border:"1px solid "+C.success+"25",
                     borderRadius:10,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:700,fontSize:13,color:C.success}}>
              ✓ {getReadyOrders().length} commission{getReadyOrders().length!==1?"s":""} ready to release
            </div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>
              Return window closed · Total: {fmtMoney(getReadyOrders().reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0))}
            </div>
          </div>
          <Btn small onClick={releaseAll} disabled={releasingAll}>
            {releasingAll?"Releasing…":"Release All →"}
          </Btn>
        </div>
      )}

      {/* Payout requests from reps */}
      {(payoutRequests||[]).filter(function(r){return r.status==="pending";}).length>0&&(
        <div style={{background:C.surface,border:"1px solid "+C.warning+"30",borderRadius:12,overflow:"hidden",marginBottom:16}}>
          <div style={{padding:"10px 16px",borderBottom:"1px solid "+C.border,fontWeight:700,fontSize:13,color:C.text,display:"flex",alignItems:"center",gap:8}}>
            Rep Payout Requests
            <span style={{padding:"1px 8px",borderRadius:20,background:C.warning+"18",color:C.warning,fontSize:11,fontWeight:700}}>{(payoutRequests||[]).filter(function(r){return r.status==="pending";}).length}</span>
          </div>
          {(payoutRequests||[]).filter(function(r){return r.status==="pending";}).map(function(req){
            var o = orders.find(function(x){return x.id===req.orderId;})||{};
            var rep2 = reps.find(function(r){return r.id===req.repId;})||{name:req.repName||"Rep"};
            return (
              <div key={req.id} style={{padding:"12px 16px",borderBottom:"1px solid "+C.border,
                                         display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13,color:C.text}}>{rep2.name}</div>
                  <div style={{fontSize:11,color:C.muted}}>Order {req.orderId} · {fmtMoney(req.amount)} · Requested {fmtDate(req.requestedAt)}</div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <Btn small variant="success" onClick={function(){
                    var pay={id:genId("pay"),repId:req.repId,repName:rep2.name,
                             orderId:req.orderId,amount:req.amount,
                             method:"manual",note:"Rep-requested payout",paidAt:new Date().toISOString()};
                    dbSave("crm_commission_payouts",pay.id,pay);
                    setCommissions(function(prev){return [pay].concat(prev);});
                    var upReq=Object.assign({},req,{status:"approved",approvedAt:new Date().toISOString()});
                    setPayoutRequests(function(prev){return prev.map(function(r){return r.id===req.id?upReq:r;});});
                    dbSave("crm_payout_requests",req.id,upReq);
                    addToast("Payout approved for "+rep2.name,"success");
                  }}>✓ Approve & Pay</Btn>
                  <Btn small variant="ghost" onClick={function(){
                    var upReq=Object.assign({},req,{status:"denied"});
                    setPayoutRequests(function(prev){return prev.map(function(r){return r.id===req.id?upReq:r;});});
                    dbSave("crm_payout_requests",req.id,upReq);
                    addToast("Payout request denied","warning");
                  }}>Deny</Btn>
                </div>
              </div>
            );
          })}
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:24}}>
        <KpiCard label="Ready to Pay" value={fmtMoney(totalUnpaid)} sub={unpaid.length+" orders"} color={C.gold}/>
        <KpiCard label="Total Paid Out" value={fmtMoney(totalPaid)} sub={(commissions||[]).length+" payments"} color={C.success}/>
        <KpiCard label="In Return Window" value={fmtMoney(orders.filter(function(o){
          if(!o.deliveredAt||!o.repId) return false;
          return (now-new Date(o.deliveredAt).getTime()) < RETURN_WINDOW_DAYS*24*60*60*1000;
        }).reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0))} sub="Held — 15-day window" color={C.warning}/>
      </div>

      {unpaid.length>0&&(
        <div style={{marginBottom:24}}>

    addToast("Supabase settings saved","success"); setSbMsg("Saved!");

  }

  function testSB() {
    var trimUrl=url.trim().replace(/\/$/,""); var trimKey=anonKey.trim()||SUPABASE_ANON_KEY;
    if(!trimUrl||!trimKey){setTestRes({ok:false,msg:"Enter URL and key first."});return;}
    setTesting(true); setTestRes(null);
    fetch(trimUrl+"/rest/v1/crm_orders?select=id&limit=1",{headers:{"apikey":trimKey,"Authorization":"Bearer "+trimKey}})
      .then(function(r){setTesting(false);setTestRes(r.ok||r.status===406?{ok:true,msg:"Connected successfully!"}:{ok:false,msg:"HTTP "+r.status});})
      .catch(function(e){setTesting(false);setTestRes({ok:false,msg:e.message});});

  function addCode() {
    if(!newCode.trim()||!newVal) return;

    onSaveDiscountCodes(function(prev){return prev.map(function(d){return d.id===id?Object.assign({},d,{active:!d.active}):d;});});

  var rows = (order.items||[]).map(function(it){

  var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;color:#1a1a2e;max-width:720px;margin:0 auto;padding:40px 24px;font-size:13px}h1{font-size:28px;font-weight:800;letter-spacing:-.03em}.muted{color:#6b7c93}.mono{font-family:monospace}table{width:100%;border-collapse:collapse}.th{padding:8px 12px;background:#f6f9fc;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#6b7c93;font-weight:600}</style></head><body>"

    +"<div style='display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px'>"
    +"<div><div style='font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7c93;margin-bottom:8px'>Bill To</div>"
    +"<div style='font-weight:700;font-size:14px'>"+(cust.name||order.custName||"Customer")+"</div>"
    +(cust.company?"<div style='color:#6b7c93'>"+cust.company+"</div>":"")
    +(cust.email?"<div style='color:#6b7c93'>"+cust.email+"</div>":"")+"</div>"
    +"<div><div style='font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7c93;margin-bottom:8px'>Sales Rep</div>"
    +"<div style='font-weight:700;font-size:14px'>"+(order.repName||"Rep")+"</div></div></div>"
    +"<table><thead><tr><th class='th' style='text-align:left'>Product</th><th class='th' style='text-align:center'>Qty</th><th class='th' style='text-align:right'>Unit Price</th><th class='th' style='text-align:right'>Total</th></tr></thead><tbody>"+rows+"</tbody>"
    +"<tfoot>"
    +(totals.discount>0?"<tr><td colspan='3' style='padding:8px 12px;text-align:right;color:#6b7c93'>Discount</td><td class='mono' style='padding:8px 12px;text-align:right;color:#1ea672'>-"+fmtMoney(totals.discount||0)+"</td></tr>":"")
    +((totals.shipping||0)>0?"<tr><td colspan='3' style='padding:8px 12px;text-align:right;color:#6b7c93'>Shipping</td><td class='mono' style='padding:8px 12px;text-align:right'>"+fmtMoney(totals.shipping||0)+"</td></tr>":"<tr><td colspan='3' style='padding:8px 12px;text-align:right;color:#1ea672'>Shipping</td><td class='mono' style='padding:8px 12px;text-align:right;color:#1ea672'>Free</td></tr>")
    +((totals.tax||0)>0?"<tr><td colspan='3' style='padding:8px 12px;text-align:right;color:#6b7c93'>Sales Tax (GA "+((totals.taxRate||0)*100).toFixed(1)+"%)</td><td class='mono' style='padding:8px 12px;text-align:right'>"+fmtMoney(totals.tax||0)+"</td></tr>":"")
    +"<tr><td colspan='3' style='padding:12px;text-align:right;font-weight:800;font-size:15px'>Total Due</td><td class='mono' style='padding:12px;text-align:right;font-weight:900;font-size:18px;color:#635bff'>"+fmtMoney(totals.grand||0)+"</td></tr>"
    +"</tfoot></table>"
    +"<div style='margin-top:32px;padding-top:20px;border-top:1px solid #e8ecef;color:#6b7c93;font-size:11px;line-height:1.7'>"+(cfg.footer||"Thank you for your business.")+"</div>"
    +"</body></html>";

  var url = URL.createObjectURL(blob);

  document.body.appendChild(a); a.click();

}

<script id="c12" type="text/plain">
function CommissionStatement({repId,orders,commissions,repName}) {
  var now3 = new Date();
  var MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const [selYear,  setSelYear]  = useState(now3.getFullYear());
  const [selMonth, setSelMonth] = useState(now3.getMonth());

  var monthOrds = orders.filter(function(o){
    if(o.repId!==repId) return false;
    var d=new Date(o.createdAt);
    return d.getFullYear()===selYear&&d.getMonth()===selMonth;
  });
  var paidComms = (commissions||[]).filter(function(cp){
    if(cp.repId!==repId) return false;
    var d=new Date(cp.paidAt);
    return d.getFullYear()===selYear&&d.getMonth()===selMonth;
  });
  var totalSales = monthOrds.reduce(function(s,o){return s+(o.totals&&o.totals.grand||0);},0);
  var totalComm  = monthOrds.reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);
  var paidTotal  = paidComms.reduce(function(s,cp){return s+(cp.amount||0);},0);
  var heldComm   = monthOrds.filter(function(o){
    if(!o.deliveredAt||o.status==="Cancelled"||o.status==="Refunded"||o.status==="Returned") return false;
    return (Date.now()-new Date(o.deliveredAt).getTime()) < RETURN_WINDOW_DAYS*24*60*60*1000;
  }).reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);

  function download() {
    var rn = repName||"Rep";
    var html2 = "<!DOCTYPE html><html><head><style>body{font-family:Arial,sans-serif;max-width:600px;margin:40px auto;font-size:13px}h1{color:#635bff}table{width:100%;border-collapse:collapse}td,th{padding:8px 12px;border-bottom:1px solid #e8ecef;text-align:left}.mono{font-family:monospace}.tot{font-weight:900;font-size:15px;color:#635bff}</style></head><body>"
      +"<h1>Commission Statement</h1><p><strong>"+rn+"</strong> &mdash; "+MONTHS[selMonth]+" "+selYear+"</p>"

      +"<tr><td>Orders Placed</td><td class='mono' style='text-align:right'>"+monthOrds.length+"</td></tr>"
      +"<tr><td>Total Sales</td><td class='mono' style='text-align:right'>"+fmtMoney(totalSales)+"</td></tr>"
      +"<tr><td>Total Commission Earned</td><td class='mono' style='text-align:right'>"+fmtMoney(totalComm)+"</td></tr>"
      +"<tr><td>Commission Held (return window)</td><td class='mono' style='text-align:right'>"+fmtMoney(heldComm)+"</td></tr>"
      +"<tr><td class='tot'>Commission Paid This Month</td><td class='mono tot' style='text-align:right'>"+fmtMoney(paidTotal)+"</td></tr>"
      +"</table><p style='font-size:11px;color:#888;margin-top:24px'>Generated "+new Date().toLocaleDateString()+"</p></body></html>";
    var blob=new Blob([html2],{type:"text/html"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url; a.download="Statement-"+rn.replace(/\s+/g,"-")+"-"+MONTHS[selMonth]+"-"+selYear+".html";
    document.body.appendChild(a); a.click();
    setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},100);
  }

  return (
    <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden",marginBottom:20}}>

        <div style={{fontWeight:700,fontSize:14,color:C.text}}>Monthly Statement</div>

          <select value={selMonth} onChange={function(e){setSelMonth(parseInt(e.target.value));}} style={{background:C.surface2,border:"1px solid "+C.border,borderRadius:6,padding:"5px 10px",color:C.text,fontSize:12,fontFamily:"inherit"}}>
            {MONTHS.map(function(m,i){return <option key={i} value={i}>{m}</option>;})}
          </select>
          <select value={selYear} onChange={function(e){setSelYear(parseInt(e.target.value));}} style={{background:C.surface2,border:"1px solid "+C.border,borderRadius:6,padding:"5px 10px",color:C.text,fontSize:12,fontFamily:"inherit"}}>
            {[now3.getFullYear(),now3.getFullYear()-1].map(function(y){return <option key={y} value={y}>{y}</option>;})}

      setSending(false);

  useEffect(function(){
    if(!custId) return;
    var cust2 = customers.find(function(x){return x.id===custId;});
    if(!cust2) return;
    if(cust2.termsStatus==="active"&&cust2.termsType) {
      setPayMethod(cust2.termsType);
    } else if(payMethod&&(payMethod==="net_15"||payMethod==="net_30"||payMethod==="net_45")) {
      setPayMethod("due_receipt"); // reset if switching to non-terms customer
    }
  }, [custId]);

  function applyDiscount() {
    if(!discCode.trim()) return;
    var code = (discountCodes||[]).find(function(d){return d.active&&d.code===discCode.trim().toUpperCase();});
    if(!code){setDiscErr("Invalid or expired code.");setDiscApplied(null);return;}
    setDiscApplied(code); setDiscErr("");
  }

  var isEdit = !!(editOrder&&editOrder.id);
  var activeProds = products.filter(function(p){return p.active!==false;});
  var myCusts = custId==="_new" ? [] : customers.filter(function(c2){
    return c2.repId===repId;
  });
  var selCust = customers.find(function(c2){return c2.id===custId;})||null;

  function calcShipping(subtotal) {
    if(shippingOverride!==null) return parseFloat(shippingOverride)||0;
    if(!shippingRules||!shippingRules.length) return 0;
    var active = (shippingRules||[]).filter(function(r){return r.active!==false;})
      .sort(function(a,b){return a.maxOrder-b.maxOrder;});
    var rule = active.find(function(r){return subtotal<=r.maxOrder;});
    return rule ? (rule.rate||0) : 0;
  }

  function calcTotals() {
    var rate2 = parseFloat(commRate)||0;
    // Base subtotal (catalog prices)
    var baseSubtotal = items.reduce(function(s,it){
      var p=products.find(function(x){return x.id===it.prodId;});
      return s+(p?p.price:it.unitPrice||0)*it.qty;
    },0);
    // Model B: commission = markup added to base price
    var commission  = Math.round(baseSubtotal*(rate2/100)*100)/100;
    var subtotal    = baseSubtotal + commission; // customer-facing subtotal
    var discount    = 0;
    if(discApplied) {
      discount = discApplied.type==="percent" ? subtotal*(discApplied.value/100) : Math.min(discApplied.value,subtotal);
    }
    var discounted = subtotal - discount;
    var shipping   = calcShipping(baseSubtotal);
    // Georgia tax — on customer price (post-markup, post-discount)
    var taxInfo  = selCust ? getGaTaxRate(selCust.zip) : null;
    var taxRate  = taxInfo ? taxInfo.rate : 0;
    var tax      = Math.round(discounted*taxRate*100)/100;
    var grand    = discounted + shipping + tax;
    return {baseSubtotal:baseSubtotal,subtotal:subtotal,discount:discount,shipping:shipping,tax:tax,taxRate:taxRate,taxInfo:taxInfo,grand:grand,commission:commission,commRate:rate2};
  }

  function step1Valid() {
    if(newCust) return custName.trim().length>0;
    return custId.length>0;
  }
  function step2Valid() { return items.some(function(it){return it.prodId;}); }

  function place() {
    if(!agreed||placing) return;
    setPlacing(true);
    var totals = calcTotals();
    var cid = custId; var cname = selCust?selCust.name:custName;
    if(newCust&&custName.trim()) {
      var nid = genId("cust");
      var nc = {id:nid,repId:repId,name:custName.trim(),email:custEmail.trim(),
                phone:custPhone.trim(),company:custComp.trim(),
                address:custAddr.trim(),city:custCity.trim(),state:custState2.trim(),zip:custZip.trim(),
                billingAddress:billSameAsShip?null:{address:billAddr.trim(),city:billCity.trim(),state:billState.trim(),zip:billZip.trim()},
                billSameAsShip:billSameAsShip,
                addresses:custAddr.trim()?[{id:genId("adr"),label:"Primary",address:custAddr.trim(),city:custCity.trim(),state:custState2.trim(),zip:custZip.trim(),isPrimary:true}]:[],
                createdAt:new Date().toISOString()};
      setCustomers(function(prev){return [nc].concat(prev);});
      dbSave("crm_customers",nid,nc);
      cid=nid; cname=custName.trim();
    }
    var id = isEdit?editOrder.id:("ORD-"+String(Date.now()).slice(-6));
    var order = {
      id:id, repId:repId, repName:repName,
      custId:cid, custName:cname,
      shipAddress:(function(){
        if(!selCust) return null;
        if(shipAddrId&&selCust.addresses){var a=selCust.addresses.find(function(x){return x.id===shipAddrId;});if(a) return a;}
        if(selCust.addresses&&selCust.addresses.length>0){return selCust.addresses.find(function(a){return a.isPrimary;})||selCust.addresses[0];}
        return selCust.address?{address:selCust.address,city:selCust.city,state:selCust.state,zip:selCust.zip,label:"Primary"}:null;
      })(),
      items:items.filter(function(it){return it.prodId;}).map(function(it){
        var p=products.find(function(x){return x.id===it.prodId;})||{price:0};
        var rate3=parseFloat(commRate)||0;
        return Object.assign({},it,{unitPrice:p.price,customerPrice:Math.round(p.price*(1+rate3/100)*100)/100});
      }),
      totals:totals, commissionRate:parseFloat(commRate)||0,
      payMethod:payMethod, discountCode:discApplied?discApplied.code:null,
      cardRef:(payMethod==="credit_card"||(payMethod==="due_receipt"&&dorPath==="card"))&&cardLast4?{last4:cardLast4,expiry:cardExpiry,holder:cardHolder,zip:cardZip}:null,
      dorPath:payMethod==="due_receipt"?dorPath:null,
      notes:notes, status:isEdit?(editOrder.status||"Submitted"):"Submitted",
      createdAt:isEdit?(editOrder.createdAt||new Date().toISOString()):new Date().toISOString(),
      updatedAt:new Date().toISOString(),
    };
    if(!isEdit) order.auditLog=[{ts:new Date().toISOString(),action:"Order created",actor:repName,detail:""}];
    setOrders(function(prev){
      return isEdit?prev.map(function(o){return o.id===id?order:o;}): [order].concat(prev);
    });
    dbSave("crm_orders",id,order);
    var isNetOrder = selCust&&selCust.termsStatus==="active"&&selCust.termsType&&selCust.termsType!=="due_receipt";
    setTimeout(function(){
      setPlacing(false);
      addToast((isEdit?"Order updated":"Order placed")+" — "+id,"success");
      if(!isEdit && isNetOrder && sendInvAuto) {
        setPlacedOrder(order);
        setShowPostInv(true);
        showResult({type:"order",title:"Order Placed!",
          subtitle:"Invoice ready to send to "+cname+".",
          rows:[["Order #",id],["Customer",cname],["Terms",fmtTerms(selCust.termsType)],["Total",fmtMoney(totals.grand)]],
          cta:"Send Invoice Now"});
      } else {
        showResult({type:"order",title:isEdit?"Order Updated!":"Order Placed!",
          subtitle:isEdit?"Changes saved.":"Submitted for processing.",
          rows:[["Order #",id],["Customer",cname],["Total",fmtMoney(totals.grand)],["Commission",fmtMoney(totals.commission)]],
          cta:"Done"});
        onClose();
      }
    },600);
  }

  var totals = calcTotals();
  var plan = repData?REP_PLANS.find(function(p){return p.id===repData.planId;}):null;

  return (
    <div style={{position:"fixed",inset:0,background:C.bg+"e8",backdropFilter:"blur(8px)",
                 zIndex:4000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:14,
                   width:"100%",maxWidth:640,maxHeight:"92vh",display:"flex",flexDirection:"column",
                   boxShadow:"0 16px 48px rgba(0,0,0,.25)"}}>
        {/* Header */}
        <div style={{padding:"18px 22px 14px",borderBottom:"1px solid "+C.border,flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:17,color:C.text,letterSpacing:"-.02em"}}>
              {isEdit?"Edit Order":"New Order"}
            </div>
            <button onClick={onClose} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:20}}>×</button>
          </div>
          {/* Steps */}
          <div style={{display:"flex",gap:0}}>
            {[["1","Details"],["2","Payment"],["3","Confirm"]].map(function(s,i){
              var num=parseInt(s[0]); var active=step===num; var done=step>num;
              return (
                <div key={s[0]} style={{display:"flex",alignItems:"center",flex:i<2?1:"auto"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",
                                 justifyContent:"center",fontSize:11,fontWeight:800,
                                 background:done?C.success:active?C.accent:C.surface2,
                                 color:done||active?"#fff":C.dim}}>
                      {done?"✓":s[0]}
                    </div>
                    <span style={{fontSize:12,fontWeight:active?600:400,color:active?C.text:C.dim}}>{s[1]}</span>
                  </div>
                  {i<2&&<div style={{flex:1,height:1,background:done?C.success:C.border,margin:"0 10px"}}/>}
                </div>
              );
            })}
          </div>
        </div>

        {/* Body */}
        <div style={{flex:1,overflowY:"auto",padding:"18px 22px"}}>

          {/* Step 1 — Details */}
          {step===1&&(
            <div>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:8}}>Customer</div>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <button onClick={function(){setNewCust(false);}} style={{flex:1,padding:"8px",borderRadius:8,fontFamily:"inherit",cursor:"pointer",border:"2px solid "+(newCust?C.border:C.accent),background:newCust?C.surface2:C.accent+"10",color:newCust?C.muted:C.accent,fontSize:12,fontWeight:newCust?400:600}}>Existing Customer</button>
                  <button onClick={function(){setNewCust(true);setCustId("");}} style={{flex:1,padding:"8px",borderRadius:8,fontFamily:"inherit",cursor:"pointer",border:"2px solid "+(newCust?C.accent:C.border),background:newCust?C.accent+"10":C.surface2,color:newCust?C.accent:C.muted,fontSize:12,fontWeight:newCust?600:400}}>New Customer</button>
                </div>
                {!newCust?(
                  <select value={custId} onChange={function(e){setCustId(e.target.value);}}
                    style={{width:"100%",background:C.bg,border:"1px solid "+(custId?C.success:C.border),borderRadius:7,padding:"9px 12px",color:custId?C.text:C.dim,fontSize:13,fontFamily:"inherit",outline:"none"}}>
                    <option value="">Select customer…</option>
                    {myCusts.map(function(c2){return <option key={c2.id} value={c2.id}>{c2.name}{c2.company?" — "+c2.company:""}</option>;})}
                  </select>
                ):(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <div style={{gridColumn:"1/-1"}}><Field label="Customer Name *" value={custName} onChange={setCustName} placeholder="Dr. Jane Smith"/></div>
                    <Field label="Email" value={custEmail} onChange={setCustEmail} type="email"/>
                    <Field label="Phone" value={custPhone} onChange={setCustPhone}/>
                    <div style={{gridColumn:"1/-1"}}><Field label="Company" value={custComp} onChange={setCustComp}/></div>
                    <div style={{gridColumn:"1/-1",height:1,background:C.border,margin:"2px 0"}}/>

                    {/* Ship To */}
                    <div style={{gridColumn:"1/-1"}}>
                      <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>📦 Ship To</div>
                      <PlacesAutocomplete label="Street Address" value={custAddr} onChange={setCustAddr}
                        placeholder="123 Medical Dr, Atlanta…"
                        onSelect={function(a){setCustAddr(a.street);setCustCity(a.city);setCustState2(a.state);setCustZip(a.zip);}}/>
                      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:8}}>
                        <Field label="City" value={custCity} onChange={setCustCity}/>
                        <Field label="State" value={custState2} onChange={setCustState2} placeholder="GA"/>
                        <Field label="ZIP" value={custZip} onChange={setCustZip} placeholder="30309"/>
                      </div>
                      {custZip&&getGaTaxRate(custZip)&&(
                        <div style={{padding:"6px 10px",background:C.accent+"08",border:"1px solid "+C.accent+"20",borderRadius:6,fontSize:11,color:C.accent,display:"flex",justifyContent:"space-between",marginTop:4}}>
                          <span>📍 {getGaTaxRate(custZip).county} County, GA</span>
                          <span style={{fontWeight:700}}>{((getGaTaxRate(custZip).rate||0)*100).toFixed(1)}% tax</span>
                        </div>
                      )}
                    </div>

                    {/* Bill To */}
                    <div style={{gridColumn:"1/-1",marginTop:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                        <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".07em"}}>💳 Bill To</div>
                        <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:11,color:C.muted}}>
                          <input type="checkbox" checked={billSameAsShip}
                            onChange={function(e){
                              setBillSameAsShip(e.target.checked);
                              if(e.target.checked){setBillAddr("");setBillCity("");setBillState("");setBillZip("");}
                            }}
                            style={{accentColor:C.accent}}/>
                          Same as shipping
                        </label>
                      </div>
                      {billSameAsShip?(
                        <div style={{padding:"10px 14px",background:C.surface2,border:"1px solid "+C.border,borderRadius:8,fontSize:12,color:C.muted,lineHeight:1.7}}>
                          {custAddr?(
                            <div>
                              <div style={{fontWeight:600,color:C.text}}>{custName||"Customer"}</div>
                              <div>{custAddr}</div>
                              <div>{[custCity,custState2,custZip].filter(Boolean).join(", ")}</div>
                            </div>
                          ):(
                            <span style={{color:C.dim,fontStyle:"italic"}}>Fill shipping address above</span>
                          )}
                        </div>
                      ):(
                        <div>
                          <PlacesAutocomplete label="Billing Street Address" value={billAddr} onChange={setBillAddr}
                            placeholder="Billing address…"
                            onSelect={function(a){setBillAddr(a.street);setBillCity(a.city);setBillState(a.state);setBillZip(a.zip);}}/>
                          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:8}}>
                            <Field label="City" value={billCity} onChange={setBillCity}/>
                            <Field label="State" value={billState} onChange={setBillState} placeholder="GA"/>
                            <Field label="ZIP" value={billZip} onChange={setBillZip} placeholder="30309"/>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>

              {/* Shipping & Billing Address */}
              {selCust&&(
                <div style={{marginBottom:16}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

                    {/* Ship To */}
                    <div style={{background:C.surface2,border:"1px solid "+C.border,borderRadius:10,padding:"12px 14px"}}>
                      <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".07em",marginBottom:8,display:"flex",justifyContent:"space-between"}}>
                        <span>📦 Ship To</span>
                        {!selCust.address&&<span style={{color:C.warning,fontSize:9}}>⚠ No address</span>}
                      </div>
                      {selCust.address?(
                        <div style={{fontSize:12,color:C.text,lineHeight:1.8}}>
                          <div style={{fontWeight:700}}>{selCust.name}</div>
                          {selCust.company&&<div style={{color:C.muted,fontSize:11}}>{selCust.company}</div>}
                          <div>{selCust.address}</div>
                          <div>{[selCust.city,selCust.state,selCust.zip].filter(Boolean).join(", ")}</div>
                          {selCust.phone&&<div style={{color:C.muted,marginTop:2,fontSize:11}}>📞 {selCust.phone}</div>}
                        </div>
                      ):(
                        <div style={{fontSize:11,color:C.dim,lineHeight:1.6}}>No address on file — edit customer profile to add.</div>
                      )}
                    </div>

                    {/* Bill To */}
                    <div style={{background:C.surface2,border:"1px solid "+C.border,borderRadius:10,padding:"12px 14px"}}>
                      <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>
                        💳 Bill To
                      </div>
                      <div style={{fontSize:12,color:C.text,lineHeight:1.8}}>
                        <div style={{fontWeight:700}}>{selCust.name}</div>
                        {selCust.company&&<div style={{color:C.muted,fontSize:11}}>{selCust.company}</div>}
                        {selCust.address?(
                          <div>
                            <div>{selCust.address}</div>
                            <div>{[selCust.city,selCust.state,selCust.zip].filter(Boolean).join(", ")}</div>
                          </div>
                        ):(
                          <div style={{color:C.dim,fontSize:11}}>Same as shipping</div>
                        )}
                        {selCust.email&&<div style={{color:C.muted,marginTop:2,fontSize:11}}>✉ {selCust.email}</div>}
                      </div>
                      {selCust.termsStatus==="active"&&(
                        <div style={{marginTop:8,padding:"3px 8px",background:C.success+"12",borderRadius:6,fontSize:10,fontWeight:700,color:C.success,display:"inline-block"}}>
                          ✓ {fmtTerms(selCust.termsType||"net_30")} Terms Active
                        </div>
                      )}
                    </div>
                  </div>
                  {selCust.zip&&getGaTaxRate(selCust.zip)&&(
                    <div style={{marginTop:8,padding:"6px 12px",background:C.accent+"08",border:"1px solid "+C.accent+"20",borderRadius:7,fontSize:11,color:C.muted,display:"flex",justifyContent:"space-between"}}>
                      <span>📍 {getGaTaxRate(selCust.zip).county} County, Georgia</span>
                      <span style={{fontWeight:700,color:C.accent}}>{((getGaTaxRate(selCust.zip).rate||0)*100).toFixed(1)}% sales tax</span>
                    </div>
                  )}
                </div>
              )}

              {/* Items */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:8}}>Products</div>
                {items.map(function(it,i){return (
                  <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 70px auto",gap:8,marginBottom:8,alignItems:"center"}}>
                    <select value={it.prodId} onChange={function(e){setItems(function(prev){return prev.map(function(x,j){return j===i?Object.assign({},x,{prodId:e.target.value}):x;});});}}
                      style={{background:C.bg,border:"1px solid "+C.border,borderRadius:7,padding:"8px 10px",color:it.prodId?C.text:C.dim,fontSize:12,fontFamily:"inherit",outline:"none"}}>
                      <option value="">Select product…</option>
                      {activeProds.map(function(p){return <option key={p.id} value={p.id}>{p.name} — {fmtMoney(p.price)}{p.sku?" ("+p.sku+")":""}</option>;})}
                    </select>
                    <input type="number" min="1" value={it.qty}
                      onChange={function(e){setItems(function(prev){return prev.map(function(x,j){return j===i?Object.assign({},x,{qty:parseInt(e.target.value)||1}):x;});});}}
                      style={{background:C.bg,border:"1px solid "+C.border,borderRadius:7,padding:"8px",color:C.text,fontSize:13,fontFamily:"inherit",outline:"none",textAlign:"center"}}/>
                    {items.length>1&&<button onClick={function(){setItems(function(prev){return prev.filter(function(_,j){return j!==i;});});}} style={{background:"none",border:"none",color:C.danger,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>}
                  </div>
                );})}
                <button onClick={function(){setItems(function(prev){return prev.concat([{prodId:"",qty:1}]);});}}
                  style={{width:"100%",padding:"8px",borderRadius:7,border:"1px dashed "+C.border,background:"none",color:C.accent,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600}}>+ Add Product</button>
              </div>

              {/* Discount code */}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:5}}>Discount Code</div>
                <div style={{display:"flex",gap:8}}>
                  <input value={discCode} onChange={function(e){setDiscCode(e.target.value.toUpperCase());}} placeholder="PROMO CODE"
                    style={{flex:1,background:C.bg,border:"1px solid "+(discApplied?C.success:discErr?C.danger:C.border),borderRadius:7,padding:"8px 12px",color:C.text,fontSize:12,fontFamily:"monospace",letterSpacing:".05em",boxSizing:"border-box",outline:"none"}}/>
                  <Btn small onClick={applyDiscount}>Apply</Btn>
                </div>
                {discErr&&<div style={{fontSize:11,color:C.danger,marginTop:4}}>{discErr}</div>}
                {discApplied&&<div style={{fontSize:11,color:C.success,marginTop:4,fontWeight:600}}>✓ {discApplied.code} — {discApplied.type==="percent"?discApplied.value+"%":"$"+discApplied.value} off</div>}
              </div>

              <TextArea label="Notes (optional)" value={notes} onChange={setNotes} rows={2} placeholder="Special instructions…"/>
            </div>
          )}

          {/* Step 2 — Payment */}
          {step===2&&(
            <div>
              <div style={{marginBottom:20}}>
                <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:8}}>Payment Method</div>
                {(function(){
                  var custTerms    = selCust ? selCust.termsStatus : null;
                  var termsActive  = custTerms==="active";
                  var termsPending = custTerms==="pending";
                  var approvedType = selCust ? (selCust.termsType||"net_30") : null;
                  var termsLimit   = selCust ? (selCust.termsLimit||0) : 0;
                  var isNetTerms   = payMethod&&(payMethod==="net_15"||payMethod==="net_30"||payMethod==="net_45"||payMethod==="due_receipt"===false);
                  isNetTerms = approvedType&&payMethod===approvedType&&termsActive;

                  // DUE ON RECEIPT — show two paths
                  if(payMethod==="due_receipt"&&!termsActive) {
                    return (
                      <div>
                        <div style={{padding:"12px 14px",borderRadius:10,border:"2px solid "+C.success,
                                     background:C.success+"08",marginBottom:8}}>
                          <div style={{fontWeight:700,fontSize:14,color:C.success}}>Due on Receipt</div>
                          <div style={{fontSize:11,color:C.muted,marginTop:3}}>Choose how to collect payment:</div>
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:4}}>
                          <div style={{padding:"14px",borderRadius:10,border:"2px solid "+C.accent,
                                       background:C.accent+"08",cursor:"pointer",textAlign:"center"}}
                            onClick={function(){setDorPath("link");}}>
                            <div style={{fontSize:20,marginBottom:6}}>✉</div>
                            <div style={{fontWeight:700,fontSize:12,color:C.accent}}>Send Invoice Link</div>
                            <div style={{fontSize:10,color:C.muted,marginTop:3}}>Customer pays online</div>
                            {dorPath==="link"&&<div style={{marginTop:6,fontSize:10,fontWeight:700,color:C.accent}}>✓ Selected</div>}
                          </div>
                          <div style={{padding:"14px",borderRadius:10,border:"2px solid "+C.warning,
                                       background:C.warning+"08",cursor:"pointer",textAlign:"center"}}
                            onClick={function(){setDorPath("card");}}>
                            <div style={{fontSize:20,marginBottom:6}}>💳</div>
                            <div style={{fontWeight:700,fontSize:12,color:C.warning}}>Collect Card</div>
                            <div style={{fontSize:10,color:C.muted,marginTop:3}}>Enter card on delivery</div>
                            {dorPath==="card"&&<div style={{marginTop:6,fontSize:10,fontWeight:700,color:C.warning}}>✓ Selected</div>}

                        style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:12,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
                    </div>
                    <div>
                      <div style={{fontSize:10,fontWeight:600,color:C.muted,marginBottom:4}}>Last 4 Digits</div>
                      <input value={cardLast4} onChange={function(e){setCardLast4(e.target.value.replace(/\D/g,"").slice(0,4));}} placeholder="4242" maxLength={4}
                        style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:13,fontFamily:"monospace",letterSpacing:".1em",boxSizing:"border-box",outline:"none"}}/>
                    </div>
                    <div>
                      <div style={{fontSize:10,fontWeight:600,color:C.muted,marginBottom:4}}>Expiry (MM/YY)</div>

                        )}
                      </div>
                      {shippingOverride!==null&&(
                        <div style={{fontSize:10,color:C.accent,marginTop:4}}>

                        </div>
                      )}
                      {shippingOverride===null&&autoRule&&autoRule.rate===0&&(
                        <div style={{fontSize:10,color:C.success,marginTop:4,fontWeight:600}}>
                          ✓ Free shipping applies to this order
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>

              {/* Totals */}
              <div style={{background:C.surface2,borderRadius:12,padding:"16px",border:"1px solid "+C.border}}>

                  totals.shipping>0&&["Shipping",fmtMoney(totals.shipping)],
                  totals.shipping===0&&["Shipping","Free ✓"],
                  totals.tax>0&&["Tax ("+(totals.taxInfo&&totals.taxInfo.county?totals.taxInfo.county+" ":"")+(((totals.taxRate||0)*100).toFixed(1))+"%)","+ "+fmtMoney(totals.tax)],
                  ["Commission ("+commRate+"%)",fmtMoney(totals.commission)],
                ].filter(Boolean).map(function(row,i){return (
                  <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,
                                       color:row[0]==="Shipping"&&totals.shipping===0?C.success:C.muted,marginBottom:6}}>
                    <span>{row[0]}</span>
                    <span style={{fontFamily:"monospace",fontWeight:600,
                                  color:row[0]==="Shipping"&&totals.shipping===0?C.success:"inherit"}}>{row[1]}</span>
                  </div>
                );})}
                <div style={{display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:900,color:C.accent,marginTop:8,paddingTop:8,borderTop:"1px solid "+C.border}}>
                  <span>Grand Total</span><span style={{fontFamily:"monospace"}}>{fmtMoney(totals.grand)}</span>
                </div>
              </div>
            </div>
          )}

          {/* Step 3 — Confirm */}
          {step===3&&(
            <div>
              {/* Commission ceiling check */}
              {(function(){
                if(!plan) return null;
                var cap=plan.ceiling;
                if(totals.commission>cap*0.8) return (
                  <div style={{padding:"10px 12px",background:totals.commission>cap?C.danger+"12":C.warning+"10",
                               border:"1px solid "+(totals.commission>cap?C.danger:C.warning)+"25",
                               borderRadius:8,fontSize:12,fontWeight:600,marginBottom:14,
                               color:totals.commission>cap?C.danger:C.warning}}>
                    {totals.commission>cap?"⛔ Commission exceeds your "+plan.name+" plan ceiling of "+fmtMoney(cap)+"/mo":"⚠ Commission is approaching your "+fmtMoney(cap)+"/mo "+plan.name+" ceiling"}
                  </div>
                );
                return null;
              })()}

              <div style={{background:C.surface2,borderRadius:12,padding:"16px",marginBottom:14,border:"1px solid "+C.border}}>
                <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:12}}>Order Summary</div>
                {[["Customer",selCust?selCust.name:custName],["Products",items.filter(function(it){return it.prodId;}).length+" item(s)"],
                  ["Shipping",totals.shipping===0?"Free ✓":"$"+totals.shipping.toFixed(2)],
                  totals.tax>0&&["Tax",(((totals.taxRate||0)*100).toFixed(1))+"% = "+fmtMoney(totals.tax)],
                  ["Payment",payMethod.replace(/_/g," ")],["Commission",commRate+"% = "+fmtMoney(totals.commission)],
                  ["Grand Total",fmtMoney(totals.grand)]].map(function(row,i){return (
                  <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"5px 0",borderBottom:"1px solid "+C.border}}>
                    <span style={{color:C.muted}}>{row[0]}</span>
                    <span style={{fontWeight:700,color:C.text,textTransform:"capitalize"}}>{row[1]}</span>
                  </div>
                );})}
              </div>

              <div style={{padding:"10px 12px",background:C.warning+"10",border:"1px solid "+C.warning+"25",borderRadius:8,fontSize:12,color:C.warning,fontWeight:600,marginBottom:14}}>
                ⚠ Once placed, this order will be submitted for processing.
              </div>

              {/* Invoice auto-send for net terms */}
              {(function(){
                var isNet = selCust&&selCust.termsStatus==="active"&&selCust.termsType&&selCust.termsType!=="due_receipt";
                return isNet ? (
                  <div style={{padding:"10px 14px",background:C.accent+"10",border:"1px solid "+C.accent+"25",borderRadius:8,marginBottom:12}}>
                    <div style={{fontWeight:700,fontSize:12,color:C.accent,marginBottom:6}}>📧 Invoice Ready to Send</div>
                    <div style={{fontSize:11,color:C.muted,lineHeight:1.6,marginBottom:8}}>
                      Customer has approved <strong style={{color:C.text}}>{fmtTerms(selCust.termsType)}</strong> terms. 
                      After placing, you can send the invoice with a payment link directly to <strong style={{color:C.text}}>{selCust.email||"customer"}</strong>.
                    </div>
                    <label style={{display:"flex",alignItems:"center",gap:7,fontSize:12,color:C.muted,cursor:"pointer"}}>
                      <input type="checkbox" checked={sendInvAuto} onChange={function(e){setSendInvAuto(e.target.checked);}} style={{accentColor:C.accent}}/>
                      Show invoice send dialog after placing order
                    </label>
                  </div>
                ) : null;
              })()}
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <label style={{display:"flex",alignItems:"center",gap:7,fontSize:12,color:C.muted,cursor:"pointer"}}>
                  <input type="checkbox" checked={agreed} onChange={function(e){setAgreed(e.target.checked);}} style={{accentColor:C.accent}}/>
                  I confirm this order and payment terms
                </label>
                <label style={{display:"flex",alignItems:"center",gap:7,fontSize:12,color:C.muted,cursor:"pointer"}}>
                  <input type="checkbox" checked={sendConfirm} onChange={function(e){setSendConfirm(e.target.checked);}} style={{accentColor:C.accent}}/>
                  Send confirmation email to customer
                </label>
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{padding:"14px 22px",borderTop:"1px solid "+C.border,flexShrink:0,
                     display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <Btn variant="ghost" onClick={step===1?onClose:function(){setStep(step-1);}}>
            {step===1?"Cancel":"← Back"}
          </Btn>
          {step<3?(
            <Btn onClick={function(){if(step===1&&!step1Valid()) return; if(step===2&&!step2Valid()) return; setStep(step+1);}}
              disabled={(step===1&&!step1Valid())||(step===2&&!step2Valid())}>
              Next →
            </Btn>
          ):(
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <Btn variant="ghost" onClick={function(){setShowPreview(true);}}>
                👁 Preview Invoice
              </Btn>
              <Btn onClick={place} disabled={!agreed||placing}>
                {placing?"Placing…":isEdit?"Save Changes":"Place Order"}
              </Btn>
            </div>
          )}
        </div>
      </div>
      {showPreview&&(
        <PreviewOrderModal
          items={items}
          totals={totals}
          customers={customers}
          products={products}
          currentUser={currentUser}
          selCust={selCust}
          custName={custName}
          commRate={commRate}
          payMethod={payMethod}
          onClose={function(){setShowPreview(false);}}/>
      )}
      {showPostInv&&placedOrder&&(
        <SendInvoiceModal
          order={placedOrder}
          customers={customers}
          products={products}
          currentUser={{name:repName}}
          addToast={addToast}
          showResult={showResult}
          onClose={function(){setShowPostInv(false);onClose();}}/>
      )}
    </div>
  );
}

</script>
<script id="c13" type="text/plain">
function RepDashboard({repId,repName,orders,customers,commissions,onNav,addToast}) {
  var now4 = Date.now();
  var myOrds = orders.filter(function(o){return o.repId===repId;});
  var myComm = (commissions||[]).filter(function(cp){return cp.repId===repId;});
  var totalEarned = myComm.reduce(function(s,cp){return s+(cp.amount||0);},0);
  var heldComm = myOrds.filter(function(o){
    if(!o.deliveredAt||o.status==="Cancelled"||o.status==="Refunded"||o.status==="Returned") return false;
    return (now4-new Date(o.deliveredAt).getTime()) < RETURN_WINDOW_DAYS*24*60*60*1000;
  }).reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);
  var releasedComm = myOrds.filter(function(o){
    if(!o.deliveredAt||o.status==="Cancelled"||o.status==="Refunded"||o.status==="Returned") return false;
    var paidIds=myComm.map(function(cp){return cp.orderId;});
    return (now4-new Date(o.deliveredAt).getTime())>=RETURN_WINDOW_DAYS*24*60*60*1000&&paidIds.indexOf(o.id)<0;
  }).reduce(function(s,o){return s+(o.totals&&o.totals.commission||0);},0);
  var myCusts = customers.filter(function(c2){return c2.repId===repId;});

  return (
    <div>
      <PageHeader title={"Welcome back, "+(repName&&repName.split(" ")[0])||"Rep"+"!"} subtitle="Your sales dashboard"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14,marginBottom:24}}>
        <KpiCard label="My Orders" value={myOrds.length} sub={myOrds.filter(function(o){return o.status==="Submitted";}).length+" pending"} color={C.accent}/>
        <KpiCard label="Total Earned" value={fmtMoney(totalEarned)} sub="Paid out" color={C.success}/>
        <KpiCard label="Commission Due" value={fmtMoney(releasedComm)} sub="Ready for payout" color={C.gold}/>
        <KpiCard label="My Customers" value={myCusts.length} sub="Active accounts" color={C.text}/>
      </div>
      {heldComm>0&&(
        <div style={{padding:"12px 16px",background:C.warning+"10",border:"1px solid "+C.warning+"25",borderRadius:10,marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:700,fontSize:13,color:C.warning}}>🔒 {fmtMoney(heldComm)} held — return window open</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>Commission releases {RETURN_WINDOW_DAYS} days after delivery</div>
          </div>
        </div>
      )}
      <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"14px 18px",borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:700,fontSize:13,color:C.text}}>Recent Orders</div>
          <button onClick={function(){onNav("orders");}} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600}}>View all →</button>
        </div>
        {myOrds.length===0?(
          <div style={{padding:"28px",textAlign:"center"}}>
            <div style={{fontSize:13,color:C.dim,marginBottom:10}}>No orders yet</div>
            <Btn small onClick={function(){onNav("new_order");}}>Place First Order</Btn>
          </div>
        ):(
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <tbody>
              {myOrds.slice(0,5).map(function(o){return (
                <tr key={o.id} style={{borderTop:"1px solid "+C.border}}>
                  <td style={{padding:"10px 16px",fontSize:12,fontFamily:"monospace",fontWeight:700,color:C.accent}}>{o.id}</td>
                  <td style={{padding:"10px 16px",fontSize:12,color:C.text}}>{o.custName||"—"}</td>
                  <td style={{padding:"10px 16px",fontSize:11,color:C.muted}}>{fmtDate(o.createdAt)}</td>
                  <td style={{padding:"10px 16px",fontSize:12,fontFamily:"monospace",fontWeight:600}}>{fmtMoney(o.totals&&o.totals.grand||0)}</td>
                  <td style={{padding:"10px 16px"}}><Badge status={o.status}/></td>
                </tr>
              );})}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

function RepOrders({repId,repName,currentUser,repData,orders,customers,products,setOrders,setCustomers,addToast,showResult,discountCodes,shippingRules,autoOpen}) {
  const [showForm,    setShowForm]    = useState(false);
  const [filter,      setFilter]      = useState("all");
  const [viewOrd,     setViewOrd]     = useState(null);
  const [showSendInv, setShowSendInv] = useState(false);
